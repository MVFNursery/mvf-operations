<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tasks">
<meta name="theme-color" content="#1a2e0f">
<link rel="manifest" href="tasks-manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-field.png">
<title>MVFN Tasks</title>
<script src="mvfn-auth.js" data-validate-url="https://megamachine.taile865b6.ts.net:5678/webhook/mvfn-field-get"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f1a08;
    --bg2: #1a2e0f;
    --bg3: #243d18;
    --surface: #1e3512;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8f0e0;
    --text2: #9ab88a;
    --text3: #6a8a5a;
    --green: #7ecf4f;
    --green-dim: #4a8a28;
    --amber: #f0b840;
    --red: #e05050;
    --done-bg: #162810;
    --done-text: #4a7030;
    --radius: 12px;
    --header: 56px;
    --filter: 48px;
    --footer: 68px;
  }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px; overscroll-behavior: none;
  }

  /* HEADER */
  .header {
    position: fixed; top: 0; left: 0; right: 0; height: var(--header);
    background: var(--bg2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 100;
  }
  .header-logo { font-size: 12px; font-weight: 700; letter-spacing: 0.15em; color: var(--green); text-transform: uppercase; }
  .header-title { flex: 1; font-size: 15px; font-weight: 500; }
  .header-count { font-size: 12px; color: var(--text3); background: var(--bg3); padding: 3px 9px; border-radius: 99px; }
  .refresh-btn {
    width: 34px; height: 34px; border: none; background: var(--bg3);
    border-radius: 8px; color: var(--text2); font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .refresh-btn:active { opacity: 0.6; }

  /* MIC BUTTON in header */
  .mic-btn {
    width: 34px; height: 34px; border: none; background: var(--bg3);
    border-radius: 8px; color: var(--text2); font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .mic-btn.listening { background: var(--red); color: white; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  .observe-link {
    width: 34px; height: 34px; background: var(--bg3);
    border-radius: 8px; color: var(--text2); font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
  }
  .observe-link:active { opacity: 0.6; }

  /* FILTER BAR */
  .filter-bar {
    position: fixed; top: var(--header); left: 0; right: 0; height: var(--filter);
    background: var(--bg); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 12px; gap: 6px;
    overflow-x: auto; -webkit-overflow-scrolling: touch; z-index: 99;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0; padding: 5px 13px; border-radius: 99px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--text2); font-size: 12px; font-family: inherit; cursor: pointer;
  }
  .filter-chip.active { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .filter-chip.active.proposed-chip { background: rgba(240,184,64,0.15); border-color: var(--amber); color: var(--amber); }
  .filter-chip:active { opacity: 0.7; }

  /* PROPOSED CARD */
  .task-card.proposed { border-color: rgba(240,184,64,0.3); background: rgba(240,184,64,0.04); }
  .proposed-actions { display: flex; gap: 8px; padding: 0 12px 12px 56px; }
  .accept-btn {
    flex: 1; height: 36px; border-radius: 8px; border: none;
    background: var(--green-dim); color: var(--green);
    font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer;
  }
  .accept-btn:active { opacity: 0.8; }
  .dismiss-btn {
    flex: 1; height: 36px; border-radius: 8px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--text3); font-size: 13px; font-family: inherit; cursor: pointer;
  }
  .dismiss-btn:active { opacity: 0.7; }

  /* VOICE TRANSCRIPT BAR */
  .transcript-bar {
    position: fixed; top: calc(var(--header) + var(--filter)); left: 0; right: 0;
    background: rgba(74,138,40,0.15); border-bottom: 1px solid var(--green-dim);
    padding: 8px 16px; font-size: 13px; color: var(--green);
    display: none; z-index: 98;
  }
  .transcript-bar.show { display: block; }

  /* MAIN */
  .main {
    padding-top: calc(var(--header) + var(--filter) + 8px);
    padding-bottom: calc(var(--footer) + 12px);
    min-height: 100%;
  }
  .main.with-transcript { padding-top: calc(var(--header) + var(--filter) + 38px + 8px); }

  /* TASK LIST */
  .task-list { padding: 0 12px; display: flex; flex-direction: column; gap: 8px; }

  /* TASK CARD */
  .task-card-wrap { position: relative; border-radius: var(--radius); overflow: hidden; }
  .swipe-reveal {
    position: absolute; right: 0; top: 0; bottom: 0; width: 80px;
    background: var(--red); display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: white;
    text-transform: uppercase; opacity: 0; transition: opacity 0.1s;
    border-radius: 0 var(--radius) var(--radius) 0;
  }
  .task-card-wrap.swiping .swipe-reveal { opacity: 1; }
  .task-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: transform 0.2s ease, opacity 0.2s;
    position: relative; will-change: transform;
  }
  .task-card.done { background: var(--done-bg); border-color: rgba(255,255,255,0.04); opacity: 0.45; }
  .task-main { display: flex; align-items: flex-start; min-height: 64px; }

  /* CHECK BUTTON */
  .check-btn {
    width: 56px; min-height: 64px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: none; background: transparent;
  }
  .check-circle {
    width: 22px; height: 22px; border-radius: 5px;
    border: 2px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .task-card.done .check-circle { background: var(--green-dim); border-color: var(--green-dim); }
  .check-icon { display: none; }
  .task-card.done .check-icon { display: block; }
  .check-btn:active .check-circle { border-color: var(--green); background: rgba(126,207,79,0.15); }

  /* TASK CONTENT */
  .task-content { flex: 1; padding: 12px 8px 12px 0; min-width: 0; cursor: pointer; }
  .task-desc { font-size: 14px; line-height: 1.4; color: var(--text); word-break: break-word; }
  .task-card.done .task-desc { color: var(--done-text); text-decoration: line-through; text-decoration-color: var(--done-text); }
  .task-meta { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .badge-category { background: rgba(126,207,79,0.12); color: var(--green); }
  .badge-effort { background: rgba(240,184,64,0.12); color: var(--amber); }
  .badge-loc { background: rgba(96,165,250,0.14); color: #93c5fd; }
  .badge-area { background: rgba(196,132,252,0.14); color: #d8b4fe; }
  .badge-assignee { background: rgba(255,255,255,0.08); color: var(--text2); }
  .badge-suggest { background: rgba(240,184,64,0.12); color: var(--amber); }
  .badge-score { background: rgba(126,207,79,0.18); color: var(--green); font-weight: 700; }
  /* WORK-LOCATION EDITOR (expanded card) */
  .loc-edit { margin-top: 10px; }
  .loc-edit-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
  .loc-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .loc-pill { font-size: 12px; padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: inherit; cursor: pointer; }
  .loc-pill.active { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .badge-score.top { background: var(--green); color: #0d1f0d; }
  .task-reason { font-size: 11px; color: var(--text3); margin-top: 3px; font-style: italic; }

  /* EXPAND TOGGLE */
  .expand-btn {
    width: 36px; min-height: 64px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border: none; background: transparent; color: var(--text3); font-size: 10px; cursor: pointer;
  }

  /* EXPANDED AREA */
  .task-expand { display: none; padding: 0 12px 12px 56px; border-top: 1px solid var(--border); }
  .task-expand.open { display: block; }
  .task-notes-text { font-size: 12px; color: var(--text3); line-height: 1.5; margin-bottom: 8px; white-space: pre-line; }
  .note-row { display: flex; gap: 8px; align-items: flex-end; }
  .note-input {
    flex: 1; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 8px; padding: 8px 10px; color: var(--text);
    font-size: 13px; font-family: inherit; resize: none; min-height: 38px; max-height: 80px;
  }
  .note-input:focus { outline: none; border-color: var(--green-dim); }
  .note-input::placeholder { color: var(--text3); }
  .note-save-btn {
    height: 38px; padding: 0 14px; background: var(--green-dim);
    border: none; border-radius: 8px; color: var(--green);
    font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; flex-shrink: 0;
  }
  .note-save-btn:active { opacity: 0.8; }

  /* SECTION LABEL */
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); padding: 14px 12px 6px; }

  /* EMPTY / LOADING */
  .empty { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }
  .loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--text3); font-size: 14px; gap: 10px; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* FOOTER */
  .footer {
    position: fixed; bottom: 0; left: 0; right: 0; height: var(--footer);
    background: var(--bg2); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 12px; gap: 8px; z-index: 100;
  }
  .add-input {
    flex: 1; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 10px; padding: 10px 14px; color: var(--text);
    font-size: 14px; font-family: inherit; height: 44px;
  }
  .add-input:focus { outline: none; border-color: var(--green-dim); }
  .add-input::placeholder { color: var(--text3); }
  .add-btn {
    height: 44px; padding: 0 18px; background: var(--green-dim);
    border: none; border-radius: 10px; color: var(--green);
    font-size: 18px; font-weight: 700; font-family: inherit; cursor: pointer; flex-shrink: 0;
  }
  .add-btn:active { opacity: 0.8; }

  /* QUICK-ADD PICKER SHEET (domain → category → location) */
  .sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.18s;
  }
  .sheet-overlay.show { opacity: 1; pointer-events: all; }
  .sheet {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 20px 20px 32px; width: 100%; max-width: 480px;
    transform: translateY(12px); transition: transform 0.18s;
  }
  .sheet-overlay.show .sheet { transform: translateY(0); }
  .sheet-title { font-size: 13px; color: var(--text3); margin-bottom: 4px; }
  .sheet-desc { font-size: 14px; color: var(--text); margin-bottom: 18px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sheet-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .sheet-btn {
    min-height: 52px; border: 1px solid var(--border2); border-radius: 10px;
    font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
    background: var(--bg3); color: var(--text2); padding: 8px;
  }
  .sheet-btn:active { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .sheet-empty { grid-column: 1 / -1; font-size: 13px; color: var(--text3); padding: 12px 4px; }
  .sheet-cancel { width: 100%; height: 44px; border: none; border-radius: 10px; background: transparent; color: var(--text3); font-size: 14px; font-family: inherit; cursor: pointer; }
  .sheet-cancel:active { opacity: 0.6; }

  /* ARCHIVE CONFIRM OVERLAY */
  .archive-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.18s;
  }
  .archive-overlay.show { opacity: 1; pointer-events: all; }
  .archive-sheet {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 20px 20px 32px; width: 100%; max-width: 480px;
    transform: translateY(12px); transition: transform 0.18s;
  }
  .archive-overlay.show .archive-sheet { transform: translateY(0); }
  .archive-sheet-title { font-size: 13px; color: var(--text3); margin-bottom: 6px; }
  .archive-sheet-desc { font-size: 15px; color: var(--text); margin-bottom: 20px; line-height: 1.4; }
  .archive-sheet-btns { display: flex; gap: 10px; }
  .archive-confirm-btn {
    flex: 1; height: 46px; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
    background: var(--red); color: white;
  }
  .archive-confirm-btn:active { opacity: 0.8; }
  .archive-cancel-btn {
    flex: 1; height: 46px; border: 1px solid var(--border2); border-radius: 10px;
    font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
    background: transparent; color: var(--text2);
  }
  .archive-cancel-btn:active { opacity: 0.7; }

  /* TOAST */
  .toast {
    position: fixed; bottom: calc(var(--footer) + 10px); left: 50%;
    transform: translateX(-50%) translateY(6px);
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-size: 13px; padding: 9px 18px;
    border-radius: 99px; opacity: 0; transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; white-space: nowrap; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green-dim); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <span class="header-logo">MVFN</span>
  <span class="header-title">Tasks</span>
  <span class="header-count" id="countBadge">—</span>
  <button class="mic-btn" id="micBtn" onclick="toggleVoice()" title="Voice input">🎤</button>
  <button class="refresh-btn" onclick="loadTasks()" title="Refresh">↻</button>
  <a class="observe-link" href="mvfn_observe.html" title="Observe">🌿</a>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-chip active" onclick="setFilter('All',this)">All</button>
  <button class="filter-chip" id="proposedChip" onclick="setFilter('Proposed',this)">Proposed</button>
</div>

<div class="transcript-bar" id="transcriptBar"></div>

<div class="main" id="main">
  <div id="taskList" class="task-list">
    <div class="loading"><div class="spinner"></div>Loading…</div>
  </div>
</div>

<div class="footer">
  <input class="add-input" id="quickAdd" type="text" placeholder="Quick add task…" autocomplete="off" autocorrect="off" spellcheck="false">
  <button class="add-btn" onclick="quickAdd()">+</button>
</div>

<div class="toast" id="toast"></div>

<div class="sheet-overlay" id="addOverlay" onclick="cancelAddPick(event)">
  <div class="sheet">
    <div class="sheet-desc" id="addDesc"></div>
    <!-- Stage 1: domain (REQUIRED — no default, cannot be skipped) -->
    <div id="domainStage">
      <div class="sheet-title">Business or household?</div>
      <div class="sheet-btns">
        <button class="sheet-btn" onclick="pickDomain('business')">🌱 Business</button>
        <button class="sheet-btn" onclick="pickDomain('household')">🏠 Household</button>
      </div>
    </div>
    <!-- Stage 2: category (chips filled from the GET payload) -->
    <div id="categoryStage" style="display:none">
      <div class="sheet-title">Which category?</div>
      <div class="sheet-btns" id="categoryBtns"></div>
    </div>
    <!-- Stage 3: work location (business only — household defaults server-side) -->
    <div id="locStage" style="display:none">
      <div class="sheet-title">Where is this work done?</div>
      <div class="sheet-btns">
        <button class="sheet-btn" onclick="pickLocation('outdoor')">🌳 Outdoor</button>
        <button class="sheet-btn" onclick="pickLocation('indoor')">🏠 Indoor</button>
        <button class="sheet-btn" onclick="pickLocation('mixed')">🔀 Mixed</button>
        <button class="sheet-btn" onclick="pickLocation('unknown')">🤷 Not sure</button>
      </div>
    </div>
    <button class="sheet-cancel" onclick="cancelAddPick()">Cancel</button>
  </div>
</div>

<div class="archive-overlay" id="archiveOverlay" onclick="cancelArchive(event)">
  <div class="archive-sheet">
    <div class="archive-sheet-title">Archive task?</div>
    <div class="archive-sheet-desc" id="archiveDesc"></div>
    <div class="archive-sheet-btns">
      <button class="archive-confirm-btn" onclick="confirmArchive()">Archive</button>
      <button class="archive-cancel-btn" onclick="cancelArchive()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG — update this to your MegaMachine Tailscale IP ──
const N8N_BASE = 'https://megamachine.taile865b6.ts.net:5678/webhook';
const WEBHOOK_POST = N8N_BASE + '/mvfn-field';
const WEBHOOK_GET  = N8N_BASE + '/mvfn-field-get';
// ──────────────────────────────────────────────────────────

let allTasks = [];
let allAreas = [];            // [{id, name}]
let allUsers = [];            // [{slug, display_name}]
let ownership = [];           // [{area, owner}]
let categories = [];          // business tasks.categories [{category_id, label}]
let householdCategories = []; // household capture options [{category_id, label}]
let me = null;                // my slug, resolved server-side from device_token
let activeFilter = 'All';
let expandedId = null;

// ── LOAD ──────────────────────────────────────────────────
async function loadTasks() {
  document.getElementById('taskList').innerHTML =
    '<div class="loading"><div class="spinner"></div>Loading…</div>';
  try {
    const tok = encodeURIComponent(localStorage.getItem('mvfn_device_token') || '');
    const r = await fetch(WEBHOOK_GET + (tok ? '?device_token=' + tok : ''));
    if (!r.ok) {
      const hint = r.status === 503 ? 'Make sure Tailscale is connected.' : 'HTTP ' + r.status;
      throw new Error(hint);
    }
    const data = await r.json();
    const rows = Array.isArray(data.rows) ? data.rows : (Array.isArray(data) ? data : [data]);
    const row = rows[0] || {};
    if (row && Array.isArray(row.tasks)) {
      // single-payload shape: {tasks, areas, users, ownership, me, categories, household_categories}
      allTasks = row.tasks;
      allAreas = row.areas || [];
      allUsers = row.users || [];
      ownership = row.ownership || [];
      categories = row.categories || [];
      householdCategories = row.household_categories || [];
      me = row.me || null;
    } else {
      allTasks = rows; // legacy shape: bare task rows
    }
    renderFilterChips();
    renderTasks();
  } catch(e) {
    const isTailscale = e.message.includes('Tailscale') || e.message.includes('fetch') || e.message.includes('NetworkError') || e.message.includes('Failed to fetch');
    const msg = isTailscale || e.message === 'Failed to fetch'
      ? 'Make sure Tailscale is connected.'
      : e.message;
    document.getElementById('taskList').innerHTML =
      '<div class="empty">Could not load tasks.<br><small>' + msg + '</small></div>';
    showToast('Load failed', 'error');
  }
}

// ── FILTER ────────────────────────────────────────────────
// Chips: All | Mine | one per business category | Proposed.
// "Mine" mirrors the briefing's ownership relevance: assigned to me, OR
// unassigned in an area I own, OR not yet zoned (inbox — nobody's blind spot).
function matchesFilter(t) {
  if (activeFilter === 'All') return true;
  if (activeFilter === 'Mine') {
    if (!me) return true;
    if (t.assignee === me) return true;
    if (t.assignee) return false;
    if (!t.area) return true;
    return ownership.some(o => o.owner === me && o.area === t.area);
  }
  return t.category_id === activeFilter;
}
function renderFilterChips() {
  const bar = document.getElementById('filterBar');
  if (!bar) return;
  // If the previously active category disappeared, fall back to All.
  if (activeFilter !== 'All' && activeFilter !== 'Mine' && activeFilter !== 'Proposed'
      && !categories.some(c => c.category_id === activeFilter)) {
    activeFilter = 'All';
  }
  const chip = (val, label) =>
    '<button class="filter-chip' + (activeFilter === val ? ' active' : '') + '" onclick="setFilter(\'' + esc(val) + '\',this)">' + escH(label) + '</button>';
  let html = chip('All', 'All');
  if (me) html += chip('Mine', 'Mine');
  categories.forEach(c => { html += chip(c.category_id, c.label); });
  html += '<button class="filter-chip' + (activeFilter === 'Proposed' ? ' active proposed-chip' : '') + '" id="proposedChip" onclick="setFilter(\'Proposed\',this)">Proposed</button>';
  bar.innerHTML = html;
}
function setFilter(val, el) {
  activeFilter = val;
  document.querySelectorAll('.filter-chip').forEach(c => { c.classList.remove('active'); c.classList.remove('proposed-chip'); });
  el.classList.add('active');
  if (val === 'Proposed') el.classList.add('proposed-chip');
  renderTasks();
}

// ── RENDER ────────────────────────────────────────────────
function renderTasks() {
  const list = document.getElementById('taskList');

  if (activeFilter === 'Proposed') {
    const proposed = allTasks.filter(t => t.status === 'proposed');
    const chip = document.getElementById('proposedChip');
    if (chip) chip.textContent = proposed.length ? `Proposed (${proposed.length})` : 'Proposed';
    document.getElementById('countBadge').textContent = proposed.length + ' proposed';
    if (!proposed.length) {
      list.innerHTML = '<div class="empty">No proposed tasks.<br><small>Observations are processed overnight.</small></div>';
      return;
    }
    list.innerHTML = proposed.map(t => proposedCard(t)).join('');
    return;
  }

  // Update proposed chip count badge
  const proposedCount = allTasks.filter(t => t.status === 'proposed').length;
  const chip = document.getElementById('proposedChip');
  if (chip) chip.textContent = proposedCount ? `Proposed (${proposedCount})` : 'Proposed';

  const open = allTasks.filter(t =>
    (t.status === 'open' || t.status === 'blocked') && matchesFilter(t)
  ).sort((a, b) => {
    // Weather-aware score first (higher = do first); unscored sink to the bottom.
    const sa = a.score == null ? -Infinity : Number(a.score);
    const sb = b.score == null ? -Infinity : Number(b.score);
    if (sa !== sb) return sb - sa;
    return (a.created_date || '').localeCompare(b.created_date || '');
  });
  const done = allTasks
    .filter(t => t.status === 'done' && matchesFilter(t))
    .sort((a, b) => (b.completed_date || '').localeCompare(a.completed_date || ''))
    .slice(0, 5);

  document.getElementById('countBadge').textContent = open.length + ' open';

  if (!open.length && !done.length) {
    list.innerHTML = '<div class="empty">No tasks.</div>';
    return;
  }

  let html = '';
  open.forEach((t, i) => { html += card(t, i); });
  if (done.length) {
    html += '<div class="section-label">Recently Done</div>';
    done.forEach(t => { html += card(t, null); });
  }
  list.innerHTML = html;
}

function taskById(taskId) {
  return allTasks.find(x => String(x.task_id) === String(taskId));
}

function fmtEffort(m) {
  m = Number(m);
  if (!m || m <= 0) return '';
  if (m < 60) return m + 'm';
  const h = m / 60;
  return (h % 1 === 0 ? h : h.toFixed(1)) + 'h';
}

// gate_reason verbatim when present, else weather_status when informative
function reasonText(t) {
  if (t.gate_reason) return t.gate_reason;
  if (t.weather_status && t.weather_status !== 'N/A') return t.weather_status;
  return '';
}

function proposedCard(t) {
  const id = t.task_id != null ? String(t.task_id) : '';
  return `
  <div class="task-card-wrap" id="wrap-${esc(id)}">
    <div class="task-card proposed" id="card-${esc(id)}">
      <div class="task-main">
        <div style="width:56px;min-height:64px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">💡</div>
        <div class="task-content" onclick="toggleExpand('${esc(id)}')">
          <div class="task-desc">${escH(t.title||'(no title)')}</div>
          <div class="task-meta">
            ${t.category_label?`<span class="badge badge-category">${escH(t.category_label)}</span>`:''}
            ${t.suggested_assignee?`<span class="badge badge-suggest">💡 ${escH(userLabel(t.suggested_assignee))}?</span>`:''}
            ${t.effort_minutes?`<span class="badge badge-effort">${escH(fmtEffort(t.effort_minutes))}</span>`:''}
          </div>
        </div>
      </div>
      <div class="proposed-actions">
        <button class="accept-btn" onclick="acceptTask('${esc(id)}')">✓ Accept</button>
        <button class="dismiss-btn" onclick="dismissTask('${esc(id)}')">Dismiss</button>
      </div>
    </div>
  </div>`;
}

function card(t, rank) {
  const id = t.task_id != null ? String(t.task_id) : '';
  const isDone = t.status === 'done';
  const isOpen = expandedId === id;
  const reason = reasonText(t);
  return `
  <div class="task-card-wrap" id="wrap-${esc(id)}">
    <div class="swipe-reveal">Archive</div>
  <div class="task-card${isDone?' done':''}" id="card-${esc(id)}"
       ontouchstart="swipeStart(event,'${esc(id)}')" ontouchmove="swipeMove(event,'${esc(id)}')" ontouchend="swipeEnd(event,'${esc(id)}')">
    <div class="task-main">
      <button class="check-btn" onclick="completeTask('${esc(id)}')" aria-label="Complete">
        <div class="check-circle">
          <svg class="check-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 7l3.5 3.5L12 4" stroke="#7ecf4f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </button>
      <div class="task-content" onclick="toggleExpand('${esc(id)}')">
        <div class="task-desc">${escH(t.title||'(no title)')}</div>
        ${(!isDone && reason)?`<div class="task-reason">${escH(reason)}</div>`:''}
        <div class="task-meta">
          ${(!isDone && t.score!=null)?`<span class="badge badge-score${(rank!=null && rank<3)?' top':''}">★ ${Math.round(Number(t.score))}</span>`:''}
          ${t.category_label?`<span class="badge badge-category">${escH(t.category_label)}</span>`:''}
          ${t.area?`<span class="badge badge-area">📍 ${escH(t.area)}</span>`:''}
          ${t.assignee?`<span class="badge badge-assignee">👤 ${escH(userLabel(t.assignee))}</span>`:''}
          ${(!t.assignee && t.suggested_assignee)?`<span class="badge badge-suggest">💡 ${escH(userLabel(t.suggested_assignee))}?</span>`:''}
          ${t.effort_minutes?`<span class="badge badge-effort">${escH(fmtEffort(t.effort_minutes))}</span>`:''}
          ${locBadge(t.work_location)}
        </div>
      </div>
      <button class="expand-btn" onclick="toggleExpand('${esc(id)}')">${isOpen?'▲':'▼'}</button>
    </div>
    <div class="task-expand${isOpen?' open':''}" id="exp-${esc(id)}">
      ${t.detail?`<div class="task-notes-text">${escH(t.detail)}</div>`:''}
      ${areaEditor(id, t.area)}
      ${assigneeEditor(id, t.assignee, t.suggested_assignee)}
      ${locEditor(id, t.work_location)}
      <div class="note-row">
        <textarea class="note-input" id="note-${esc(id)}" placeholder="Add note…" rows="1"></textarea>
        <button class="note-save-btn" onclick="saveNote('${esc(id)}')">Save</button>
      </div>
    </div>
  </div>
  </div>`;
}

// ── ACTIONS ───────────────────────────────────────────────
async function completeTask(taskId) {
  const card = document.getElementById('card-' + taskId);
  if (!card || card.classList.contains('done')) return;
  card.classList.add('done');
  showToast('Marking done…', '');
  try {
    const r = await post({ action: 'complete_task', task_id: taskId });
    if (r.status === 'ok') {
      const t = taskById(taskId);
      if (t) {
        t.status = 'done';
        t.completed_date = new Date().toISOString().split('T')[0];
      }
      showToast('Done ✓', 'success');
      setTimeout(renderTasks, 600);
    } else {
      card.classList.remove('done');
      showToast('Failed', 'error');
    }
  } catch(e) {
    card.classList.remove('done');
    showToast('Failed — check connection', 'error');
  }
}

async function saveNote(taskId) {
  const inp = document.getElementById('note-' + taskId);
  const note = inp ? inp.value.trim() : '';
  if (!note) return;
  showToast('Saving…', '');
  try {
    const r = await post({ action: 'update_task', task_id: taskId, notes: note });
    if (r.status === 'ok') {
      const t = taskById(taskId);
      if (t) t.detail = (t.detail ? t.detail + '\n\n' : '') + note;
      expandedId = null;
      renderTasks();
      showToast('Saved ✓', 'success');
    } else {
      showToast('Save failed', 'error');
    }
  } catch(e) {
    showToast('Save failed', 'error');
  }
}

let _pendingAddDesc = null;
let _pendingDomain = null;
let _pendingCategory = null;

function _showAddStage(stage) {  // 'domain' | 'category' | 'loc'
  document.getElementById('domainStage').style.display = (stage === 'domain') ? '' : 'none';
  document.getElementById('categoryStage').style.display = (stage === 'category') ? '' : 'none';

async function quickAdd() {

  inp.blur();

function pickDomain(domain) {
  _pendingDomain = domain;
  const cats = domain === 'household' ? householdCategories : categories;
  const btns = document.getElementById('categoryBtns');
  if (!cats.length) {
    btns.innerHTML = '<div class="sheet-empty">No categories loaded — pull to refresh, then try again.</div>';
  } else {
    btns.innerHTML = cats.map(c =>
      `<button class="sheet-btn" onclick="pickCategory('${esc(c.category_id)}')">${escH(c.label)}</button>`
    ).join('');
  }

}

async function pickCategory(catId) {
  _pendingCategory = catId;
  if (_pendingDomain === 'business') {
    _showAddStage('loc');  // business asks where the work happens
    return;
  }
  // Household skips the work-location stage (server defaults to 'unknown')
  const desc = _pendingAddDesc, domain = _pendingDomain, cat = _pendingCategory;
  cancelAddPick();  // hide + reset state
  document.getElementById('quickAdd').value = '';
  await _submitAdd(desc, domain, cat, null);
}

async function pickLocation(loc) {
  const desc = _pendingAddDesc, domain = _pendingDomain, cat = _pendingCategory;
  cancelAddPick();  // hide + reset state
  document.getElementById('quickAdd').value = '';
  await _submitAdd(desc, domain, cat, loc);
}

function cancelAddPick(e) {
  if (e && e.target !== document.getElementById('addOverlay')) return;
  document.getElementById('addOverlay').classList.remove('show');
  _pendingAddDesc = null;
  _pendingDomain = null;
  _pendingCategory = null;
  _showAddStage('domain');  // reset to first stage for next time
}

async function _submitAdd(desc, domain, categoryId, workLocation) {
  showToast('Adding…', '');
  try {
    const body = { action: 'add_task', domain: domain, category_id: categoryId, description: desc };
    if (domain === 'business') body.work_location = workLocation || 'unknown';
    const r = await post(body);
    if (r.status === 'ok') {
      showToast('Added ✓', 'success');
      loadTasks();
    } else {
      showToast('Add failed', 'error');
    }
  } catch(e) {
    showToast('Add failed', 'error');
  }
}

function toggleExpand(id) {
  expandedId = expandedId === id ? null : id;
  renderTasks();
  if (expandedId) {
    setTimeout(() => {
      const el = document.getElementById('card-' + id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 40);
  }
}

// ── VOICE ─────────────────────────────────────────────────
let recognition = null;
let isListening = false;
let _voiceTargetEl = null;  // element focused when mic was tapped

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('Voice not supported in this browser', 'error');
    return;
  }
  if (isListening) {
    recognition.stop();
    return;
  }
  // Capture focused element before mic steals focus
  const focused = document.activeElement;
  _voiceTargetEl = (focused && focused.classList.contains('note-input')) ? focused : null;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micBtn').classList.add('listening');
    showTranscript('Listening…');
  };
  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    showTranscript(transcript);
    if (e.results[e.results.length-1].isFinal) {
      handleVoiceCommand(transcript.trim());
    }
  };
  recognition.onerror = (e) => {
    showToast('Voice error: ' + e.error, 'error');
    stopListening();
  };
  recognition.onend = () => { stopListening(); };
  recognition.start();
}

function stopListening() {
  isListening = false;
  document.getElementById('micBtn').classList.remove('listening');
  setTimeout(hideTranscript, 2000);
}

function handleVoiceCommand(text) {
  // If mic was tapped while a note field was focused, pipe transcript there
  if (_voiceTargetEl) {
    _voiceTargetEl.value = text;
    _voiceTargetEl.focus();
    showTranscript('Note: ' + text);
    _voiceTargetEl = null;
    return;
  }

  const lower = text.toLowerCase();
  // "add task [title]" or "new task [title]"
  if (lower.startsWith('add task ') || lower.startsWith('new task ')) {
    const desc = text.replace(/^(add task|new task)\s+/i, '');
    document.getElementById('quickAdd').value = desc;
    showTranscript('Adding: ' + desc);
    quickAdd();
    return;
  }
  // "done [partial task name]" — fuzzy match open tasks
  if (lower.startsWith('done ') || lower.startsWith('complete ')) {
    const query = text.replace(/^(done|complete)\s+/i, '').toLowerCase();
    const match = allTasks.find(t =>
      t.status !== 'done' && t.title && t.title.toLowerCase().includes(query)
    );
    if (match) {
      showTranscript('Completing: ' + match.title);
      completeTask(match.task_id);
    } else {
      showTranscript('No match found for: ' + query);
      showToast('No task matched', 'error');
    }
    return;
  }
  // Default — put in the quick-add field
  document.getElementById('quickAdd').value = text;
  showTranscript('Tap + to add: ' + text);
}

function showTranscript(text) {
  const bar = document.getElementById('transcriptBar');
  bar.textContent = text;
  bar.classList.add('show');
  document.getElementById('main').classList.add('with-transcript');
}
function hideTranscript() {
  document.getElementById('transcriptBar').classList.remove('show');
  document.getElementById('main').classList.remove('with-transcript');
}

// ── SWIPE-LEFT ARCHIVE ────────────────────────────────────
const SWIPE_THRESHOLD = 72;  // px left to trigger
let _swipeStartX = null;
let _swipeStartY = null;
let _swipeLocked = false;     // true once we've decided horizontal
let _pendingArchiveId = null;

function swipeStart(e, taskId) {
  const card = document.getElementById('card-' + taskId);
  if (card && card.classList.contains('done')) return;
  const t = e.touches[0];
  _swipeStartX = t.clientX;
  _swipeStartY = t.clientY;
  _swipeLocked = false;
}

function swipeMove(e, taskId) {
  if (_swipeStartX === null) return;
  const t = e.touches[0];
  const dx = t.clientX - _swipeStartX;
  const dy = t.clientY - _swipeStartY;

  // Decide axis on first significant movement
  if (!_swipeLocked) {
    if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
    if (Math.abs(dy) > Math.abs(dx)) { _swipeStartX = null; return; } // vertical scroll wins
    _swipeLocked = true;
  }

  if (dx >= 0) { _resetSwipe(taskId); return; }
  e.preventDefault();

  const shift = Math.max(dx, -SWIPE_THRESHOLD - 20);
  const card  = document.getElementById('card-' + taskId);
  const wrap  = document.getElementById('wrap-' + taskId);
  if (card) card.style.transition = 'none';
  if (card) card.style.transform  = `translateX(${shift}px)`;
  if (wrap) wrap.classList.toggle('swiping', shift < -12);
}

function swipeEnd(e, taskId) {
  if (_swipeStartX === null) return;
  const t   = e.changedTouches[0];
  const dx  = t.clientX - _swipeStartX;
  _swipeStartX = null;
  _swipeStartY = null;

  const card = document.getElementById('card-' + taskId);
  const wrap = document.getElementById('wrap-' + taskId);

  if (dx < -SWIPE_THRESHOLD) {
    // Snap out, then show confirm
    if (card) { card.style.transition = 'transform 0.18s ease'; card.style.transform = `translateX(-${SWIPE_THRESHOLD + 20}px)`; }
    setTimeout(() => { _resetSwipe(taskId); showArchiveConfirm(taskId); }, 180);
  } else {
    _resetSwipe(taskId);
  }
}

function _resetSwipe(taskId) {
  const card = document.getElementById('card-' + taskId);
  const wrap = document.getElementById('wrap-' + taskId);
  if (card) { card.style.transition = 'transform 0.2s ease'; card.style.transform = ''; }
  if (wrap) wrap.classList.remove('swiping');
}

function showArchiveConfirm(taskId) {
  const t = taskById(taskId);
  _pendingArchiveId = taskId;
  document.getElementById('archiveDesc').textContent = t ? t.title : taskId;
  document.getElementById('archiveOverlay').classList.add('show');
}

function cancelArchive(e) {
  if (e && e.target !== document.getElementById('archiveOverlay')) return;
  document.getElementById('archiveOverlay').classList.remove('show');
  _pendingArchiveId = null;
}

async function confirmArchive() {
  const taskId = _pendingArchiveId;
  document.getElementById('archiveOverlay').classList.remove('show');
  _pendingArchiveId = null;
  if (!taskId) return;

  const card = document.getElementById('card-' + taskId);
  if (card) card.style.opacity = '0.3';
  showToast('Archiving…', '');
  try {
    const r = await post({ action: 'archive_task', task_id: taskId });
    if (r.status === 'ok') {
      allTasks = allTasks.filter(x => String(x.task_id) !== String(taskId));
      renderTasks();
      showToast('Archived', 'success');
    } else {
      if (card) card.style.opacity = '';
      showToast('Archive failed', 'error');
    }
  } catch(e) {
    if (card) card.style.opacity = '';
    showToast('Archive failed — check connection', 'error');
  }
}

// ── PROPOSED ACTIONS ─────────────────────────────────────
async function acceptTask(taskId) {
  const card = document.getElementById('card-' + taskId);
  if (card) card.style.opacity = '0.4';
  showToast('Accepting…', '');
  try {
    const r = await post({ action: 'accept_task', task_id: taskId });
    if (r.status === 'ok') {
      const t = taskById(taskId);
      if (t) {
        t.status = 'open';
        if (!t.assignee && t.suggested_assignee) t.assignee = t.suggested_assignee;
      }
      showToast('Added to tasks ✓', 'success');
      renderTasks();
    } else {
      if (card) card.style.opacity = '';
      showToast('Failed', 'error');
    }
  } catch(e) {
    if (card) card.style.opacity = '';
    showToast('Failed — check connection', 'error');
  }
}

async function dismissTask(taskId) {
  const card = document.getElementById('card-' + taskId);
  if (card) card.style.opacity = '0.4';
  showToast('Dismissing…', '');

    const r = await post({ action: 'dismiss_task', task_id: taskId });

// ── UTILS ─────────────────────────────────────────────────
// Escape single quotes for n8n's raw SQL interpolation
function sqlEsc(s) { return (s || '').replace(/'/g, "''"); }

async function post(body) {
  // Every POST carries the device token so the server can resolve who acted.
  const safe = { ...body, device_token: localStorage.getItem('mvfn_device_token') || '' };
  // Sanitize string fields that land in n8n SQL templates
  ['description', 'notes', 'task_id', 'area_id', 'assignee_slug', 'category_id', 'device_token'].forEach(k => {
    if (typeof safe[k] === 'string') safe[k] = sqlEsc(safe[k]);
  });
  const r = await fetch(WEBHOOK_POST, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(safe)
  });
  return r.json();
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.className = 'toast'; }, 2400);
}

// ── WORK LOCATION ─────────────────────────────────────────
const LOC_META = {
  outdoor: { label: 'Outdoor', emoji: '🌳' },
  indoor:  { label: 'Indoor',  emoji: '🏠' },
  mixed:   { label: 'Mixed',   emoji: '🔀' }
};
const LOC_ORDER = ['outdoor', 'indoor', 'mixed', 'unknown'];
function locBadge(wl) {
  const m = LOC_META[wl];
  return m ? `<span class="badge badge-loc">${m.emoji} ${m.label}</span>` : '';
}
function locEditor(id, wl) {
  const cur = wl || 'unknown';
  const pill = (v, txt) => `<button class="loc-pill${cur===v?' active':''}" onclick="setWorkLocation('${esc(id)}','${v}')">${txt}</button>`;
  return `<div class="loc-edit">
    <div class="loc-edit-label">Work location</div>
    <div class="loc-btns">
      ${pill('outdoor','🌳 Outdoor')}${pill('indoor','🏠 Indoor')}${pill('mixed','🔀 Mixed')}${pill('unknown','🤷 Unknown')}
    </div>
  </div>`;
}
// ── AREA + ASSIGNEE ───────────────────────────────────────
function userLabel(slug) {
  const u = allUsers.find(x => x.slug === slug);
  return u ? u.display_name : slug;
}
function areaEditor(id, curArea) {
  if (!allAreas.length) return '';
  const pill = (v, txt, on) => `<button class="loc-pill${on?' active':''}" onclick="setArea('${esc(id)}','${esc(v)}')">${txt}</button>`;
  return `<div class="loc-edit">
    <div class="loc-edit-label">Area</div>
    <div class="loc-btns">
      ${allAreas.map(a => pill(a.id, '📍 ' + escH(a.name), curArea === a.name)).join('')}${pill('', 'None', !curArea)}
    </div>
  </div>`;
}
function assigneeEditor(id, curAssignee, suggested) {
  if (!allUsers.length) return '';
  const pill = (v, txt, on) => `<button class="loc-pill${on?' active':''}" onclick="setAssignee('${esc(id)}','${esc(v)}')">${txt}</button>`;
  const hint = (!curAssignee && suggested)
    ? `<div class="loc-edit-label" style="color:var(--amber)">💡 Overnight pipeline suggests ${escH(userLabel(suggested))} — tap to accept</div>` : '';
  return `<div class="loc-edit">
    <div class="loc-edit-label">Assigned to</div>
    ${hint}
    <div class="loc-btns">
      ${allUsers.map(u => pill(u.slug, ((!curAssignee && suggested === u.slug) ? '💡 ' : '👤 ') + escH(u.display_name), curAssignee === u.slug)).join('')}${pill('', 'Unassigned', !curAssignee)}
    </div>
  </div>`;
}
async function setArea(taskId, areaId) {
  showToast('Saving…', '');
  try {
    const r = await post({ action: 'set_area', task_id: taskId, area_id: areaId });
    if (r.status === 'ok') {
      const t = taskById(taskId);
      if (t) { const a = allAreas.find(x => x.id === areaId); t.area = a ? a.name : null; }
      renderTasks();
      showToast('Saved ✓', 'success');
    } else { showToast('Save failed', 'error'); }
  } catch (e) { showToast('Save failed', 'error'); }
}
async function setAssignee(taskId, slug) {
  showToast('Saving…', '');
  try {
    const r = await post({ action: 'set_assignee', task_id: taskId, assignee_slug: slug });
    if (r.status === 'ok') {
      const t = taskById(taskId);
      if (t) t.assignee = slug || null;
      renderTasks();
      showToast(slug ? 'Assigned to ' + userLabel(slug) + ' ✓' : 'Unassigned ✓', 'success');
    } else { showToast('Save failed', 'error'); }
  } catch (e) { showToast('Save failed', 'error'); }
}

async function setWorkLocation(taskId, loc) {
  if (!LOC_ORDER.includes(loc)) return;
  const t = taskById(taskId);
  if (t && t.work_location === loc) return;
  showToast('Saving…', '');
  try {
    const r = await post({ action: 'update_task', task_id: taskId, work_location: loc });
    if (r.status === 'ok') {
      if (t) t.work_location = loc;
      renderTasks();
      showToast('Saved ✓', 'success');
    } else {
      showToast('Save failed', 'error');
    }
  } catch (e) {
    showToast('Save failed', 'error');
  }
}

function esc(s) { return String(s == null ? '' : s).replace(/['"<>&]/g, c => ({'\'':'&#39;','"':'&quot;','<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
function escH(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
