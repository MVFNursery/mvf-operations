<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#2d5016">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Species Trainer">
<link rel="manifest" href="manifest.json">
<title>Species Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1a0e;--ink2:#3d3a28;--ink3:#6b6650;
  --paper:#f5f0e8;--paper2:#ece5d4;--paper3:#d8d0b8;
  --green:#2d5016;--green2:#4a7c28;--green3:#8aad5a;--green4:#c8dba8;
  --amber:#c47a1e;--amber2:#f0c060;--amber3:#fdecc8;
  --red:#8b2a1a;--red2:#d4604a;--red3:#fdd8d2;
  --blue:#1a3a5c;--blue2:#2a5a8c;--blue3:#d0e4f4;
  --correct:#2d5016;--wrong:#8b2a1a;--partial:#7a5a10;
  --forsale:#5a2d82;--forsale2:#7a4aa8;--forsale3:#e8d8f8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:'Crimson Pro',Georgia,serif;font-size:17px;line-height:1.55;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(0,0,0,0.02) 31px,rgba(0,0,0,0.02) 32px);pointer-events:none;z-index:0;}
#app{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:0.5rem 1.25rem 1.5rem;padding-left:max(1.25rem,env(safe-area-inset-left));padding-right:max(1.25rem,env(safe-area-inset-right));}
header{display:flex;align-items:center;gap:0.75rem;padding:0.5rem 0 0.45rem;border-bottom:2px solid var(--green);margin-bottom:0.8rem;}
header.forsale-mode{border-bottom-color:var(--forsale);}
.header-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--green);line-height:1;}
.header-title em{font-style:italic;font-weight:500;}
.header-dataset{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink3);flex:1;}
.header-dataset.forsale{color:var(--forsale2);}
.header-actions{display:flex;align-items:center;gap:0.5rem;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--ink3);padding:0.2rem 0.3rem;border-radius:3px;font-size:16px;transition:color 0.12s,background 0.12s;}
.icon-btn:hover{color:var(--green);background:var(--green4);}
.profile-bar{display:flex;align-items:center;gap:0.4rem;margin-bottom:0.65rem;flex-wrap:wrap;}
.profile-chip{font-family:'Crimson Pro',serif;font-size:13px;padding:0.2rem 0.65rem;border-radius:20px;border:1.5px solid var(--paper3);background:var(--paper2);color:var(--ink3);cursor:pointer;transition:all 0.12s;}
.profile-chip.active{background:var(--green);color:white;border-color:var(--green);}
.profile-chip:hover:not(.active){border-color:var(--green3);color:var(--ink);}
.profile-add{font-size:13px;color:var(--ink3);cursor:pointer;padding:0.2rem 0.5rem;border-radius:20px;border:1.5px dashed var(--paper3);background:none;font-family:'Crimson Pro',serif;transition:all 0.12s;}
.profile-add:hover{border-color:var(--green3);color:var(--green);}
.profile-input{font-family:'Crimson Pro',serif;font-size:13px;padding:0.2rem 0.5rem;border:1.5px solid var(--green3);border-radius:20px;background:white;color:var(--ink);outline:none;width:120px;}
.stats-bar{display:flex;gap:1px;margin-bottom:0.65rem;background:var(--paper3);border-radius:4px;overflow:hidden;border:1px solid var(--paper3);}
.stat{flex:1;text-align:center;padding:0.28rem 0.25rem;background:var(--paper2);}
.stat .val{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--green);font-weight:700;display:block;}
.stat .lbl{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink3);}
.mode-tabs{display:flex;margin-bottom:0.65rem;border:1.5px solid var(--green);border-radius:4px;overflow:hidden;}
.mode-tab{flex:1;padding:0.32rem 1rem;background:var(--paper2);border:none;cursor:pointer;font-family:'Crimson Pro',serif;font-size:14px;color:var(--ink3);transition:all 0.15s;letter-spacing:0.03em;}
.mode-tab:not(:last-child){border-right:1px solid var(--green);}
.mode-tab.active{background:var(--green);color:var(--paper);font-weight:600;}
.mode-tab:hover:not(.active){background:var(--green4);color:var(--ink);}
.filter-bar{display:flex;gap:0.5rem;margin-bottom:0.5rem;align-items:center;flex-wrap:wrap;}
.filter-bar label{font-size:12px;color:var(--ink3);}
.filter-bar select{font-family:'Crimson Pro',serif;font-size:13px;padding:0.12rem 0.45rem;border:1px solid var(--paper3);border-radius:3px;background:var(--paper2);color:var(--ink);}
.forsale-badge{display:inline-flex;align-items:center;gap:0.3rem;font-size:10px;font-weight:700;letter-spacing:0.08em;padding:2px 8px;border-radius:20px;background:var(--forsale3);color:var(--forsale);border:1px solid var(--forsale2);margin-bottom:0.5rem;}
.card{background:white;border:1.5px solid var(--paper3);border-radius:6px;padding:0.9rem 1.15rem;margin-bottom:0.5rem;box-shadow:0 2px 6px rgba(0,0,0,0.05);border-left-width:4px;}
.card.ask-card{border-left-color:var(--green2);}
.card.ask-card.forsale-card{border-left-color:var(--forsale2);}
.card.result-correct{border-left-color:var(--green2);background:#f5faf0;}
.card.result-wrong{border-left-color:var(--red2);background:#fdf5f3;}
.card.result-partial{border-left-color:var(--amber);background:#fdf8ed;}
.card.result-neutral{border-left-color:var(--paper3);}
.card-header{margin-bottom:0.5rem;}
.species-sci{font-family:'Playfair Display',serif;font-size:1.25rem;font-style:italic;color:var(--ink);font-weight:500;}
.species-common{font-size:14px;color:var(--ink2);}
.species-hidden{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--paper3);font-style:italic;user-select:none;letter-spacing:0.05em;}
.type-badge{display:inline-block;font-size:11px;padding:1px 9px;border-radius:20px;background:var(--green4);color:var(--green);letter-spacing:0.05em;font-weight:600;margin-top:0.2rem;}
.type-badge.hidden-badge{background:var(--paper2);color:var(--paper3);}
.level-badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:20px;margin-left:0.4rem;font-weight:600;letter-spacing:0.06em;vertical-align:middle;}
.level-badge.l1{background:var(--green4);color:var(--green);}
.level-badge.l2{background:var(--amber3);color:var(--amber);}
.level-badge.l3{background:var(--blue3);color:var(--blue2);}
.level-badge.l4{background:#ede;color:#707;}
.mastery-inline{display:flex;align-items:center;gap:0.4rem;margin-top:0.15rem;}
.mastery-level-tag{font-size:10px;font-weight:700;letter-spacing:0.07em;padding:1px 6px;border-radius:3px;flex-shrink:0;}
.mastery-level-tag.l1{background:var(--green4);color:var(--green);}
.mastery-level-tag.l2{background:var(--amber3);color:var(--amber);}
.mastery-level-tag.l3{background:var(--blue3);color:var(--blue2);}
.mastery-level-tag.l4{background:#ede;color:#707;}
.mastery-track{flex:1;max-width:120px;height:4px;background:var(--paper3);border-radius:2px;overflow:hidden;}
.mastery-fill{height:100%;border-radius:2px;transition:width 0.3s;}
.mastery-pct{font-size:10px;color:var(--ink3);flex-shrink:0;}
.divider{border:none;border-top:1px solid var(--paper3);margin:0.55rem 0;}
.question-text{font-size:1.1rem;color:var(--ink);margin-bottom:0.65rem;line-height:1.4;}
.answer-input{width:100%;font-family:'Crimson Pro',serif;font-size:1rem;padding:0.4rem 0.75rem;border:1.5px solid var(--paper3);border-radius:4px;background:var(--paper);color:var(--ink);transition:border-color 0.15s;margin-bottom:0.5rem;resize:vertical;}
.answer-input:focus{outline:none;border-color:var(--green2);background:white;}
.btn-row{display:flex;gap:0.5rem;flex-wrap:wrap;}
.btn{font-family:'Crimson Pro',serif;font-size:14px;padding:0.35rem 0.9rem;border-radius:3px;border:1.5px solid;cursor:pointer;transition:all 0.12s;letter-spacing:0.02em;}
.btn-primary{background:var(--green);color:white;border-color:var(--green);}
.btn-primary:hover{background:var(--green2);border-color:var(--green2);}
.btn-secondary{background:transparent;color:var(--ink2);border-color:var(--paper3);}
.btn-secondary:hover{background:var(--paper2);}
.btn-correct{background:var(--correct);color:white;border-color:var(--correct);}
.btn-partial{background:var(--partial);color:white;border-color:var(--partial);}
.btn-wrong{background:var(--wrong);color:white;border-color:var(--wrong);}
.btn-sm{font-size:12px;padding:0.2rem 0.6rem;}
.result-banner{padding:0.4rem 0.7rem;border-radius:4px;margin-bottom:0.55rem;font-size:14px;font-weight:600;}
.result-banner.correct{background:var(--green4);color:var(--green);}
.result-banner.partial{background:var(--amber3);color:var(--partial);}
.result-banner.wrong{background:var(--red3);color:var(--wrong);}
.correct-answer{font-size:13px;color:var(--ink2);margin-bottom:0.35rem;}
.correct-answer strong{color:var(--ink);}
.ai-grade{font-size:13px;color:var(--ink3);font-style:italic;margin-bottom:0.55rem;padding:0.35rem 0.55rem;background:var(--paper2);border-radius:3px;border-left:3px solid var(--green3);}
.fun-fact{margin-top:0.55rem;padding:0.4rem 0.7rem;background:var(--paper2);border-left:3px solid var(--amber);font-size:12px;color:var(--ink2);border-radius:0 3px 3px 0;}
.fun-fact-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--amber);font-weight:600;margin-bottom:0.1rem;}
.species-photo-wrap{margin:0.6rem 0 0.2rem;border-radius:5px;overflow:hidden;background:var(--paper2);min-height:160px;display:flex;align-items:center;justify-content:center;position:relative;}
.species-photo-wrap img{width:100%;max-height:240px;object-fit:cover;display:block;opacity:0;transition:opacity 0.4s ease;border-radius:5px;}
.species-photo-credit{font-size:10px;color:var(--ink3);text-align:right;margin-top:0.15rem;font-style:italic;}
.species-photo-loading{font-size:12px;color:var(--ink3);font-style:italic;position:absolute;}
.coach-wrap{margin:0.45rem 0 0.5rem;padding:0.4rem 0.7rem;background:var(--paper2);border-radius:4px;border-left:3px solid var(--red2);}
.coach-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.2rem;}
.coach-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink3);}
.coach-score{font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:700;}
.coach-score.low{color:var(--red2);}.coach-score.mid{color:var(--amber);}.coach-score.high{color:var(--green2);}
.coach-bar-wrap{height:3px;background:var(--paper3);border-radius:2px;overflow:hidden;}
.coach-bar{height:100%;border-radius:2px;transition:width 0.4s,background 0.4s;}
.coach-quote{font-size:11px;color:var(--ink3);font-style:italic;margin-top:0.18rem;}
.thinking-dots span{animation:blink 1.2s infinite;font-size:1.3rem;line-height:1;}
.thinking-dots span:nth-child(2){animation-delay:0.2s;}
.thinking-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{opacity:0.15;}40%{opacity:1;}}
.nav-bar{display:flex;border-bottom:2px solid var(--paper3);margin-bottom:0.8rem;}
.nav-item{padding:0.3rem 1.1rem;font-size:12px;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.12s;}
.nav-item.active{color:var(--green);border-bottom-color:var(--green);font-weight:600;}
.nav-item.active.forsale{color:var(--forsale);border-bottom-color:var(--forsale);}
.nav-item:hover:not(.active){color:var(--ink2);}
.nav-item.forsale-tab{color:var(--forsale2);}
.nav-item.forsale-tab:hover:not(.active){color:var(--forsale);}
.species-list{display:flex;flex-direction:column;gap:2px;}
.species-item{display:flex;align-items:center;gap:0.65rem;padding:0.35rem 0.7rem;border-radius:3px;cursor:pointer;transition:background 0.1s;}
.species-item:hover{background:var(--paper2);}
.species-item .sci{font-style:italic;font-size:14px;flex:1;color:var(--ink);}
.species-item .com{font-size:12px;color:var(--ink3);}
.score-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.score-chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 7px;border-radius:12px;}
.score-chip.high{background:var(--green4);color:var(--green);}
.score-chip.mid{background:var(--amber3);color:var(--partial);}
.score-chip.low{background:var(--red3);color:var(--wrong);}
.score-chip.unseen{background:var(--paper2);color:var(--ink3);}
.attr-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.35rem 1.25rem;margin-top:0.75rem;}
.attr-row{display:flex;flex-direction:column;}
.attr-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink3);}
.attr-val{font-size:13px;color:var(--ink);}
.attr-val.empty{color:var(--paper3);font-style:italic;font-size:12px;}
.loader-screen{max-width:520px;margin:2rem auto;text-align:center;}
.loader-screen h2{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--green);margin-bottom:0.5rem;}
.loader-screen p{font-size:14px;color:var(--ink3);margin-bottom:1.5rem;line-height:1.6;}
.drop-zone{border:2px dashed var(--paper3);border-radius:8px;padding:2rem 1.5rem;cursor:pointer;transition:all 0.15s;background:var(--paper2);}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--green3);background:var(--green4);}
.drop-zone input[type=file]{display:none;}
.drop-zone-label{font-size:15px;color:var(--ink3);}
.drop-zone-label strong{color:var(--green);}
.csv-preview{margin-top:1.25rem;text-align:left;}
.csv-preview table{width:100%;border-collapse:collapse;font-size:12px;}
.csv-preview th{background:var(--paper2);padding:0.3rem 0.5rem;border:1px solid var(--paper3);font-weight:600;text-align:left;}
.csv-preview td{padding:0.25rem 0.5rem;border:1px solid var(--paper3);vertical-align:top;}
.csv-preview .row-label{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:0.08em;background:var(--paper2);}
.tag-chip{display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600;}
.tag-primary{background:var(--green4);color:var(--green);}
.tag-display{background:var(--blue3);color:var(--blue2);}
.tag-category{background:var(--amber3);color:var(--amber);}
.tag-notes{background:#ede;color:#707;}
.tag-id{background:var(--paper3);color:var(--ink3);}
.tag-level1{background:var(--green4);color:var(--green);}
.tag-level2{background:var(--amber3);color:var(--amber);}
.tag-level3{background:var(--blue3);color:var(--blue2);}
.tag-level4{background:#ede;color:#707;}
.tag-skip{background:var(--paper2);color:var(--ink3);}
.settings-screen{max-width:620px;margin:0 auto;}
.settings-section{margin-bottom:1.25rem;}
.settings-section h3{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--green);margin-bottom:0.6rem;border-bottom:1px solid var(--paper3);padding-bottom:0.25rem;}
.level-buckets{display:flex;gap:0.75rem;flex-wrap:wrap;}
.level-bucket{flex:1;min-width:140px;background:var(--paper2);border-radius:6px;padding:0.6rem 0.75rem;border:1.5px solid var(--paper3);}
.level-bucket h4{font-size:12px;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.4rem;}
.level-bucket.lv1 h4{color:var(--green);}
.level-bucket.lv2 h4{color:var(--amber);}
.level-bucket.lv3 h4{color:var(--blue2);}
.level-bucket.lv4 h4{color:#707;}
.level-bucket.lv-skip h4{color:var(--ink3);}
.level-bucket.drag-target{border-color:var(--green3);background:var(--green4);}
.field-pill{display:inline-block;font-size:12px;padding:2px 9px;border-radius:12px;background:white;border:1px solid var(--paper3);margin:2px;cursor:grab;user-select:none;transition:box-shadow 0.1s;}
.field-pill:hover{box-shadow:0 2px 6px rgba(0,0,0,0.12);}
.field-pill.dragging{opacity:0.5;}
.dataset-info{font-size:13px;color:var(--ink3);line-height:1.7;}
.dataset-info strong{color:var(--ink);}
.io-row{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem;}
.empty-state{text-align:center;padding:2rem;color:var(--ink3);font-style:italic;font-size:14px;}
.card-swipeable{transition:transform 0.15s ease,opacity 0.15s ease;touch-action:pan-y;}
.card-swipeable.swiping{transition:none;}
.swipe-hint{display:none;position:absolute;top:50%;transform:translateY(-50%);font-size:13px;font-weight:600;letter-spacing:0.08em;opacity:0;transition:opacity 0.1s;pointer-events:none;padding:0.3rem 0.6rem;border-radius:3px;}
.swipe-hint-right{right:1rem;color:var(--correct);background:var(--green4);}
.swipe-hint-left{left:1rem;color:var(--wrong);background:var(--red3);}
.offline-banner{display:none;position:fixed;bottom:env(safe-area-inset-bottom,0);left:0;right:0;background:var(--amber);color:white;text-align:center;font-size:13px;padding:0.4rem;z-index:200;}
.offline-banner.visible{display:block;}
@media(max-width:500px){
  #app{padding:0.4rem 0.75rem calc(0.75rem + env(safe-area-inset-bottom));}
  .attr-grid{grid-template-columns:1fr;}
  .level-buckets{flex-direction:column;}
  .header-title{font-size:1.15rem;}
  .btn{padding:0.6rem 1.1rem;font-size:15px;min-height:44px;}
  .btn-correct,.btn-partial,.btn-wrong{flex:1;justify-content:center;}
  .btn-row{gap:0.4rem;}
  .mode-tab{padding:0.5rem 0.5rem;min-height:44px;}
  .nav-item{padding:0.5rem 1rem;min-height:44px;display:flex;align-items:center;}
  .profile-chip{min-height:36px;padding:0.3rem 0.75rem;}
  .card{padding:0.85rem 1rem;}
  .answer-input{font-size:16px;}
  .filter-bar select{min-height:36px;font-size:15px;}
  .swipe-hint{display:flex;}
}
</style>
</head>
<body>
<div id="app">
<div class="offline-banner" id="offlineBanner">⚡ Offline — study continues, AI grading and photos unavailable</div>
<header id="mainHeader">
  <div class="header-title">Species <em>Trainer</em></div>
  <div class="header-dataset" id="headerDataset">No dataset loaded</div>
  <div class="header-actions">
    <button class="icon-btn" title="Settings" onclick="showScreen('settings')">⚙</button>
  </div>
</header>
<div id="root"></div>
</div>
<script>
'use strict';
const APP_VERSION='2.1';
const LEVEL_UNLOCK_THRESHOLD=0.75;
const MAX_INTERVAL_DAYS=30;
const ROLE_ALIASES={primary:['scientific name','latin name','sci name','binomial','scientific','species name'],display:['common name','common','display name','name','vernacular name','vernacular'],category:['plant type','type','category','group','class','form'],id:['id','usda symbol','symbol','code','identifier','uid'],notes:['pa notes','notes','fun fact','remarks','description','comment','comments','obs','observations'],notes_alt:['alternate common names','alternate name','alternate','also known as','other names','alt name','alt common name']};
const RANK_ALIASES={family:['family','fam.','plant family'],genus:['genus','gen.'],species:['species','sp.','spec.']};
const AUTO_LEVEL_MAP={'flower color':1,'flowering months':1,'height (feet)':1,'height':1,'sun exposure':1,'sun':1,'soil moisture':1,'moisture':1,'plant family':1,'family':1,'lifespan':2,'growth rate':2,'drought tolerance':2,'pollinator value':2,'monarchs':2,'hummingbirds':2,'workhorse':2,'showy':2,'leaf retention':3,'growth form':3,'soil texture':3,'ph (range)':3,'propagation':3,'native bees (except bombus)':3,'bombus':3,'butterflies':3,'moths':3,'active growth period':4,'fire tolerance':4,'salt tolerance':4,'fertility requirement':4,'resprout ability':4,'hedge tolerance':4,'palatability (browsing/grazing)':4,'are we growing this right now?':4,'native status':4,'distribution in usa':4,'fall conspicuous':4,'moisture use':4,'commercially available':4,'benefits to pollinators':4,'pollinators':4,'honey bees':4,'beetles, wasps, flies':4,'nesting and structure (bees)':4,'larval host (monarch)':4,'larval host (butterfly)':4,'larval host (moth)':4,'larval species (lepidoptera)':4,'bats':4,'wind':4};

// FOR SALE IDs — 21 unique species from inventory.stock WHERE status='for-sale'
// Slug mapping: clustered-mt-mint→PYMU, flowerburst-yarrow→ACMI2, foxglove-beardtongue→PEDI
// New entries added to dataset: RUHI2_campfire, SADI2, ARAR5, COAM2, DIEX, AIRU

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)throw new Error('CSV must have at least 2 rows');
  function splitRow(line){const out=[];let cur='';let inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){out.push(cur.trim());cur='';}else{cur+=c;}}out.push(cur.trim());return out.map(s=>s.replace(/^"|"$/g,'').trim());}
  const headers=splitRow(lines[0]);
  const VALID_TAGS=new Set(['primary','display','category','id','notes','notes_alt','1','2','3','4','']);
  const row2=splitRow(lines[1]);
  const isTagRow=row2.every(cell=>VALID_TAGS.has(cell.toLowerCase().trim()));
  let tags,rows;
  if(isTagRow){tags=row2;rows=lines.slice(2).map(splitRow);}
  else{tags=headers.map(h=>{const cn=h.toLowerCase().trim();for(const[role,aliases]of Object.entries(ROLE_ALIASES)){if(aliases.includes(cn))return role;}for(const[rank,aliases]of Object.entries(RANK_ALIASES)){if(aliases.includes(cn))return'1';}if(AUTO_LEVEL_MAP[cn]!==undefined)return String(AUTO_LEVEL_MAP[cn]);return'';});rows=lines.slice(1).map(splitRow);}
  return{headers,tags,rows,autoTagged:!isTagRow};
}
function detectRole(colName,tag){
  const cn=colName.toLowerCase().trim();const tg=(tag||'').toLowerCase().trim();
  if(['primary','display','category','id','notes','notes_alt'].includes(tg))return tg;
  if(['1','2','3','4'].includes(tg))return`level${tg}`;
  if(tg==='')return'skip';
  for(const[role,aliases]of Object.entries(ROLE_ALIASES)){if(aliases.includes(cn))return role;}
  for(const[rank,aliases]of Object.entries(RANK_ALIASES)){if(aliases.includes(cn))return'rank_'+rank;}
  return'skip';
}
function buildSchema(headers,tags){
  const fields=headers.map((h,i)=>{const role=detectRole(h,tags[i]);return{index:i,name:h,tag:tags[i]||'',role,key:h.toLowerCase().replace(/[^a-z0-9]/g,'_')};});
  const schema={fields,primaryIdx:fields.findIndex(f=>f.role==='primary'),displayIdx:fields.findIndex(f=>f.role==='display'),categoryIdx:fields.findIndex(f=>f.role==='category'),idIdx:fields.findIndex(f=>f.role==='id'),notesIdx:fields.findIndex(f=>f.role==='notes'),notesAltIdx:fields.findIndex(f=>f.role==='notes_alt'),levelFields:{1:fields.filter(f=>f.role==='level1'),2:fields.filter(f=>f.role==='level2'),3:fields.filter(f=>f.role==='level3'),4:fields.filter(f=>f.role==='level4')}};
  if(schema.primaryIdx===-1&&schema.displayIdx===-1)throw new Error('CSV must have at least one column tagged as "primary" or "display"');
  return schema;
}
function buildDataset(csvText,filename){
  const{headers,tags,rows,autoTagged}=parseCSV(csvText);
  const schema=buildSchema(headers,tags);
  const items=rows.filter(r=>r.some(c=>c)).map((row,i)=>{const item={_rowIndex:i};headers.forEach((h,j)=>{item[schema.fields[j].key]=row[j]||'';});const idField=schema.idIdx>=0?schema.fields[schema.idIdx].key:null;item._id=idField?(item[idField]||`row_${i}`):`row_${i}`;return item;});
  const fpStr=headers.join('|')+'§'+tags.join('|')+'§'+rows.length;
  const fingerprint=simpleHash(fpStr);
  const name=filename?filename.replace(/\.(csv|tsv|txt)$/i,'').replace(/[_-]/g,' '):'Unnamed Dataset';
  return{name,fingerprint,headers,tags,schema,rows:items,autoTagged:!!autoTagged};
}
function simpleHash(str){let h=0x811c9dc5;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=(h*0x01000193)>>>0;}return h.toString(16).padStart(8,'0');}
function buildDatasetFromRaw(raw){const schema=buildSchema(raw.headers,raw.tags);return{name:raw.name,fingerprint:raw.fingerprint,headers:raw.headers,tags:raw.tags,schema,rows:raw.rows,isBuiltin:true};}

function getScore(itemId,fieldKey){const key=`${itemId}::${fieldKey}`;return state.progress[key]||{seen:0,correct:0,skips:0,interval:1,lastSeen:0,strangerScore:1.0};}
function saveScore(itemId,fieldKey,s){state.progress[`${itemId}::${fieldKey}`]=s;saveProgress();}
function updateScore(itemId,fieldKey,result,skipped){
  const s=getScore(itemId,fieldKey);s.seen++;s.lastSeen=Date.now();
  if(skipped){s.skips=(s.skips||0)+1;s.interval=1;s.strangerScore=Math.max(0,(s.strangerScore||1)-0.3);}
  else if(result==='correct'){s.correct++;s.strangerScore=Math.min(5,(s.strangerScore||1)+0.6);const boost=1+(s.strangerScore/5);s.interval=Math.min((s.interval||1)*boost*1.5,MAX_INTERVAL_DAYS);}
  else if(result==='partial'){s.strangerScore=Math.min(5,(s.strangerScore||1)+0.2);s.interval=Math.max(1,(s.interval||1)*0.75);}
  else{s.strangerScore=Math.max(0,(s.strangerScore||1)-0.5);s.interval=Math.max(1,(s.interval||1)*0.4);}
  saveScore(itemId,fieldKey,s);
}
function getItemAccuracy(itemId,fields){if(!fields.length)return 0;let correct=0,total=0;for(const f of fields){const s=getScore(itemId,f.key);const answered=s.seen-(s.skips||0);if(answered>0){total++;correct+=s.correct/answered>=LEVEL_UNLOCK_THRESHOLD?1:0;}}return total===0?0:correct/total;}
function getItemLevel(itemId){for(let lv=4;lv>=1;lv--){const fields=getFieldsForLevel(lv);if(!fields.length)continue;if(lv===1)return 1;const prevFields=getFieldsForLevel(lv-1);if(!prevFields.length)return lv;if(getItemAccuracy(itemId,prevFields)>=LEVEL_UNLOCK_THRESHOLD)return lv;}return 1;}

function getItemValue(item,f){if(typeof f==='number')return item[state.schema.fields[f]?.key]||'';return item[f.key]||'';}
function getPrimaryVal(item){const s=state.schema;return s.primaryIdx>=0?getItemValue(item,s.primaryIdx):'';}

function pickQuestion(item){
  const itemLevel=getItemLevel(item._id);const schema=state.schema;
  const candidates=[];
  for(let lv=1;lv<=itemLevel;lv++)candidates.push(...getFieldsForLevel(lv));
  if(schema.primaryIdx>=0)candidates.push({...schema.fields[schema.primaryIdx],role:'primary',_isHeader:true});
  if(schema.displayIdx>=0)candidates.push({...schema.fields[schema.displayIdx],role:'display',_isHeader:true});
  if(schema.categoryIdx>=0)candidates.push({...schema.fields[schema.categoryIdx],role:'category',_isHeader:true});
  if(!candidates.length)return null;
  const now=Date.now();
  const weighted=candidates.map(f=>{const s=getScore(item._id,f.key);const due=s.lastSeen+(s.interval||1)*60000;const answered=Math.max(1,(s.seen||0)-(s.skips||0));const ratio=(s.correct||0)/answered;const overdue=Math.max(0,now-due);const priority=s.seen===0?1e9:overdue+(1-ratio)*1e6;return{f,priority};});
  weighted.sort((a,b)=>b.priority-a.priority);
  const top=weighted.slice(0,Math.max(1,Math.ceil(weighted.length*0.4)));
  const field=top[Math.floor(Math.random()*top.length)].f;
  const correctVal=getItemValue(item,field);
  const dn=getDisplayVal(item)||getPrimaryVal(item);
  const QP={bloom:`When does ${dn} bloom? (months)`,flowering_months:`When does ${dn} bloom? (months)`,flower_color:`What color are the flowers of ${dn}?`,height:`What is the typical height of ${dn}?`,height__feet_:`What is the typical height of ${dn}?`,sun:`What are the sun/light requirements for ${dn}?`,sun_exposure:`What are the sun/light requirements for ${dn}?`,moisture:`What are the soil moisture requirements for ${dn}?`,soil_moisture:`What are the soil moisture requirements for ${dn}?`,family:`What plant family does ${dn} belong to?`,plant_family:`What plant family does ${dn} belong to?`,growth_rate:`What is the growth rate of ${dn}?`,drought_tolerance:`How does ${dn} tolerate drought?`,pollinator_value:`What is the pollinator value of ${dn}?`,lifespan:`What is the lifespan of ${dn}?`,soil_texture:`What soil texture does ${dn} prefer?`,ph_range:`What is the preferred soil pH range for ${dn}?`,ph__range_:`What is the preferred soil pH range for ${dn}?`,growth_form:`What is the growth form of ${dn}?`,leaf_retention:`Is ${dn} deciduous or evergreen?`,propagation:`How is ${dn} typically propagated?`,monarchs:`Does ${dn} support monarchs?`,hummingbirds:`Does ${dn} attract hummingbirds?`,workhorse:`What is the ecological role designation of ${dn}?`,showy:`Are the flowers of ${dn} considered showy?`};
  let questionText='';
  if(field.role==='primary')questionText='What is the scientific name of this organism?';
  else if(field.role==='display')questionText='What is the common name?';
  else if(field.role==='category')questionText=`What is the ${field.name.toLowerCase()}?`;
  else questionText=QP[field.key]||`What is the ${field.name.toLowerCase()} of ${dn}?`;
  return{field,questionText,answer:correctVal};
}

function pickNextItem(){
  if(!state.dataset)return null;
  let items=state.dataset.rows;
  const schema=state.schema;
  if(state.filterCategory&&state.filterCategory!=='all'){const catKey=schema.categoryIdx>=0?schema.fields[schema.categoryIdx].key:null;if(catKey)items=items.filter(it=>(it[catKey]||'').toLowerCase().includes(state.filterCategory.toLowerCase()));}
  if(!items.length)items=state.dataset.rows;
  const now=Date.now();
  const scored=items.map(item=>{
    const itemLevel=getItemLevel(item._id);const fields=[];
    for(let lv=1;lv<=itemLevel;lv++)fields.push(...getFieldsForLevel(lv));
    let minDue=Infinity,minRatio=1;
    for(const f of fields){const s=getScore(item._id,f.key);const due=s.lastSeen+(s.interval||1)*60000;const answered=Math.max(1,(s.seen||0)-(s.skips||0));const ratio=(s.correct||0)/answered;if(s.seen===0){minDue=0;minRatio=0;break;}minDue=Math.min(minDue,due);minRatio=Math.min(minRatio,ratio);}
    const overdue=Math.max(0,now-minDue);const jitter=Math.random()*1000;
    const isUnseen=fields.every(f=>getScore(item._id,f.key).seen===0);
    const priority=isUnseen?(1e6+jitter):(overdue+(1-minRatio)*1e6+jitter*0.01);
    return{item,priority};
  });
  scored.sort((a,b)=>b.priority-a.priority);
  const top=scored.slice(0,Math.max(1,Math.ceil(scored.length*0.3)));
  return top[Math.floor(Math.random()*top.length)].item;
}

function getStats(){
  if(!state.dataset)return{total:0,seen:0,known:0,unseen:0,avgCoach:'—'};
  const items=state.dataset.rows;let seen=0,known=0,coachSum=0,coachCount=0;

  return{total:items.length,seen,known,unseen:items.length-seen,avgCoach:coachCount>0?(coachSum/coachCount).toFixed(1):'1.0'};
}

function levenshtein(a,b){const m=a.length,n=b.length;const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[m][n];}
function fuzzyMatch(answer,target){const a=answer.toLowerCase().trim();const t=target.toLowerCase().trim();if(a===t)return true;if(t.includes(a)&&a.length>=4)return true;if(a.includes(t))return true;return levenshtein(a,t)<=Math.max(2,Math.floor(t.length*0.15));}

function coachMeterHTML(itemId){
  const fields=getAskableFields();let scoreSum=0,scoreCount=0;
  for(const f of fields){const s=getScore(itemId,f.key);if(s.seen>0){scoreSum+=(s.strangerScore||1);scoreCount++;}}
  const score=scoreCount>0?scoreSum/scoreCount:1.0;const pct=(score/5)*100;
  const cls=score>=3.5?'high':score>=2?'mid':'low';const barColor=score>=3.5?'var(--green2)':score>=2?'var(--amber)':'var(--red2)';
  const quotes=score>=3.5?COACH_HIGH:score>=2?COACH_MID:COACH_LOW;
  const seen=fields.reduce((acc,f)=>acc+getScore(itemId,f.key).seen,0);
  const quote=quotes[seen%quotes.length];
  return`<div class="coach-wrap"><div class="coach-row"><span class="coach-lbl">Coach's read</span><span class="coach-score ${cls}">${score.toFixed(1)} / 5</span></div><div class="coach-bar-wrap"><div class="coach-bar" style="width:${pct}%;background:${barColor};"></div></div><div class="coach-quote">${quote}</div></div>`;
}

function cardHeaderHTML(item,q,schema){
  const af=q?.field;const askP=af?.role==='primary';const askD=af?.role==='display';const askC=af?.role==='category';
  const pv=getPrimaryVal(item);const dv=getDisplayVal(item);const cv=getCategoryVal(item);
  const lv=getItemLevel(item._id);const l1=getFieldsForLevel(1);const l1acc=l1.length>0?getItemAccuracy(item._id,l1):0;
  const l1pct=Math.round(l1acc*100);const hasSeen=l1.some(f=>getScore(item._id,f.key).seen>0);
  const barColor=l1pct>=75?'var(--green2)':l1pct>=40?'var(--amber)':'var(--red2)';
  const sciHTML=askP?`<div class="species-hidden">? ? ?</div>`:pv?`<div class="species-sci">${pv}</div>`:'';
  const comHTML=askD?`<div class="species-hidden" style="font-size:1rem;">? ? ?</div>`:dv?`<div class="species-common">${dv}</div>`:'';
  const catHTML=askC?`<span class="type-badge hidden-badge">?</span>`:cv?`<span class="type-badge">${cv}</span>`:'';
  const mastery=`<div class="mastery-inline"><span class="mastery-level-tag l${lv}">L${lv}</span><div class="mastery-track"><div class="mastery-fill" style="width:${l1pct}%;background:${barColor};"></div></div><span class="mastery-pct">${hasSeen?l1pct+'%':'\u2014'}</span></div>`;
  return`<div class="card-header"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;"><div style="min-width:0;">${sciHTML}${comHTML}</div><div style="flex-shrink:0;text-align:right;padding-top:0.1rem;">${mastery}</div></div><div style="margin-top:0.2rem;">${catHTML}</div></div>`;
}

function renderStudy(){
  if(!state.dataset||!state.current||!state.question){initCard();if(!state.current)return'<div class="empty-state">No items to study.</div>';}
  const item=state.current;const q=state.question;const schema=state.schema;
  const stats=getStats();const todayAnswered=state.session?.todayAnswered||0;const streak=state.session?.consec||0;const dailyStreak=state.session?.streak||0;
  const pctKnown=stats.total>0?Math.round(stats.known/stats.total*100):0;const isFS=state.activeDatasetTab==='forsale';
  const catKey=schema.categoryIdx>=0?schema.fields[schema.categoryIdx].key:null;
  const categories=catKey?[...new Set(state.dataset.rows.map(it=>(it[catKey]||'').split(';')[0].trim()).filter(Boolean))].sort():[];
  const catOptions=['<option value="all">All</option>',...categories.map(c=>`<option value="${c}" ${state.filterCategory===c?'selected':''}>${c}</option>`)].join('');
  let cardClass='ask-card'+(isFS?' forsale-card':'');let cardContent='';
  if(state.mode==='namequiz'){cardContent=renderNameQuizCard(item,q,schema);if(state.phase==='answered'){const g=state.gradeResult?.grade;cardClass=g==='CORRECT'?'result-correct':'result-wrong';}}
  else if(state.phase==='ask'){cardContent=renderOpenEndedAsk(item,q,schema);}
  else if(state.grading){cardClass='result-neutral';cardContent=renderGrading(item,q);}
  else{const g=state.gradeResult?.grade;cardClass=g==='CORRECT'?'result-correct':g==='PARTIAL'?'result-partial':'result-wrong';cardContent=renderOpenEndedResult(item,q,schema);}
  const fsBadge=isFS?`<div class="forsale-badge">\uD83C\uDFF7 For Sale Now \u00b7 ${stats.total} species</div>`:'';
  return`<div class="profile-bar">${renderProfileBar()}</div>
<div class="stats-bar">
  <div class="stat"><span class="val">${todayAnswered}</span><span class="lbl">Today</span></div>
  <div class="stat" title="Consecutive correct"><span class="val">${streak}${streak>=3?' \uD83D\uDD25':''}</span><span class="lbl">Streak</span></div>
  <div class="stat" title="Days studied"><span class="val">${dailyStreak}</span><span class="lbl">Days</span></div>
  <div class="stat"><span class="val">${stats.known}</span><span class="lbl">Known</span></div>
  <div class="stat"><span class="val">${pctKnown}%</span><span class="lbl">Mastered</span></div>
  <div class="stat" title="Coach avg"><span class="val" style="color:${parseFloat(stats.avgCoach)>=3.5?'var(--green2)':parseFloat(stats.avgCoach)>=2?'var(--amber)':'var(--red2)'}">${stats.avgCoach}</span><span class="lbl">Coach</span></div>
</div>
${fsBadge}
<div class="mode-tabs">
  <button class="mode-tab${state.mode==='openended'?' active':''}" onclick="setMode('openended')">Open-ended Q&A</button>
  <button class="mode-tab${state.mode==='namequiz'?' active':''}" onclick="setMode('namequiz')">Name Quiz</button>
</div>
<div class="filter-bar">${catKey?`<label>Type:</label><select onchange="setFilter(this.value,'category')">${catOptions}</select>`:''}</div>
<div class="card ${cardClass} card-swipeable">
  <span class="swipe-hint swipe-hint-right">\u2713 GOT IT</span>
  <span class="swipe-hint swipe-hint-left">${state.phase==='ask'?'\u2192 SKIP':'\u2717 MISSED'}</span>
  ${cardContent}
</div>`;
}

function renderOpenEndedAsk(item,q,schema){return`${cardHeaderHTML(item,q,schema)}<hr class="divider"><div class="question-text">${q.questionText}</div>${coachMeterHTML(item._id)}<textarea class="answer-input" id="answerInput" rows="2" placeholder="Type your answer\u2026 Enter to submit \u00b7 Esc to skip"></textarea><div class="btn-row"><button class="btn btn-primary" onclick="submitAnswer()">Submit</button><button class="btn btn-secondary" onclick="skipCard()">Skip</button></div>`;}
function renderGrading(item,q){return`${cardHeaderHTML(item,q,state.schema)}<hr class="divider"><div class="question-text">${q.questionText}</div><div style="margin:1.2rem 0;display:flex;align-items:center;gap:0.6rem;color:var(--ink3);font-size:14px;"><span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span><span>Thinking</span></div><div style="font-size:13px;color:var(--ink3);">Your answer: <em>${state.userAnswer}</em></div>`;}
function renderOpenEndedResult(item,q,schema){
  const r=state.gradeResult;const skipped=r?.grade==='SKIPPED';const correct=r?.grade==='CORRECT';const partial=r?.grade==='PARTIAL';
  const cls=skipped?'wrong':correct?'correct':partial?'partial':'wrong';
  const label=skipped?'\u2192 Skipped':correct?'\u2713 Correct':partial?'\u25d0 Partial credit':'\u2717 Incorrect';
  const funFact=getNotesVal(item)||getNotesAltVal(item)||(item._generatedFact||'');
  return`${cardHeaderHTML(item,null,schema)}<hr class="divider"><div class="result-banner ${cls}">${label}</div>${!skipped&&r?.feedback?`<div class="ai-grade">${r.feedback}</div>`:''}<div class="correct-answer">Correct answer: <strong>${q.answer}</strong></div>${state.userAnswer?`<div style="font-size:13px;color:var(--ink3);margin-bottom:0.4rem;">Your answer: <em>${state.userAnswer}</em></div>`:''} ${photoPlaceholderHTML(item._id)}${funFact?`<div class="fun-fact"><div class="fun-fact-lbl">Note</div>${funFact}</div>`:''} ${coachMeterHTML(item._id)}<hr class="divider">${skipped?`<button id="btnGotIt" class="btn btn-primary" onclick="initCard();render()">Next \u2192</button>`:`<div class="btn-row"><button id="btnGotIt" class="btn btn-correct" onclick="markResult('correct')">\u2713 Got it</button><button class="btn btn-partial" onclick="markResult('partial')">~ Partial</button><button class="btn btn-wrong" onclick="markResult('wrong')">\u2717 Missed</button></div>`}`;
}
function renderNameQuizCard(item,q,schema){
  if(state.phase==='ask'){
    const pv=getPrimaryVal(item);const lv=getItemLevel(item._id);const l1=getFieldsForLevel(1);const l1acc=l1.length>0?getItemAccuracy(item._id,l1):0;const l1pct=Math.round(l1acc*100);const hasSeen=l1.some(f=>getScore(item._id,f.key).seen>0);const barColor=l1pct>=75?'var(--green2)':l1pct>=40?'var(--amber)':'var(--red2)';
    return`<div class="card-header"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;"><div class="species-sci" style="font-size:1.6rem;">${pv}</div><div style="flex-shrink:0;padding-top:0.2rem;"><div class="mastery-inline"><span class="mastery-level-tag l${lv}">L${lv}</span><div class="mastery-track"><div class="mastery-fill" style="width:${l1pct}%;background:${barColor};"></div></div><span class="mastery-pct">${hasSeen?l1pct+'%':'\u2014'}</span></div></div></div></div>${coachMeterHTML(item._id)}<div class="question-text">What is the common name?</div><input type="text" class="answer-input" id="answerInput" placeholder="Type the common name\u2026" value="${state.userAnswer}" autocomplete="off"><div class="btn-row"><button class="btn btn-primary" onclick="submitNameQuiz()">Submit</button><button class="btn btn-secondary" onclick="skipCard()">Skip</button></div>`;
  }
  const r=state.gradeResult;const skipped=r?.grade==='SKIPPED';const correct=r?.grade==='CORRECT';
  const cls=skipped?'wrong':correct?'correct':'wrong';const label=skipped?'\u2192 Skipped':correct?'\u2713 Correct \u2014 confirm below':'\u2717 Not quite \u2014 confirm below';
  const funFact=getNotesVal(item)||(item._generatedFact||'');
  return`${cardHeaderHTML(item,null,schema)}<hr class="divider"><div class="result-banner ${cls}">${label}</div><div class="correct-answer">Common name: <strong>${getDisplayVal(item)}</strong></div>${state.userAnswer?`<div style="font-size:13px;color:var(--ink3);margin-bottom:0.4rem;">Your answer: <em>${state.userAnswer}</em></div>`:''} ${photoPlaceholderHTML(item._id)}${funFact?`<div class="fun-fact"><div class="fun-fact-lbl">Note</div>${funFact}</div>`:''} ${coachMeterHTML(item._id)}<hr class="divider">${skipped?`<button id="btnGotIt" class="btn btn-primary" onclick="initCard();render()">Next \u2192</button>`:`<div class="btn-row"><button id="btnGotIt" class="btn btn-correct" onclick="markResult('correct')">\u2713 Got it</button><button class="btn btn-partial" onclick="markResult('partial')">~ Partial</button><button class="btn btn-wrong" onclick="markResult('wrong')">\u2717 Missed</button></div>`}`;
}

function renderBrowse(){
  const sorted=[...state.dataset.rows].sort((a,b)=>(getPrimaryVal(a)||'').localeCompare(getPrimaryVal(b)||''));
  const items=sorted.map(item=>{const dc=getDotClass(item._id);const dotColor=dc==='known'?'var(--green2)':dc==='learning'?'var(--amber2)':dc==='struggling'?'var(--red2)':'var(--paper3)';return`<div class="species-item" onclick="viewSpecies('${item._id}')"><span class="score-dot" style="background:${dotColor}"></span><span class="sci">${getPrimaryVal(item)}</span><span class="com">${getDisplayVal(item)}</span>${getScoreChipHTML(item._id)}</div>`;}).join('');
  return`<div class="species-list">${items}</div>`;
}
function renderSpeciesDetail(itemId){
  const item=state.dataset.rows.find(it=>it._id===itemId);if(!item)return'<div class="empty-state">Item not found.</div>';
  const schema=state.schema;
  const attrFields=schema.fields.filter(f=>{const lv=getEffectiveLevel(f);return lv!==null&&!['primary','display','category','id','notes','notes_alt'].includes(f.role);});
  const attrRows=attrFields.map(f=>{const val=getItemValue(item,f);return`<div class="attr-row"><span class="attr-lbl">${f.name}</span><span class="attr-val${val?'':' empty'}">${val||'\u2014'}</span></div>`;}).join('');
  const notes=getNotesVal(item);const notesAlt=getNotesAltVal(item);
  return`<button class="btn btn-secondary btn-sm" onclick="setView('browse')" style="margin-bottom:0.75rem;">\u2190 Back</button><div class="card ask-card"><div style="margin-bottom:0.5rem;">${getScoreChipHTML(item._id)}</div><div class="species-sci">${getPrimaryVal(item)}</div><div class="species-common">${getDisplayVal(item)}</div>${getCategoryVal(item)?`<span class="type-badge">${getCategoryVal(item)}</span>`:''}<hr class="divider">${photoPlaceholderHTML(item._id)}<div class="attr-grid" style="margin-top:0.75rem;">${attrRows}</div>${notesAlt?`<div class="fun-fact" style="margin-top:0.75rem;"><div class="fun-fact-lbl">Also known as</div>${notesAlt}</div>`:''} ${notes?`<div class="fun-fact" style="margin-top:0.5rem;"><div class="fun-fact-lbl">Notes</div>${notes}</div>`:''}</div><button class="btn btn-primary btn-sm" onclick="studyThis('${item._id}')">Study this species \u2192</button>`;
}

function renderProfileBar(){const chips=state.profiles.map(p=>`<button class="profile-chip${p===state.activeProfile?' active':''}" onclick="switchProfile('${p}')">${p}</button>`).join('');const addBtn=state.addingProfile?`<input class="profile-input" id="profileInput" placeholder="Name\u2026" onkeydown="onProfileKey(event)" autofocus>`:`<button class="profile-add" onclick="startAddProfile()">+ Add</button>`;return chips+addBtn;}

function renderLoader(){return`<div class="loader-screen"><h2>Load Your Dataset</h2><p>Upload a CSV with two header rows:<br><strong>Row 1</strong> \u2014 column names &nbsp;|&nbsp; <strong>Row 2</strong> \u2014 role/level tags<br><a href="#" onclick="showCSVHelp();return false;" style="color:var(--green);font-size:13px;">How to format your CSV \u2193</a></p><div class="drop-zone" id="dropZone"><input type="file" id="csvFile" accept=".csv,.tsv,.txt"><div class="drop-zone-label"><div style="font-size:2rem;margin-bottom:0.5rem;">\uD83D\uDCC2</div><strong>Click to choose a CSV</strong><br><span style="font-size:13px;">or drag and drop here</span></div></div><div id="csvPreview"></div><div id="csvHelp" style="display:none;margin-top:1.25rem;text-align:left;"><div class="card" style="border-left-color:var(--amber);"><strong style="font-size:13px;color:var(--amber);">Row 2 tag reference</strong><div style="margin-top:0.5rem;font-size:12px;"><span class="tag-chip tag-primary">primary</span> Scientific name &nbsp;<span class="tag-chip tag-display">display</span> Common name &nbsp;<span class="tag-chip tag-category">category</span> Type &nbsp;<span class="tag-chip tag-notes">notes</span> Fun fact &nbsp;<span class="tag-chip tag-id">id</span> Unique key &nbsp;<span class="tag-chip tag-level1">1</span>\u2013<span class="tag-chip tag-level4">4</span> Level &nbsp;<span class="tag-chip tag-skip">(blank)</span> Skip</div></div></div></div>`;}

function renderSettings(){
  if(!state.dataset)return`<div class="settings-screen"><div class="empty-state">No dataset loaded. <a href="#" onclick="showScreen('loader');return false;" style="color:var(--green);">Load a CSV first.</a></div></div>`;
  const schema=state.schema;const ds=state.fullDataset;
  const buckets={1:[],2:[],3:[],4:[],0:[]};
  schema.fields.forEach(f=>{if(['primary','display','category','id','notes','notes_alt'].includes(f.role))return;const lv=getEffectiveLevel(f);if(lv&&buckets[lv])buckets[lv].push(f);else buckets[0].push(f);});
  function bHTML(level,label,cls,fields){const pills=fields.map(f=>`<span class="field-pill" draggable="true" data-field="${encodeURIComponent(f.name)}" ondragstart="onPillDragStart(event)" ondragend="onPillDragEnd(event)">${f.name}</span>`).join('');return`<div class="level-bucket ${cls}" data-level="${level}" ondragover="onBucketDragOver(event)" ondrop="onBucketDrop(event)" ondragleave="onBucketDragLeave(event)"><h4>${label}</h4><div id="bucket_${level}">${pills||'<span style="font-size:11px;color:var(--ink3);font-style:italic;">Drop fields here</span>'}</div></div>`;}
  return`<div class="settings-screen"><div style="margin-bottom:0.9rem;padding:0.5rem 0.85rem;background:var(--paper2);border-left:3px solid var(--paper3);border-radius:0 4px 4px 0;font-size:12px;color:var(--ink3);">Built-in dataset v2 \u2014 ${ds.rows.length} species total, ${state.forSaleDataset.rows.length} for sale.</div><div class="settings-section"><h3>Dataset</h3><div class="dataset-info"><strong>${ds.name}</strong><br>${ds.rows.length} species &nbsp;\u00b7&nbsp; ${schema.fields.length} columns &nbsp;\u00b7&nbsp; Fingerprint: <code style="font-size:11px;">${ds.fingerprint}</code></div><div class="io-row"><button class="btn btn-secondary btn-sm" onclick="showScreen('loader')">\u2191 Load new CSV</button><button class="btn btn-secondary btn-sm" onclick="exportProgress()">\u2193 Export progress</button><label class="btn btn-secondary btn-sm" style="cursor:pointer;">\u2191 Import progress<input type="file" accept=".json" style="display:none" onchange="importProgress(this)"></label></div></div><div class="settings-section"><h3>Level Configuration</h3><p style="font-size:13px;color:var(--ink3);margin-bottom:0.75rem;">Drag fields between levels. Saved automatically.</p><div class="level-buckets">${bHTML(1,'Level 1 \u2014 Basic ID','lv1',buckets[1])}${bHTML(2,'Level 2 \u2014 Ecology','lv2',buckets[2])}${bHTML(3,'Level 3 \u2014 Culture','lv3',buckets[3])}${bHTML(4,'Level 4 \u2014 Expert','lv4',buckets[4])}${bHTML(0,'Skip \u2014 Never ask','lv-skip',buckets[0])}</div><div style="margin-top:0.6rem;"><button class="btn btn-secondary btn-sm" onclick="resetOverrides()">Reset to CSV defaults</button></div></div><div class="settings-section"><h3>Profiles</h3><div class="profile-bar" style="margin-bottom:0;">${renderProfileBar()}</div></div></div>`;
}
function render(){
  const root=document.getElementById('root');if(!root)return;
  const hd=document.getElementById('headerDataset');if(hd)hd.textContent=state.dataset?state.dataset.name:'No dataset loaded';
  updateHeaderStyle();
  if(state.screen==='settings'){
    const loaderSection=state._settingsShowLoader?`<div class="settings-section" id="loaderSection">${renderLoader()}</div>`:'';
    root.innerHTML=`<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;"><button class="btn btn-secondary btn-sm" onclick="showScreen('study')">\u2190 Back to study</button><span style="font-size:1.1rem;font-family:'Playfair Display',serif;color:var(--green);">Settings</span></div>${loaderSection}${renderSettings()}`;
    setupDropZone();setupDragDrop();return;
  }
  const isFS=state.activeDatasetTab==='forsale';
  const navBar=`<div class="nav-bar"><div class="nav-item${state.view==='study'&&!isFS?' active':''}" onclick="switchDatasetTab('all');setView('study')">Study</div><div class="nav-item${state.view==='browse'&&!isFS?' active':''}" onclick="switchDatasetTab('all');setView('browse')">Browse All</div><div class="nav-item forsale-tab${isFS?' active forsale':''}" onclick="switchDatasetTab('forsale')" title="Study only for-sale species">\uD83C\uDFF7 For Sale</div></div>`;
  let content='';
  if(state.view==='browse')content=renderBrowse();
  else if(state.view==='species')content=renderSpeciesDetail(state.speciesId);
  else content=renderStudy();
  root.innerHTML=navBar+content;
  const inp=document.getElementById('answerInput');
  if(inp){inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(state.mode==='namequiz')submitNameQuiz();else submitAnswer();}else if(e.key==='Escape'){e.preventDefault();skipCard();}});inp.focus();}
  const gotIt=document.getElementById('btnGotIt');if(gotIt)gotIt.focus();
  if(state.current&&state.phase==='answered'&&document.getElementById(`photoWrap_${state.current._id}`))loadAndInjectPhoto(state.current);
  if(state.view==='species'&&state.speciesId){const si=state.dataset?.rows.find(it=>it._id===state.speciesId);if(si&&document.getElementById(`photoWrap_${state.speciesId}`))loadAndInjectPhoto(si);}
  setupSwipeGestures();
  const pi=document.getElementById('profileInput');if(pi)pi.focus();
}

function showScreen(s){if(s==='loader'){state.screen='settings';state._settingsShowLoader=true;}else{state.screen=s;state._settingsShowLoader=false;}if(s==='study'&&state.dataset&&!state.current)initCard();render();}
function setView(v){state.view=v;render();}
function setMode(m){state.mode=m;initCard();render();}
function setFilter(val){state.filterCategory=val;initCard();render();}
function viewSpecies(id){state.view='species';state.speciesId=id;render();}
function studyThis(id){state.view='study';const item=state.dataset.rows.find(it=>it._id===id);state.current=item;state.question=item?pickQuestion(item):null;state.phase='ask';state.userAnswer='';state.gradeResult=null;render();}
function showCSVHelp(){const el=document.getElementById('csvHelp');if(el)el.style.display=el.style.display==='none'?'block':'none';}

function skipCard(){if(state.current&&state.question){updateScore(state.current._id,state.question.field.key,'wrong',true);recordAnswer(false);state.userAnswer='';state.gradeResult={grade:'SKIPPED',feedback:''};state.phase='answered';state.skipped=true;render();}else{initCard();render();}}
function submitNameQuiz(){
  const inp=document.getElementById('answerInput');const answer=(inp?inp.value.trim():'').toLowerCase();if(!answer){skipCard();return;}
  state.userAnswer=inp.value.trim();const item=state.current;
  const targets=[getDisplayVal(item),getNotesAltVal(item)].filter(Boolean);
  const isCorrect=targets.some(t=>fuzzyMatch(answer,t));
  state.gradeResult={grade:isCorrect?'CORRECT':'WRONG',feedback:''};state.phase='answered';
  if(!getNotesVal(item)&&!item._generatedFact)generateFunFact(item).then(fact=>{if(fact){item._generatedFact=fact;render();}});
  render();
}
async function submitAnswer(){
  const inp=document.getElementById('answerInput');const answer=inp?inp.value.trim():'';if(!answer){skipCard();return;}
  state.userAnswer=answer;state.phase='answered';state.grading=true;render();
  const result=await gradeAnswer(state.question.questionText,state.question.answer,answer);
  state.gradeResult=result;state.grading=false;
  if(!getNotesVal(state.current)&&!state.current._generatedFact)generateFunFact(state.current).then(fact=>{if(fact){state.current._generatedFact=fact;render();}});
  render();
}
function markResult(result){recordAnswer(result==='correct');updateScore(state.current._id,state.question.field.key,result,false);initCard();render();}

function switchProfile(name){state.activeProfile=name;if(state.dataset){state.progress=loadProgress(state.dataset.fingerprint,name);state.session=loadSession(state.dataset.fingerprint,name);state.levelOverrides=loadOverrides(state.fullDataset.fingerprint);}initCard();render();}
function startAddProfile(){state.addingProfile=true;render();}
function onProfileKey(e){if(e.key==='Enter'){const val=e.target.value.trim();if(val&&!state.profiles.includes(val)){state.profiles.push(val);saveProfiles();}state.addingProfile=false;if(val)switchProfile(val);else render();}else if(e.key==='Escape'){state.addingProfile=false;render();}}

function setupDropZone(){
  const zone=document.getElementById('dropZone');const fi=document.getElementById('csvFile');if(!zone||!fi)return;
  zone.addEventListener('click',()=>fi.click());fi.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over');});zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
  zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag-over');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
}
function loadFile(file){
  const reader=new FileReader();
  reader.onload=e=>{try{
    const dataset=buildDataset(e.target.result,file.name);
    const lastMeta=JSON.parse(localStorage.getItem('sptrain_last_dataset')||'null');
    if(lastMeta&&lastMeta.fingerprint===dataset.fingerprint){activateDataset(dataset);return;}
    const hasExisting=state.profiles.some(p=>Object.keys(loadProgress(dataset.fingerprint,p)).length>0);
    if(hasExisting){activateDataset(dataset);}else{showCSVPreview(dataset,file.name);state.pendingDataset=dataset;}
  }catch(err){const p=document.getElementById('csvPreview');if(p)p.innerHTML=`<div style="color:var(--red2);font-size:13px;margin-top:0.75rem;">Error: ${err.message}</div>`;}};
  reader.readAsText(file);
}
function showCSVPreview(dataset,filename){
  const previewFields=dataset.schema.fields.slice(0,8);
  function tch(f){const lv=f.role.match(/^level(\d)$/);if(lv)return`<span class="tag-chip tag-level${lv[1]}">L${lv[1]}</span>`;if(f.role==='primary')return`<span class="tag-chip tag-primary">primary</span>`;if(f.role==='display')return`<span class="tag-chip tag-display">display</span>`;if(f.role==='category')return`<span class="tag-chip tag-category">category</span>`;if(f.role==='notes'||f.role==='notes_alt')return`<span class="tag-chip tag-notes">notes</span>`;if(f.role==='id')return`<span class="tag-chip tag-id">id</span>`;return`<span class="tag-chip tag-skip">skip</span>`;}
  const hr=previewFields.map(f=>`<th>${f.name}</th>`).join('');
  const tr=previewFields.map(f=>`<td class="row-label">${tch(f)}</td>`).join('');
  const dr=dataset.rows.slice(0,3).map(row=>`<tr>${previewFields.map(f=>`<td>${row[f.key]||''}</td>`).join('')}</tr>`).join('');
  const more=dataset.schema.fields.length-8;
  document.getElementById('csvPreview').innerHTML=`<div class="csv-preview">${dataset.autoTagged?`<div style="margin-bottom:0.6rem;padding:0.4rem 0.75rem;background:var(--amber3);border-left:3px solid var(--amber);border-radius:0 4px 4px 0;font-size:12px;color:var(--ink2);"><strong>No tag row detected</strong> \u2014 levels auto-assigned from column names.</div>`:''}<div style="font-size:13px;color:var(--ink3);margin-bottom:0.5rem;"><strong style="color:var(--ink);">${dataset.name}</strong> \u2014 ${dataset.rows.length} items, ${dataset.schema.fields.length} columns${more>0?` <span style="color:var(--ink3)">(+${more} more)</span>`:''}</div><table><tr>${hr}</tr><tr>${tr}</tr>${dr}</table><div style="margin-top:0.75rem;display:flex;gap:0.5rem;"><button class="btn btn-primary" onclick="confirmLoadDataset()">Load this dataset</button><button class="btn btn-secondary" onclick="cancelLoadDataset()">Cancel</button></div></div>`;
}
function confirmLoadDataset(){if(state.pendingDataset){activateDataset(state.pendingDataset);state.pendingDataset=null;}}

function activateDataset(dataset){
  state.fullDataset=dataset;state.forSaleDataset=buildForSaleDataset(dataset);
  state.dataset=state.activeDatasetTab==='forsale'?state.forSaleDataset:dataset;
  state.schema=dataset.schema;state._settingsShowLoader=false;

function exportProgress(){
  if(!state.dataset)return;const fp=state.fullDataset.fingerprint;
  const payload={version:APP_VERSION,exported:new Date().toISOString(),fingerprint:fp,datasetName:state.fullDataset.name,profiles:state.profiles,progressByProfile:{},sessionByProfile:{},levelOverrides:state.levelOverrides,forsaleProgressByProfile:{}};
  for(const p of state.profiles){payload.progressByProfile[p]=loadProgress(fp,p);payload.sessionByProfile[p]=loadSession(fp,p);}
  const fsFp=state.forSaleDataset.fingerprint;for(const p of state.profiles){payload.forsaleProgressByProfile[p]=loadProgress(fsFp,p);}
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`species_trainer_${fp}_${new Date().toISOString().slice(0,10)}.json`;a.style.display='none';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importProgress(input){
  const file=input.files[0];if(!file)return;const reader=new FileReader();
  reader.onload=e=>{try{
    const payload=JSON.parse(e.target.result);if(!payload.fingerprint||!payload.progressByProfile)throw new Error('Invalid progress file');
    if(payload.fingerprint!==state.fullDataset?.fingerprint){if(!confirm(`This file is for "${payload.datasetName}" (${payload.fingerprint}). Import anyway?`))return;}
    for(const p of(payload.profiles||[])){if(!state.profiles.includes(p))state.profiles.push(p);}saveProfiles();
    const fp=state.fullDataset?.fingerprint||payload.fingerprint;
    for(const[p,prog]of Object.entries(payload.progressByProfile||{}))localStorage.setItem(`sptrain_${fp}_${p}_progress`,JSON.stringify(prog));
    for(const[p,sess]of Object.entries(payload.sessionByProfile||{}))localStorage.setItem(`sptrain_${fp}_${p}_session`,JSON.stringify(sess));
    if(payload.levelOverrides){state.levelOverrides=payload.levelOverrides;saveOverrides();}
    state.progress=loadProgress(fp,state.activeProfile);state.session=loadSession(fp,state.activeProfile);
    alert(`Progress imported for ${Object.keys(payload.progressByProfile).length} profile(s).`);render();
  }catch(err){alert('Import failed: '+err.message);}};reader.readAsText(file);
}

function attemptV1Migration(dataset){
  if(Object.keys(state.progress).length>0)return;const v1prog=migrateV1();if(!v1prog)return;let migrated=0;
  for(const[itemId,s]of Object.entries(v1prog)){const item=dataset.rows.find(it=>it._id===itemId);if(!item)continue;const l1fields=getFieldsForLevel(1);for(const f of l1fields){const key=`${itemId}::${f.key}`;state.progress[key]={seen:s.seen||0,correct:s.correct||0,skips:s.skips||0,interval:s.interval||1,lastSeen:s.lastSeen||0,strangerScore:s.strangerScore||1.0};}migrated++;}
  if(migrated>0){saveProgress();console.log(`v1 migration: ${migrated} records`);}
}

function setupSwipeGestures(){
  const root=document.getElementById('root');if(!root)return;const card=root.querySelector('.card-swipeable');if(!card)return;
  let startX=0,currentX=0,isDragging=false;const THRESHOLD=80;
  const hR=card.querySelector('.swipe-hint-right');const hL=card.querySelector('.swipe-hint-left');
  card.addEventListener('touchstart',e=>{if(e.target.closest('textarea,input,select,button'))return;startX=e.touches[0].clientX;isDragging=true;card.classList.add('swiping');},{passive:true});
  card.addEventListener('touchmove',e=>{if(!isDragging)return;const dx=e.touches[0].clientX-startX;const dy=e.touches[0].clientY-(e.touches[0].clientY||0);if(Math.abs(dy)>Math.abs(dx)*1.5){isDragging=false;return;}currentX=dx;const pct=Math.min(Math.abs(dx)/THRESHOLD,1);card.style.transform=`translateX(${dx*0.4}px) rotate(${dx*0.02}deg)`;card.style.opacity=1-pct*0.2;if(hR)hR.style.opacity=dx>20?pct:0;if(hL)hL.style.opacity=dx<-20?pct:0;},{passive:true});
  card.addEventListener('touchend',()=>{if(!isDragging)return;isDragging=false;card.classList.remove('swiping');card.style.transform='';card.style.opacity='';if(hR)hR.style.opacity=0;if(hL)hL.style.opacity=0;if(currentX>THRESHOLD){if(state.phase==='answered'&&state.gradeResult?.grade!=='SKIPPED')markResult('correct');}else if(currentX<-THRESHOLD){if(state.phase==='ask')skipCard();else if(state.phase==='answered'&&state.gradeResult?.grade!=='SKIPPED')markResult('wrong');}currentX=0;},{passive:true});
}
