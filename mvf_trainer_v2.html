function renderStudy() {
  if (!state.dataset || !state.current || !state.question) { initCard(); if (!state.current) return '<div class="empty-state">No items to study.</div>'; }

  const item = state.current;
  const q    = state.question;
  const schema = state.schema;
  const stats = getStats();
  const todayAnswered = state.session?.todayAnswered || 0;
  const streak = state.session?.consec || 0;
  const dailyStreak = state.session?.streak || 0;
  const pctKnown = stats.total > 0 ? Math.round(stats.known / stats.total * 100) : 0;

  // Category filter
  const catKey = schema.categoryIdx >= 0 ? schema.fields[schema.categoryIdx].key : null;
  const categories = catKey ? [...new Set(state.dataset.rows.map(it => (it[catKey] || '').split(';')[0].trim()).filter(Boolean))].sort() : [];
  const catOptions = ['<option value="all">All</option>', ...categories.map(c => `<option value="${c}" ${state.filterCategory === c ? 'selected' : ''}>${c}</option>`)].join('');

  // Determine card class
  let cardClass = 'ask-card';
  let cardContent = '';

  if (state.mode === 'namequiz') {
    cardContent = renderNameQuizCard(item, q, schema, cardClass);
    if (state.phase === 'answered') {
      const g = state.gradeResult?.grade;
      cardClass = g === 'CORRECT' ? 'result-correct' : g === 'SKIPPED' ? 'result-wrong' : 'result-wrong';
    }
  } else {
    if (state.phase === 'ask') {
      cardContent = renderOpenEndedAsk(item, q, schema);
    } else if (state.grading) {
      cardClass = 'result-neutral';
      cardContent = renderGrading(item, q);
    } else {
      const g = state.gradeResult?.grade;
      cardClass = g === 'CORRECT' ? 'result-correct' : g === 'PARTIAL' ? 'result-partial' : 'result-wrong';
      cardContent = renderOpenEndedResult(item, q, schema);
    }
  }

  return `
    <div class="profile-bar">${renderProfileBar()}</div>
    <div class="stats-bar">
      <div class="stat"><span class="val">${todayAnswered}</span><span class="lbl">Today</span></div>
      <div class="stat" title="Consecutive correct answers this session"><span class="val">${streak}${streak >= 3 ? ' 🔥' : ''}</span><span class="lbl">Streak</span></div>
      <div class="stat" title="Days in a row you've studied"><span class="val">${dailyStreak}</span><span class="lbl">Days</span></div>
      <div class="stat"><span class="val">${stats.known}</span><span class="lbl">Known</span></div>
      <div class="stat"><span class="val">${pctKnown}%</span><span class="lbl">Mastered</span></div>
      <div class="stat" title="Coach's average read across all studied items"><span class="val" style="color:${parseFloat(stats.avgCoach)>=3.5?'var(--green2)':parseFloat(stats.avgCoach)>=2?'var(--amber)':'var(--red2)'}">${stats.avgCoach}</span><span class="lbl">Coach</span></div>
    </div>
    <div class="mode-tabs">
      <button class="mode-tab${state.mode==='openended'?' active':''}" onclick="setMode('openended')">Open-ended Q&A</button>
      <button class="mode-tab${state.mode==='namequiz'?' active':''}" onclick="setMode('namequiz')">Name Quiz</button>
    </div>
    <div class="filter-bar">
      ${catKey ? `<label>Type:</label><select onchange="setFilter(this.value,'category')">${catOptions}</select>` : ''}
    </div>
    <div class="card ${cardClass} card-swipeable">
      <span class="swipe-hint swipe-hint-right">✓ GOT IT</span>
      <span class="swipe-hint swipe-hint-left">${state.phase === 'ask' ? '→ SKIP' : '✗ MISSED'}</span>
      ${cardContent}
    </div>`;
}

function cardHeaderHTML(item, q, schema) {
  const askingField = q?.field;
  const askingPrimary  = askingField?.role === 'primary';
  const askingDisplay  = askingField?.role === 'display';
  const askingCategory = askingField?.role === 'category';

  const primaryVal  = getPrimaryVal(item);
  const displayVal  = getDisplayVal(item);
  const categoryVal = getCategoryVal(item);
  const lv = getItemLevel(item._id);

  // L1 mastery for the progress bar (always show L1 as the base unlock metric)
  const l1fields = getFieldsForLevel(1);
  const l1acc = l1fields.length > 0 ? getItemAccuracy(item._id, l1fields) : 0;
  const l1pct = Math.round(l1acc * 100);
  const l1HasSeen = l1fields.some(f => getScore(item._id, f.key).seen > 0);
  const barColor = l1pct >= 75 ? 'var(--green2)' : l1pct >= 40 ? 'var(--amber)' : 'var(--red2)';

  const sciHTML = askingPrimary
    ? `<div class="species-hidden">? ? ?</div>`
    : primaryVal ? `<div class="species-sci">${primaryVal}</div>` : '';

  const comHTML = askingDisplay
    ? `<div class="species-hidden" style="font-size:1rem;">? ? ?</div>`
    : displayVal ? `<div class="species-common">${displayVal}</div>` : '';

  const catHTML = askingCategory
    ? `<span class="type-badge hidden-badge">?</span>`
    : categoryVal ? `<span class="type-badge">${categoryVal}</span>` : '';

  const masteryHTML = `<div class="mastery-inline">
    <span class="mastery-level-tag l${lv}">L${lv}</span>
    <div class="mastery-track"><div class="mastery-fill" style="width:${l1pct}%;background:${barColor};"></div></div>
    <span class="mastery-pct">${l1HasSeen ? l1pct + '%' : '—'}</span>
  </div>`;

  return `<div class="card-header">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;">
      <div style="min-width:0;">${sciHTML}${comHTML}</div>
      <div style="flex-shrink:0;text-align:right;padding-top:0.1rem;">${masteryHTML}</div>
    </div>
    <div style="margin-top:0.2rem;">${catHTML}</div>
  </div>`;
}

function renderOpenEndedAsk(item, q, schema) {
  return `${cardHeaderHTML(item, q, schema)}
    <hr class="divider">
    <div class="question-text">${q.questionText}</div>
    ${coachMeterHTML(item._id)}
    <textarea class="answer-input" id="answerInput" rows="2" placeholder="Type your answer… Enter to submit · Esc to skip"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="submitAnswer()">Submit</button>
      <button class="btn btn-secondary" onclick="skipCard()">Skip</button>
    </div>`;
}

function renderGrading(item, q) {
  return `${cardHeaderHTML(item, q, state.schema)}
    <hr class="divider">
    <div class="question-text">${q.questionText}</div>
    <div style="margin:1.2rem 0;display:flex;align-items:center;gap:0.6rem;color:var(--ink3);font-size:14px;">
      <span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>
      <span>Thinking</span>
    </div>
    <div style="font-size:13px;color:var(--ink3);">Your answer: <em>${state.userAnswer}</em></div>`;
}

function renderOpenEndedResult(item, q, schema) {
  const r = state.gradeResult;
  const skipped = r?.grade === 'SKIPPED';
  const correct = r?.grade === 'CORRECT';
  const partial = r?.grade === 'PARTIAL';
  const cls = skipped ? 'wrong' : correct ? 'correct' : partial ? 'partial' : 'wrong';
  const label = skipped ? '→ Skipped' : correct ? '✓ Correct' : partial ? '◐ Partial credit' : '✗ Incorrect';
  const notes = getNotesVal(item);
  const notesAlt = getNotesAltVal(item);
  const funFact = notes || notesAlt || (item._generatedFact || '');

  return `${cardHeaderHTML(item, null, schema)}
    <hr class="divider">
    <div class="result-banner ${cls}">${label}</div>
    ${!skipped && r?.feedback ? `<div class="ai-grade">${r.feedback}</div>` : ''}
    <div class="correct-answer">Correct answer: <strong>${q.answer}</strong></div>
    ${state.userAnswer ? `<div style="font-size:13px;color:var(--ink3);margin-bottom:0.4rem;">Your answer: <em>${state.userAnswer}</em></div>` : ''}
    ${photoPlaceholderHTML(item._id)}
    ${funFact ? `<div class="fun-fact"><div class="fun-fact-lbl">Note</div>${funFact}</div>` : ''}
    ${coachMeterHTML(item._id)}
    <hr class="divider">
    ${skipped
      ? `<button id="btnGotIt" class="btn btn-primary" onclick="initCard();render()">Next →</button>`
      : `<div class="btn-row">
          <button id="btnGotIt" class="btn btn-correct" onclick="markResult('correct')">✓ Got it</button>
          <button class="btn btn-partial" onclick="markResult('partial')">~ Partial</button>
          <button class="btn btn-wrong" onclick="markResult('wrong')">✗ Missed</button>
        </div>`
    }`;
}

function renderNameQuizCard(item, q, schema) {
  if (state.phase === 'ask') {
    const primaryVal = getPrimaryVal(item);
    const lv = getItemLevel(item._id);
    const l1fields = getFieldsForLevel(1);
    const l1acc = l1fields.length > 0 ? getItemAccuracy(item._id, l1fields) : 0;
    const l1pct = Math.round(l1acc * 100);
    const l1HasSeen = l1fields.some(f => getScore(item._id, f.key).seen > 0);
    const barColor = l1pct >= 75 ? 'var(--green2)' : l1pct >= 40 ? 'var(--amber)' : 'var(--red2)';
    return `<div class="card-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;">
        <div class="species-sci" style="font-size:1.6rem;">${primaryVal}</div>
        <div style="flex-shrink:0;padding-top:0.2rem;">
          <div class="mastery-inline">
            <span class="mastery-level-tag l${lv}">L${lv}</span>
            <div class="mastery-track"><div class="mastery-fill" style="width:${l1pct}%;background:${barColor};"></div></div>
            <span class="mastery-pct">${l1HasSeen ? l1pct + '%' : '—'}</span>
          </div>
        </div>
      </div>
    </div>
    ${coachMeterHTML(item._id)}
    <div class="question-text">What is the common name?</div>
    <input type="text" class="answer-input" id="answerInput" placeholder="Type the common name…" value="${state.userAnswer}" autocomplete="off">
    <div class="btn-row">
      <button class="btn btn-primary" onclick="submitNameQuiz()">Submit</button>
      <button class="btn btn-secondary" onclick="skipCard()">Skip</button>
    </div>`;
  } else {
    const r = state.gradeResult;
    const skipped = r?.grade === 'SKIPPED';
    const correct = r?.grade === 'CORRECT';
    const cls = skipped ? 'wrong' : correct ? 'correct' : 'wrong';
    const label = skipped ? '→ Skipped' : correct ? '✓ Correct — confirm below' : '✗ Not quite — confirm below';
    const notes = getNotesVal(item);
    const funFact = notes || (item._generatedFact || '');
    return `${cardHeaderHTML(item, null, schema)}
      <hr class="divider">
      <div class="result-banner ${cls}">${label}</div>
      <div class="correct-answer">Common name: <strong>${getDisplayVal(item)}</strong></div>
      ${state.userAnswer ? `<div style="font-size:13px;color:var(--ink3);margin-bottom:0.4rem;">Your answer: <em>${state.userAnswer}</em></div>` : ''}
      ${photoPlaceholderHTML(item._id)}
      ${funFact ? `<div class="fun-fact"><div class="fun-fact-lbl">Note</div>${funFact}</div>` : ''}
      ${coachMeterHTML(item._id)}
      <hr class="divider">
      ${skipped
        ? `<button id="btnGotIt" class="btn btn-primary" onclick="initCard();render()">Next →</button>`
        : `<div class="btn-row">
            <button id="btnGotIt" class="btn btn-correct" onclick="markResult('correct')">✓ Got it</button>
            <button class="btn btn-partial" onclick="markResult('partial')">~ Partial</button>
            <button class="btn btn-wrong" onclick="markResult('wrong')">✗ Missed</button>
          </div>`
      }`;
  }
}

// ═══════════════════════════════════════════════════════════════════
// RENDER: BROWSE & SPECIES DETAIL
// ═══════════════════════════════════════════════════════════════════

function renderBrowse() {
  const schema = state.schema;
  const sorted = [...state.dataset.rows].sort((a, b) => (getPrimaryVal(a) || '').localeCompare(getPrimaryVal(b) || ''));
  const items = sorted.map(item => {
    const dotClass = getDotClass(item._id);
    const dotColor = dotClass === 'known' ? 'var(--green2)' : dotClass === 'learning' ? 'var(--amber2)' : dotClass === 'struggling' ? 'var(--red2)' : 'var(--paper3)';
    return `<div class="species-item" onclick="viewSpecies('${item._id}')">
      <span class="score-dot" style="background:${dotColor}"></span>
      <span class="sci">${getPrimaryVal(item)}</span>
      <span class="com">${getDisplayVal(item)}</span>
      ${getScoreChipHTML(item._id)}
    </div>`;
  }).join('');
  return `<div class="species-list">${items}</div>`;
}

function renderSpeciesDetail(itemId) {
  const item = state.dataset.rows.find(it => it._id === itemId);
  if (!item) return '<div class="empty-state">Item not found.</div>';
  const schema = state.schema;

  const attrFields = schema.fields.filter(f => {
    const lv = getEffectiveLevel(f);
    return lv !== null && !['primary','display','category','id','notes','notes_alt'].includes(f.role);
  });

  const attrRows = attrFields.map(f => {
    const val = getItemValue(item, f);
    return `<div class="attr-row">
      <span class="attr-lbl">${f.name}</span>
      <span class="attr-val${val ? '' : ' empty'}">${val || '—'}</span>
    </div>`;
  }).join('');

  const notes = getNotesVal(item);
  const notesAlt = getNotesAltVal(item);

  return `
    <button class="btn btn-secondary btn-sm" onclick="setView('browse')" style="margin-bottom:0.75rem;">← Back</button>
    <div class="card ask-card">
      <div style="margin-bottom:0.5rem;">${getScoreChipHTML(item._id)}</div>
      <div class="species-sci">${getPrimaryVal(item)}</div>
      <div class="species-common">${getDisplayVal(item)}</div>
      ${getCategoryVal(item) ? `<span class="type-badge">${getCategoryVal(item)}</span>` : ''}
      <hr class="divider">
      ${photoPlaceholderHTML(item._id)}
      <div class="attr-grid" style="margin-top:0.75rem;">${attrRows}</div>
      ${notesAlt ? `<div class="fun-fact" style="margin-top:0.75rem;"><div class="fun-fact-lbl">Also known as</div>${notesAlt}</div>` : ''}
      ${notes ? `<div class="fun-fact" style="margin-top:0.5rem;"><div class="fun-fact-lbl">Notes</div>${notes}</div>` : ''}
    </div>
    <button class="btn btn-primary btn-sm" onclick="studyThis('${item._id}')">Study this species →</button>`;
}

// ═══════════════════════════════════════════════════════════════════
// RENDER: SETTINGS SCREEN
// ═══════════════════════════════════════════════════════════════════

function renderSettings() {
  if (!state.dataset) {
    return `<div class="settings-screen">
      <div class="empty-state">No dataset loaded. <a href="#" onclick="showScreen('loader');return false;" style="color:var(--green);">Load a CSV first.</a></div>
    </div>`;
  }
  const schema = state.schema;
  const ds = state.dataset;

  // Banner: custom CSV was previously loaded but can't be restored (no file storage)
  const missingBanner = state._customDatasetMissing ? `
    <div style="margin-bottom:0.9rem;padding:0.5rem 0.85rem;background:var(--amber3);border-left:3px solid var(--amber);border-radius:0 4px 4px 0;font-size:13px;color:var(--ink2);">
      <strong style="color:var(--amber);">Dataset not restored</strong> — your last dataset
      <strong>${state._customDatasetMissing.name}</strong>
      (${state._customDatasetMissing.rows} items) can't be reloaded automatically.
      Your progress is still saved. &nbsp;<button class="btn btn-secondary btn-sm" onclick="state._settingsShowLoader=true;render()">↑ Re-upload CSV now</button>
    </div>` : '';

  // Banner: currently on builtin dataset, nudge toward CSV if they have one
  const builtinBanner = (!state._customDatasetMissing && ds.isBuiltin) ? `
    <div style="margin-bottom:0.9rem;padding:0.5rem 0.85rem;background:var(--paper2);border-left:3px solid var(--paper3);border-radius:0 4px 4px 0;font-size:12px;color:var(--ink3);">
      Using built-in MVF plants dataset. Upload a CSV below to use a different dataset.
    </div>` : '';

  // Build level buckets for drag UI
  const buckets = {1: [], 2: [], 3: [], 4: [], 0: []};
  schema.fields.forEach(f => {
    if (['primary','display','category','id','notes','notes_alt'].includes(f.role)) return;
    const lv = getEffectiveLevel(f);
    if (lv && buckets[lv]) buckets[lv].push(f);
    else buckets[0].push(f);
  });

  function bucketHTML(level, label, cls, fields) {
    const pills = fields.map(f =>
      `<span class="field-pill" draggable="true" data-field="${encodeURIComponent(f.name)}" ondragstart="onPillDragStart(event)" ondragend="onPillDragEnd(event)">${f.name}</span>`
    ).join('');
    return `<div class="level-bucket ${cls}" data-level="${level}" ondragover="onBucketDragOver(event)" ondrop="onBucketDrop(event)" ondragleave="onBucketDragLeave(event)">
      <h4>${label}</h4>
      <div id="bucket_${level}">${pills || '<span style="font-size:11px;color:var(--ink3);font-style:italic;">Drop fields here</span>'}</div>
    </div>`;
  }

  return `<div class="settings-screen">
    ${missingBanner}${builtinBanner}
    <div class="settings-section">
      <h3>Dataset</h3>
      <div class="dataset-info">
        <strong>${ds.name}</strong>${ds.isBuiltin ? ' <span style="font-size:11px;color:var(--ink3);">(built-in)</span>' : ''}<br>
        ${ds.rows.length} items &nbsp;·&nbsp; ${schema.fields.length} columns &nbsp;·&nbsp; Fingerprint: <code style="font-size:11px;">${ds.fingerprint}</code>
      </div>
      <div class="io-row" style="margin-top:0.75rem;">
        <button class="btn btn-secondary btn-sm" onclick="showScreen('loader')">↑ Load new CSV</button>
        <button class="btn btn-secondary btn-sm" onclick="exportProgress()">↓ Export progress</button>
        <label class="btn btn-secondary btn-sm" style="cursor:pointer;">↑ Import progress<input type="file" accept=".json" style="display:none" onchange="importProgress(this)"></label>
      </div>
    </div>

    <div class="settings-section">
      <h3>Level Configuration</h3>
      <p style="font-size:13px;color:var(--ink3);margin-bottom:0.75rem;">Drag fields between levels. Changes override your CSV defaults and are saved automatically.</p>
      <div class="level-buckets">
        ${bucketHTML(1, 'Level 1 — Basic ID', 'lv1', buckets[1])}
        ${bucketHTML(2, 'Level 2 — Ecology', 'lv2', buckets[2])}
        ${bucketHTML(3, 'Level 3 — Culture', 'lv3', buckets[3])}
        ${bucketHTML(4, 'Level 4 — Expert', 'lv4', buckets[4])}
        ${bucketHTML(0, 'Skip — Never ask', 'lv-skip', buckets[0])}
      </div>
      <div style="margin-top:0.6rem;">
        <button class="btn btn-secondary btn-sm" onclick="resetOverrides()">Reset to CSV defaults</button>
      </div>
    </div>

    <div class="settings-section">
      <h3>Profiles</h3>
      <div class="profile-bar" style="margin-bottom:0;">${renderProfileBar()}</div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// RENDER: PROFILE BAR
// ═══════════════════════════════════════════════════════════════════

function renderProfileBar() {
  const chips = state.profiles.map(p =>
    `<button class="profile-chip${p === state.activeProfile ? ' active' : ''}" onclick="switchProfile('${p}')">${p}</button>`
  ).join('');
  const addBtn = state.addingProfile
    ? `<input class="profile-input" id="profileInput" placeholder="Name…" onkeydown="onProfileKey(event)" autofocus>`
    : `<button class="profile-add" onclick="startAddProfile()">+ Add</button>`;
  return chips + addBtn;
}

// ═══════════════════════════════════════════════════════════════════
// RENDER: MAIN RENDER DISPATCHER
// ═══════════════════════════════════════════════════════════════════

function render() {
  const root = document.getElementById('root');
  if (!root) return;

  // Update header dataset label
  const hd = document.getElementById('headerDataset');
  if (hd) hd.textContent = state.dataset ? state.dataset.name : 'No dataset loaded';

  if (state.screen === 'settings') {
    const loaderSection = state._settingsShowLoader ? `<div class="settings-section" id="loaderSection">${renderLoader()}</div>` : '';
    root.innerHTML = `
      <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;">
        <button class="btn btn-secondary btn-sm" onclick="showScreen('study')">← Back to study</button>
        <span style="font-size:1.1rem;font-family:'Playfair Display',serif;color:var(--green);">Settings</span>
      </div>
      ${loaderSection}
      ${renderSettings()}`;
    setupDropZone();
    setupDragDrop();
    return;
  }

  // Study screen — nav tabs
  const navBar = `<div class="nav-bar">
    <div class="nav-item${state.view==='study'?' active':''}" onclick="setView('study')">Study</div>
    <div class="nav-item${state.view==='browse'||state.view==='species'?' active':''}" onclick="setView('browse')">Browse All</div>
  </div>`;

  let content = '';
  if (state.view === 'browse') content = renderBrowse();
  else if (state.view === 'species') content = renderSpeciesDetail(state.speciesId);
  else content = renderStudy();

  root.innerHTML = navBar + content;

  // Keyboard handlers
  const inp = document.getElementById('answerInput');
  if (inp) {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (state.mode === 'namequiz') submitNameQuiz();
        else submitAnswer();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        skipCard();
      }
    });
    inp.focus();
  }

  // On result card, focus "Got it" so a second Enter confirms correct
  const gotIt = document.getElementById('btnGotIt');
  if (gotIt) gotIt.focus();

  // Trigger photo load if result card or species detail is showing
  if (state.current && state.phase === 'answered' && document.getElementById(`photoWrap_${state.current._id}`)) {
    loadAndInjectPhoto(state.current);
  }
  if (state.view === 'species' && state.speciesId) {
    const speciesItem = state.dataset?.rows.find(it => it._id === state.speciesId);
    if (speciesItem && document.getElementById(`photoWrap_${state.speciesId}`)) {
      loadAndInjectPhoto(speciesItem);
    }
  }

  // Setup swipe gestures on study card
  setupSwipeGestures();

  // Profile input focus
  const pi = document.getElementById('profileInput');
  if (pi) { pi.focus(); }
}

// ═══════════════════════════════════════════════════════════════════
// SCREEN / VIEW MANAGEMENT
// ═══════════════════════════════════════════════════════════════════

function showScreen(s) {
  if (s === 'loader') {
    state.screen = 'settings';
    state._settingsShowLoader = true;
  } else {
    state.screen = s;
    state._settingsShowLoader = false;
  }
  if (s === 'study' && state.dataset && !state.current) initCard();
  render();
}

function setView(v)  { state.view = v; render(); }
function setMode(m)  { state.mode = m; initCard(); render(); }
function setFilter(val, dim) {
  if (dim === 'category') state.filterCategory = val;
  else state.filterCategory = val; // default
  initCard(); render();
}

function viewSpecies(id) { state.view = 'species'; state.speciesId = id; render(); }
function studyThis(id) {
  state.view = 'study';
  const item = state.dataset.rows.find(it => it._id === id);
  state.current = item;
  state.question = item ? pickQuestion(item) : null;
  state.phase = 'ask'; state.userAnswer = ''; state.gradeResult = null;
  render();
}

function showCSVHelp() {
  const el = document.getElementById('csvHelp');
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// ═══════════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════════

function skipCard() {
  if (state.current && state.question) {
    updateScore(state.current._id, state.question.field.key, 'wrong', true);
    recordAnswer(false); // skip resets streak
    state.userAnswer = '';
    state.gradeResult = { grade: 'SKIPPED', feedback: '' };
    state.phase = 'answered';
    state.skipped = true;
    render();
  } else {
    initCard(); render();
  }
}

function submitNameQuiz() {
  const inp = document.getElementById('answerInput');
  const answer = (inp ? inp.value.trim() : '').toLowerCase();
  if (!answer) { skipCard(); return; }
  state.userAnswer = inp.value.trim();
  const item = state.current;
  const displayVal = getDisplayVal(item);
  const notesAlt = getNotesAltVal(item);
  const targets = [displayVal, notesAlt].filter(Boolean);
  const isCorrect = targets.some(t => fuzzyMatch(answer, t));
  // Set suggested grade — user confirms with Got it / Partial / Missed
  state.gradeResult = { grade: isCorrect ? 'CORRECT' : 'WRONG', feedback: '' };
  state.phase = 'answered';
  const notes = getNotesVal(item);
  if (!notes && !item._generatedFact) {
    generateFunFact(item).then(fact => { if (fact) { item._generatedFact = fact; render(); } });
  }
  render();
}

async function submitAnswer() {
  const inp = document.getElementById('answerInput');
  const answer = inp ? inp.value.trim() : '';
  if (!answer) { skipCard(); return; }
  state.userAnswer = answer;
  state.phase = 'answered';
  state.grading = true;
  render();
  const result = await gradeAnswer(state.question.questionText, state.question.answer, answer);
  state.gradeResult = result;
  state.grading = false;
  // Async fun fact if notes blank
  const notes = getNotesVal(state.current);
  if (!notes && !state.current._generatedFact) {
    generateFunFact(state.current).then(fact => { if (fact) { state.current._generatedFact = fact; render(); } });
  }
  render();
}

function markResult(result) {
  recordAnswer(result === 'correct'); // partial and wrong both reset streak
  updateScore(state.current._id, state.question.field.key, result, false);
  initCard(); render();
}

// ═══════════════════════════════════════════════════════════════════
// PROFILE MANAGEMENT
// ═══════════════════════════════════════════════════════════════════

function switchProfile(name) {
  state.activeProfile = name;
  if (state.dataset) {
    state.progress = loadProgress(state.dataset.fingerprint, name);
    state.session  = loadSession(state.dataset.fingerprint, name);
    state.levelOverrides = loadOverrides(state.dataset.fingerprint);
  }
  initCard(); render();
}

function startAddProfile() { state.addingProfile = true; render(); }

function onProfileKey(e) {
  if (e.key === 'Enter') {
    const val = e.target.value.trim();
    if (val && !state.profiles.includes(val)) {
      state.profiles.push(val);
      saveProfiles();
    }
    state.addingProfile = false;
    if (val) switchProfile(val);
    else render();
  } else if (e.key === 'Escape') {
    state.addingProfile = false; render();
  }
}

// ═══════════════════════════════════════════════════════════════════
// CSV LOADER
// ═══════════════════════════════════════════════════════════════════

function setupDropZone() {
  const zone = document.getElementById('dropZone');
  const fileInput = document.getElementById('csvFile');
  if (!zone || !fileInput) return;

  zone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const dataset = buildDataset(e.target.result, file.name);
      // Check if same fingerprint as current — if so, just reload
      const lastMeta = JSON.parse(localStorage.getItem('sptrain_last_dataset') || 'null');
      if (lastMeta && lastMeta.fingerprint === dataset.fingerprint) {
        activateDataset(dataset);
        return;
      }
      // Different dataset — check if there's existing progress for the new one
      const hasExistingProgress = state.profiles.some(p => {
        const prog = loadProgress(dataset.fingerprint, p);
        return Object.keys(prog).length > 0;
      });
      if (hasExistingProgress) {
        // Has progress for this dataset — activate and resume
        activateDataset(dataset);
      } else {
        // Brand new dataset — show preview and confirm
        showCSVPreview(dataset, file.name);
        state.pendingDataset = dataset;
      }
    } catch(err) {
      document.getElementById('csvPreview').innerHTML =
        `<div style="color:var(--red2);font-size:13px;margin-top:0.75rem;">Error: ${err.message}</div>`;
    }
  };
  reader.readAsText(file);
}

function showCSVPreview(dataset, filename) {
  const schema = dataset.schema;
  const sampleRows = dataset.rows.slice(0, 3);

  // Show only first 8 fields to keep preview manageable
  const previewFields = dataset.schema.fields.slice(0, 8);

  function tagChipHTML(field) {
    const lv = field.role.match(/^level(\d)$/);
    if (lv) return `<span class="tag-chip tag-level${lv[1]}">L${lv[1]}</span>`;
    if (field.role === 'primary')   return `<span class="tag-chip tag-primary">primary</span>`;
    if (field.role === 'display')   return `<span class="tag-chip tag-display">display</span>`;
    if (field.role === 'category')  return `<span class="tag-chip tag-category">category</span>`;
    if (field.role === 'notes' || field.role === 'notes_alt') return `<span class="tag-chip tag-notes">notes</span>`;
    if (field.role === 'id')        return `<span class="tag-chip tag-id">id</span>`;
    return `<span class="tag-chip tag-skip">skip</span>`;
  }

  const headerRow = previewFields.map(f => `<th>${f.name}</th>`).join('');
  const tagRow    = previewFields.map(f => `<td class="row-label">${tagChipHTML(f)}</td>`).join('');
  const dataRows  = sampleRows.map(row =>
    `<tr>${previewFields.map(f => `<td>${row[f.key] || ''}</td>`).join('')}</tr>`
  ).join('');

  const moreFields = dataset.schema.fields.length - 8;

  const autoTagNotice = dataset.autoTagged ? `
    <div style="margin-bottom:0.6rem;padding:0.4rem 0.75rem;background:var(--amber3);border-left:3px solid var(--amber);border-radius:0 4px 4px 0;font-size:12px;color:var(--ink2);">
      <strong>No tag row detected</strong> — levels auto-assigned from column names.
      Add a Row 2 with role/level tags to take full control.
    </div>` : '';

  document.getElementById('csvPreview').innerHTML = `
    <div class="csv-preview">
      ${autoTagNotice}
      <div style="font-size:13px;color:var(--ink3);margin-bottom:0.5rem;">
        <strong style="color:var(--ink);">${dataset.name}</strong> — ${dataset.rows.length} items, ${dataset.schema.fields.length} columns
        ${moreFields > 0 ? `<span style="color:var(--ink3)"> (+${moreFields} more columns not shown)</span>` : ''}
      </div>
      <table>
        <tr>${headerRow}</tr>
        <tr>${tagRow}</tr>
        ${dataRows}
      </table>
      <div style="margin-top:0.75rem;display:flex;gap:0.5rem;">
        <button class="btn btn-primary" onclick="confirmLoadDataset()">Load this dataset</button>
        <button class="btn btn-secondary" onclick="cancelLoadDataset()">Cancel</button>
      </div>
    </div>`;
}

function confirmLoadDataset() {
  if (state.pendingDataset) {
    activateDataset(state.pendingDataset);
    state.pendingDataset = null;
  }
}

function cancelLoadDataset() {
  state.pendingDataset = null;
  document.getElementById('csvPreview').innerHTML = '';
}

function activateDataset(dataset) {
  state.dataset = dataset;
  state.schema  = dataset.schema;
  state._settingsShowLoader = false;
  state._customDatasetMissing = null;
  state.levelOverrides = loadOverrides(dataset.fingerprint);
  state.progress = loadProgress(dataset.fingerprint, state.activeProfile);
  state.session  = loadSession(dataset.fingerprint, state.activeProfile);
  saveDatasetMeta();
  attemptV1Migration(dataset);
  initCard();
  state.screen = 'study';
  render();
}

// ═══════════════════════════════════════════════════════════════════
// DRAG & DROP — LEVEL SETTINGS
// ═══════════════════════════════════════════════════════════════════

let dragFieldName = null;

function onPillDragStart(e) {
  dragFieldName = decodeURIComponent(e.target.dataset.field);
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onPillDragEnd(e) {
  e.target.classList.remove('dragging');
  dragFieldName = null;
}

function onBucketDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-target');
  e.dataTransfer.dropEffect = 'move';
}

function onBucketDragLeave(e) {
  e.currentTarget.classList.remove('drag-target');
}

function onBucketDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-target');
  if (!dragFieldName) return;
  const level = parseInt(e.currentTarget.dataset.level);
  // Save override
  if (level === 0) {
    state.levelOverrides[dragFieldName] = null; // null = skip
  } else {
    state.levelOverrides[dragFieldName] = level;
  }
  saveOverrides();
  render(); // re-render settings
}

function setupDragDrop() {
  // Buckets are set up via inline event handlers in renderSettings
}

function resetOverrides() {
  state.levelOverrides = {};
  saveOverrides();
  render();
}

// ═══════════════════════════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════════════

function exportProgress() {
  if (!state.dataset) return;
  const payload = {
    version: APP_VERSION,
    exported: new Date().toISOString(),
    fingerprint: state.dataset.fingerprint,
    datasetName: state.dataset.name,
    profiles: state.profiles,
    progressByProfile: {},
    sessionByProfile: {},
    levelOverrides: state.levelOverrides,
  };
  for (const p of state.profiles) {
    payload.progressByProfile[p] = loadProgress(state.dataset.fingerprint, p);
    payload.sessionByProfile[p]  = loadSession(state.dataset.fingerprint, p);
  }
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `species_trainer_${state.dataset.fingerprint}_${new Date().toISOString().slice(0,10)}.json`;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function importProgress(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const payload = JSON.parse(e.target.result);
      if (!payload.fingerprint || !payload.progressByProfile) throw new Error('Invalid progress file');
      if (payload.fingerprint !== state.dataset?.fingerprint) {
        if (!confirm(`This progress file is for dataset "${payload.datasetName}" (${payload.fingerprint}), but current dataset is "${state.dataset?.name}" (${state.dataset?.fingerprint}). Import anyway?`)) return;
      }
      // Merge profiles
      for (const p of (payload.profiles || [])) {
        if (!state.profiles.includes(p)) state.profiles.push(p);
      }
      saveProfiles();
      // Write progress
      const fp = state.dataset?.fingerprint || payload.fingerprint;
      for (const [p, prog] of Object.entries(payload.progressByProfile || {})) {
        localStorage.setItem(`sptrain_${fp}_${p}_progress`, JSON.stringify(prog));
      }
      for (const [p, sess] of Object.entries(payload.sessionByProfile || {})) {
        localStorage.setItem(`sptrain_${fp}_${p}_session`, JSON.stringify(sess));
      }
      if (payload.levelOverrides) {
        state.levelOverrides = payload.levelOverrides;
        saveOverrides();
      }
      // Reload current profile
      state.progress = loadProgress(fp, state.activeProfile);
      state.session  = loadSession(fp, state.activeProfile);
      alert(`Progress imported for ${Object.keys(payload.progressByProfile).length} profile(s).`);
      render();
    } catch(err) { alert('Import failed: ' + err.message); }
  };
  reader.readAsText(file);
}

// Build a dataset object from the baked-in raw format (already parsed, no CSV needed)
function buildDatasetFromRaw(raw) {
  const schema = buildSchema(raw.headers, raw.tags);
  return {
    name: raw.name,
    fingerprint: raw.fingerprint,
    headers: raw.headers,
    tags: raw.tags,
    schema,
    rows: raw.rows,
    isBuiltin: true,
  };
}

// Migrate v1 progress into the current dataset if no v2 progress exists yet
function attemptV1Migration(dataset) {
  if (Object.keys(state.progress).length > 0) return; // already have v2 progress
  const v1prog = migrateV1();
  if (!v1prog) return;
  let migrated = 0;
  for (const [itemId, s] of Object.entries(v1prog)) {
    const item = dataset.rows.find(it => it._id === itemId);
    if (!item) continue;
    const l1fields = getFieldsForLevel(1);
    for (const f of l1fields) {
      const key = `${itemId}::${f.key}`;
      state.progress[key] = {
        seen: s.seen || 0, correct: s.correct || 0, skips: s.skips || 0,
        interval: s.interval || 1, lastSeen: s.lastSeen || 0,
        strangerScore: s.strangerScore || 1.0
      };
    }
    migrated++;
  }
  if (migrated > 0) {
    saveProgress();
    console.log(`v1 migration: ${migrated} records imported`);
  }
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════

function init() {
  state.profiles = loadProfiles();
  state.activeProfile = state.profiles[0] || 'Me';

  const lastMeta = JSON.parse(localStorage.getItem('sptrain_last_dataset') || 'null');
  const useBuiltin = !lastMeta || lastMeta.fingerprint === 'builtin_mvf';

  const dataset = buildDatasetFromRaw(BUILTIN_DATASET_RAW);
  state.dataset = dataset;
  state.schema  = dataset.schema;

  if (useBuiltin) {
    state.levelOverrides = loadOverrides('builtin_mvf');
    state.progress = loadProgress('builtin_mvf', state.activeProfile);
    state.session  = loadSession('builtin_mvf', state.activeProfile);
    attemptV1Migration(dataset);
  } else {
    // User had a custom CSV — fall back to builtin data but flag the missing CSV
    state.levelOverrides = loadOverrides(lastMeta.fingerprint);
    state.progress = loadProgress(lastMeta.fingerprint, state.activeProfile);
    state.session  = loadSession(lastMeta.fingerprint, state.activeProfile);
    state._customDatasetMissing = lastMeta;
    // Still try v1 migration in case they also had v1 plants progress
    attemptV1Migration(dataset);
  }

  initCard();
  state.screen = 'study';
  render();
}

// ═══════════════════════════════════════════════════════════════════
// SWIPE GESTURES
// ═══════════════════════════════════════════════════════════════════

function setupSwipeGestures() {
  const root = document.getElementById('root');
  if (!root) return;
  const card = root.querySelector('.card-swipeable');
  if (!card) return;

  let startX = 0, startY = 0, currentX = 0, isDragging = false;
  const THRESHOLD = 80; // px to trigger action
  const hintRight = card.querySelector('.swipe-hint-right');
  const hintLeft  = card.querySelector('.swipe-hint-left');

  card.addEventListener('touchstart', e => {
    if (e.target.closest('textarea, input, select, button')) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = true;
    card.classList.add('swiping');
  }, { passive: true });

  card.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dy) > Math.abs(dx) * 1.5) { isDragging = false; return; } // vertical scroll
    currentX = dx;
    const pct = Math.min(Math.abs(dx) / THRESHOLD, 1);
    card.style.transform = `translateX(${dx * 0.4}px) rotate(${dx * 0.02}deg)`;
    card.style.opacity = 1 - pct * 0.2;
    if (hintRight) hintRight.style.opacity = dx > 20 ? pct : 0;
    if (hintLeft)  hintLeft.style.opacity  = dx < -20 ? pct : 0;
  }, { passive: true });

  card.addEventListener('touchend', () => {
    if (!isDragging) return;
    isDragging = false;
    card.classList.remove('swiping');
    card.style.transform = '';
    card.style.opacity = '';
    if (hintRight) hintRight.style.opacity = 0;
    if (hintLeft)  hintLeft.style.opacity  = 0;

    if (currentX > THRESHOLD) {
      // Swipe right — Got it (only on result card)
      if (state.phase === 'answered' && state.gradeResult?.grade !== 'SKIPPED') {
        markResult('correct');
      }
    } else if (currentX < -THRESHOLD) {
      // Swipe left — skip on ask card, missed on result card
      if (state.phase === 'ask') {
        skipCard();
      } else if (state.phase === 'answered' && state.gradeResult?.grade !== 'SKIPPED') {
        markResult('wrong');
      }
    }
    currentX = 0;
  }, { passive: true });
}
