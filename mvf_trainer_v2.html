<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#2d5016">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Species Trainer">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-trainer.png">
<title>Species Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a0e; --ink2: #3d3a28; --ink3: #6b6650;
    --paper: #f5f0e8; --paper2: #ece5d4; --paper3: #d8d0b8;
    --green: #2d5016; --green2: #4a7c28; --green3: #8aad5a; --green4: #c8dba8;
    --amber: #c47a1e; --amber2: #f0c060; --amber3: #fdecc8;
    --red: #8b2a1a; --red2: #d4604a; --red3: #fdd8d2;
    --blue: #1a3a5c; --blue2: #2a5a8c; --blue3: #d0e4f4;
    --correct: #2d5016; --wrong: #8b2a1a; --partial: #7a5a10;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'Crimson Pro', Georgia, serif; font-size: 17px; line-height: 1.55; min-height: 100vh; }
  body::before { content: ''; position: fixed; inset: 0; background-image: repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(0,0,0,0.02) 31px, rgba(0,0,0,0.02) 32px); pointer-events: none; z-index: 0; }
  #app { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 0.5rem 1.25rem 1.5rem; }

  /* ── HEADER ── */
  header { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0 0.45rem; border-bottom: 2px solid var(--green); margin-bottom: 0.8rem; }
  .header-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--green); line-height: 1; }
  .header-title em { font-style: italic; font-weight: 500; }
  .header-dataset { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink3); flex: 1; }
  .header-actions { display: flex; align-items: center; gap: 0.5rem; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--ink3); padding: 0.2rem 0.3rem; border-radius: 3px; font-size: 16px; transition: color 0.12s, background 0.12s; }
  .icon-btn:hover { color: var(--green); background: var(--green4); }

  /* ── PROFILE BAR ── */
  .profile-bar { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.65rem; flex-wrap: wrap; }
  .profile-chip { font-family: 'Crimson Pro', serif; font-size: 13px; padding: 0.2rem 0.65rem; border-radius: 20px; border: 1.5px solid var(--paper3); background: var(--paper2); color: var(--ink3); cursor: pointer; transition: all 0.12s; }
  .profile-chip.active { background: var(--green); color: white; border-color: var(--green); }
  .profile-chip:hover:not(.active) { border-color: var(--green3); color: var(--ink); }
  .profile-add { font-size: 13px; color: var(--ink3); cursor: pointer; padding: 0.2rem 0.5rem; border-radius: 20px; border: 1.5px dashed var(--paper3); background: none; font-family: 'Crimson Pro', serif; transition: all 0.12s; }
  .profile-add:hover { border-color: var(--green3); color: var(--green); }
  .profile-input { font-family: 'Crimson Pro', serif; font-size: 13px; padding: 0.2rem 0.5rem; border: 1.5px solid var(--green3); border-radius: 20px; background: white; color: var(--ink); outline: none; width: 120px; }

  /* ── STATS BAR ── */
  .stats-bar { display: flex; gap: 1px; margin-bottom: 0.65rem; background: var(--paper3); border-radius: 4px; overflow: hidden; border: 1px solid var(--paper3); }
  .stat { flex: 1; text-align: center; padding: 0.28rem 0.25rem; background: var(--paper2); }
  .stat .val { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--green); font-weight: 700; display: block; }
  .stat .lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink3); }

  /* ── MODE TABS ── */
  .mode-tabs { display: flex; margin-bottom: 0.65rem; border: 1.5px solid var(--green); border-radius: 4px; overflow: hidden; }
  .mode-tab { flex: 1; padding: 0.32rem 1rem; background: var(--paper2); border: none; cursor: pointer; font-family: 'Crimson Pro', serif; font-size: 14px; color: var(--ink3); transition: all 0.15s; letter-spacing: 0.03em; }
  .mode-tab:not(:last-child) { border-right: 1px solid var(--green); }
  .mode-tab.active { background: var(--green); color: var(--paper); font-weight: 600; }
  .mode-tab:hover:not(.active) { background: var(--green4); color: var(--ink); }

  /* ── FILTER / DOTS BAR ── */
  .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center; flex-wrap: wrap; }
  .filter-bar label { font-size: 12px; color: var(--ink3); }
  .filter-bar select { font-family: 'Crimson Pro', serif; font-size: 13px; padding: 0.12rem 0.45rem; border: 1px solid var(--paper3); border-radius: 3px; background: var(--paper2); color: var(--ink); }
  .progress-dots { display: flex; gap: 3px; flex-wrap: wrap; flex: 1; justify-content: flex-end; }
  .progress-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--paper3); cursor: default; }
  .progress-dot.known { background: var(--green2); }
  .progress-dot.learning { background: var(--amber2); }
  .progress-dot.struggling { background: var(--red2); }
  .dot-legend { display: flex; gap: 0.5rem; font-size: 10px; color: var(--ink3); align-items: center; white-space: nowrap; }
  .dot-legend span { display: inline-flex; align-items: center; gap: 2px; }
  .dot-legend i { display: inline-block; width: 6px; height: 6px; border-radius: 50%; }

  /* ── CARD ── */
  .card { background: white; border: 1.5px solid var(--paper3); border-radius: 6px; padding: 0.9rem 1.15rem; margin-bottom: 0.5rem; box-shadow: 0 2px 6px rgba(0,0,0,0.05); border-left-width: 4px; }
  .card.ask-card    { border-left-color: var(--green2); }
  .card.result-correct { border-left-color: var(--green2); background: #f5faf0; }
  .card.result-wrong   { border-left-color: var(--red2);   background: #fdf5f3; }
  .card.result-partial { border-left-color: var(--amber);  background: #fdf8ed; }
  .card.result-neutral { border-left-color: var(--paper3); }

  /* ── CARD INTERIOR ── */
  .card-header { margin-bottom: 0.5rem; }
  .species-sci  { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-style: italic; color: var(--ink); font-weight: 500; }
  .species-common { font-size: 14px; color: var(--ink2); }
  .species-hidden { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--paper3); font-style: italic; user-select: none; letter-spacing: 0.05em; }
  .type-badge { display: inline-block; font-size: 11px; padding: 1px 9px; border-radius: 20px; background: var(--green4); color: var(--green); letter-spacing: 0.05em; font-weight: 600; margin-top: 0.2rem; }
  .type-badge.hidden-badge { background: var(--paper2); color: var(--paper3); }
  .level-badge { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 20px; margin-left: 0.4rem; font-weight: 600; letter-spacing: 0.06em; vertical-align: middle; }
  .level-badge.l1 { background: var(--green4); color: var(--green); }
  .level-badge.l2 { background: var(--amber3); color: var(--amber); }
  .level-badge.l3 { background: var(--blue3); color: var(--blue2); }
  .level-badge.l4 { background: #ede; color: #707; }
  /* Inline mastery indicator in card header */
  .mastery-inline { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.15rem; }
  .mastery-level-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; padding: 1px 6px; border-radius: 3px; flex-shrink: 0; }
  .mastery-level-tag.l1 { background: var(--green4); color: var(--green); }
  .mastery-level-tag.l2 { background: var(--amber3); color: var(--amber); }
  .mastery-level-tag.l3 { background: var(--blue3); color: var(--blue2); }
  .mastery-level-tag.l4 { background: #ede; color: #707; }
  .mastery-track { flex: 1; max-width: 120px; height: 4px; background: var(--paper3); border-radius: 2px; overflow: hidden; }
  .mastery-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .mastery-pct { font-size: 10px; color: var(--ink3); flex-shrink: 0; }
  .divider { border: none; border-top: 1px solid var(--paper3); margin: 0.55rem 0; }
  .question-text { font-size: 1.1rem; color: var(--ink); margin-bottom: 0.65rem; line-height: 1.4; }
  .answer-input { width: 100%; font-family: 'Crimson Pro', serif; font-size: 1rem; padding: 0.4rem 0.75rem; border: 1.5px solid var(--paper3); border-radius: 4px; background: var(--paper); color: var(--ink); transition: border-color 0.15s; margin-bottom: 0.5rem; resize: vertical; }
  .answer-input:focus { outline: none; border-color: var(--green2); background: white; }
  .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .btn { font-family: 'Crimson Pro', serif; font-size: 14px; padding: 0.35rem 0.9rem; border-radius: 3px; border: 1.5px solid; cursor: pointer; transition: all 0.12s; letter-spacing: 0.02em; }
  .btn-primary  { background: var(--green); color: white; border-color: var(--green); }
  .btn-primary:hover { background: var(--green2); border-color: var(--green2); }
  .btn-secondary { background: transparent; color: var(--ink2); border-color: var(--paper3); }
  .btn-secondary:hover { background: var(--paper2); }
  .btn-correct  { background: var(--correct); color: white; border-color: var(--correct); }
  .btn-partial  { background: var(--partial); color: white; border-color: var(--partial); }
  .btn-wrong    { background: var(--wrong);   color: white; border-color: var(--wrong); }
  .btn-sm { font-size: 12px; padding: 0.2rem 0.6rem; }

  /* ── RESULT CARD ── */
  .result-banner { padding: 0.4rem 0.7rem; border-radius: 4px; margin-bottom: 0.55rem; font-size: 14px; font-weight: 600; }
  .result-banner.correct { background: var(--green4); color: var(--green); }
  .result-banner.partial { background: var(--amber3); color: var(--partial); }
  .result-banner.wrong   { background: var(--red3);   color: var(--wrong); }
  .correct-answer { font-size: 13px; color: var(--ink2); margin-bottom: 0.35rem; }
  .correct-answer strong { color: var(--ink); }
  .ai-grade { font-size: 13px; color: var(--ink3); font-style: italic; margin-bottom: 0.55rem; padding: 0.35rem 0.55rem; background: var(--paper2); border-radius: 3px; border-left: 3px solid var(--green3); }
  .fun-fact { margin-top: 0.55rem; padding: 0.4rem 0.7rem; background: var(--paper2); border-left: 3px solid var(--amber); font-size: 12px; color: var(--ink2); border-radius: 0 3px 3px 0; }
  .fun-fact-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--amber); font-weight: 600; margin-bottom: 0.1rem; }

  /* ── SPECIES PHOTO ── */
  .species-photo-wrap { margin: 0.6rem 0 0.2rem; border-radius: 5px; overflow: hidden; background: var(--paper2); min-height: 160px; display: flex; align-items: center; justify-content: center; position: relative; }
  .species-photo-wrap img { width: 100%; max-height: 240px; object-fit: cover; display: block; opacity: 0; transition: opacity 0.4s ease; border-radius: 5px; }
  .species-photo-wrap img.loaded { opacity: 1; }
  .species-photo-credit { font-size: 10px; color: var(--ink3); text-align: right; margin-top: 0.15rem; font-style: italic; }
  .species-photo-loading { font-size: 12px; color: var(--ink3); font-style: italic; position: absolute; }

  /* ── COACH METER ── */
  .coach-wrap { margin: 0.45rem 0 0.5rem; padding: 0.4rem 0.7rem; background: var(--paper2); border-radius: 4px; border-left: 3px solid var(--red2); }
  .coach-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.2rem; }
  .coach-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink3); }
  .coach-score { font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 700; }
  .coach-score.low { color: var(--red2); } .coach-score.mid { color: var(--amber); } .coach-score.high { color: var(--green2); }
  .coach-bar-wrap { height: 3px; background: var(--paper3); border-radius: 2px; overflow: hidden; }
  .coach-bar { height: 100%; border-radius: 2px; transition: width 0.4s, background 0.4s; }
  .coach-quote { font-size: 11px; color: var(--ink3); font-style: italic; margin-top: 0.18rem; }

  /* ── THINKING DOTS ── */
  .thinking-dots span { animation: blink 1.2s infinite; font-size: 1.3rem; line-height: 1; }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0.15; } 40% { opacity: 1; } }

  /* ── NAV BAR ── */
  .nav-bar { display: flex; border-bottom: 2px solid var(--paper3); margin-bottom: 0.8rem; }
  .nav-item { padding: 0.3rem 1.1rem; font-size: 12px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--ink3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.12s; }
  .nav-item.active { color: var(--green); border-bottom-color: var(--green); font-weight: 600; }
  .nav-item:hover:not(.active) { color: var(--ink2); }

  /* ── BROWSE / SPECIES ── */
  .species-list { display: flex; flex-direction: column; gap: 2px; }
  .species-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.35rem 0.7rem; border-radius: 3px; cursor: pointer; transition: background 0.1s; }
  .species-item:hover { background: var(--paper2); }
  .species-item .sci { font-style: italic; font-size: 14px; flex: 1; color: var(--ink); }
  .species-item .com { font-size: 12px; color: var(--ink3); }
  .score-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .score-chip { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; padding: 2px 7px; border-radius: 12px; }
  .score-chip.high   { background: var(--green4); color: var(--green); }
  .score-chip.mid    { background: var(--amber3); color: var(--partial); }
  .score-chip.low    { background: var(--red3);   color: var(--wrong); }
  .score-chip.unseen { background: var(--paper2); color: var(--ink3); }
  .attr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.35rem 1.25rem; margin-top: 0.75rem; }
  .attr-row { display: flex; flex-direction: column; }
  .attr-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink3); }
  .attr-val { font-size: 13px; color: var(--ink); }
  .attr-val.empty { color: var(--paper3); font-style: italic; font-size: 12px; }

  /* ── LOADER SCREEN ── */
  .loader-screen { max-width: 520px; margin: 2rem auto; text-align: center; }
  .loader-screen h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--green); margin-bottom: 0.5rem; }
  .loader-screen p { font-size: 14px; color: var(--ink3); margin-bottom: 1.5rem; line-height: 1.6; }
  .drop-zone { border: 2px dashed var(--paper3); border-radius: 8px; padding: 2rem 1.5rem; cursor: pointer; transition: all 0.15s; background: var(--paper2); }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--green3); background: var(--green4); }
  .drop-zone input[type=file] { display: none; }
  .drop-zone-label { font-size: 15px; color: var(--ink3); }
  .drop-zone-label strong { color: var(--green); }
  .csv-preview { margin-top: 1.25rem; text-align: left; }
  .csv-preview table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .csv-preview th { background: var(--paper2); padding: 0.3rem 0.5rem; border: 1px solid var(--paper3); font-weight: 600; text-align: left; }
  .csv-preview td { padding: 0.25rem 0.5rem; border: 1px solid var(--paper3); vertical-align: top; }
  .csv-preview .row-label { font-size: 10px; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.08em; background: var(--paper2); }
  .tag-chip { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 600; }
  .tag-primary  { background: var(--green4); color: var(--green); }
  .tag-display  { background: var(--blue3); color: var(--blue2); }
  .tag-category { background: var(--amber3); color: var(--amber); }
  .tag-notes    { background: #ede; color: #707; }
  .tag-id       { background: var(--paper3); color: var(--ink3); }
  .tag-level1   { background: var(--green4); color: var(--green); }
  .tag-level2   { background: var(--amber3); color: var(--amber); }
  .tag-level3   { background: var(--blue3);  color: var(--blue2); }
  .tag-level4   { background: #ede; color: #707; }
  .tag-skip     { background: var(--paper2); color: var(--ink3); }

  /* ── SETTINGS SCREEN ── */
  .settings-screen { max-width: 620px; margin: 0 auto; }
  .settings-section { margin-bottom: 1.25rem; }
  .settings-section h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--green); margin-bottom: 0.6rem; border-bottom: 1px solid var(--paper3); padding-bottom: 0.25rem; }
  .level-buckets { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .level-bucket { flex: 1; min-width: 140px; background: var(--paper2); border-radius: 6px; padding: 0.6rem 0.75rem; border: 1.5px solid var(--paper3); }
  .level-bucket h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.4rem; }
  .level-bucket.lv1 h4 { color: var(--green); }
  .level-bucket.lv2 h4 { color: var(--amber); }
  .level-bucket.lv3 h4 { color: var(--blue2); }
  .level-bucket.lv4 h4 { color: #707; }
  .level-bucket.lv-skip h4 { color: var(--ink3); }
  .level-bucket.drag-target { border-color: var(--green3); background: var(--green4); }
  .field-pill { display: inline-block; font-size: 12px; padding: 2px 9px; border-radius: 12px; background: white; border: 1px solid var(--paper3); margin: 2px; cursor: grab; user-select: none; transition: box-shadow 0.1s; }
  .field-pill:hover { box-shadow: 0 2px 6px rgba(0,0,0,0.12); }
  .field-pill.dragging { opacity: 0.5; }
  .dataset-info { font-size: 13px; color: var(--ink3); line-height: 1.7; }
  .dataset-info strong { color: var(--ink); }
  .io-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }

  /* ── MISC ── */
  .empty-state { text-align: center; padding: 2rem; color: var(--ink3); font-style: italic; font-size: 14px; }
  .unlock-notice { font-size: 12px; color: var(--amber); font-style: italic; margin-top: 0.3rem; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: white; border-radius: 8px; padding: 1.5rem; max-width: 380px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  .modal h3 { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--ink); margin-bottom: 0.6rem; }
  .modal p { font-size: 14px; color: var(--ink3); margin-bottom: 1rem; line-height: 1.6; }
  .modal .btn-row { justify-content: flex-end; }

  @media (max-width: 500px) {
    #app { padding: 0.4rem 0.75rem calc(0.75rem + env(safe-area-inset-bottom)); }
    .attr-grid { grid-template-columns: 1fr; }
    .level-buckets { flex-direction: column; }
    .header-title { font-size: 1.15rem; }
    /* Larger touch targets on mobile */
    .btn { padding: 0.6rem 1.1rem; font-size: 15px; min-height: 44px; }
    .btn-correct, .btn-partial, .btn-wrong { flex: 1; justify-content: center; }
    .btn-row { gap: 0.4rem; }
    .mode-tab { padding: 0.5rem 0.5rem; min-height: 44px; }
    .nav-item { padding: 0.5rem 1rem; min-height: 44px; display: flex; align-items: center; }
    .profile-chip { min-height: 36px; padding: 0.3rem 0.75rem; }
    .card { padding: 0.85rem 1rem; }
    .answer-input { font-size: 16px; } /* prevents iOS zoom on input focus */
    .filter-bar select { min-height: 36px; font-size: 15px; }
    /* Swipe hint overlay */
    .swipe-hint { display: flex; }
  }
  @media (max-width: 500px) and (orientation: landscape) {
    #app { padding: 0.3rem calc(0.75rem + env(safe-area-inset-right)) 0.3rem calc(0.75rem + env(safe-area-inset-left)); }
    .card { padding: 0.65rem 0.9rem; }
  }
  /* Safe area for iPhone notch on all sizes */
  #app {
    padding-left: max(1.25rem, env(safe-area-inset-left));
    padding-right: max(1.25rem, env(safe-area-inset-right));
  }
  /* Swipe gesture visual feedback */
  .card-swipeable { transition: transform 0.15s ease, opacity 0.15s ease; touch-action: pan-y; }
  .card-swipeable.swiping { transition: none; }
  .swipe-hint { display: none; position: absolute; top: 50%; transform: translateY(-50%); font-size: 13px; font-weight: 600; letter-spacing: 0.08em; opacity: 0; transition: opacity 0.1s; pointer-events: none; padding: 0.3rem 0.6rem; border-radius: 3px; }
  .swipe-hint-right { right: 1rem; color: var(--correct); background: var(--green4); }
  .swipe-hint-left  { left: 1rem;  color: var(--wrong);   background: var(--red3); }
  /* Offline banner */

function storageKey(suffix) {

  const p  = state.activeProfile || 'default';
  return `sptrain_${fp}_${p}_${suffix}`;
}

function saveProgress() {

}

function loadProgress(fingerprint, profile) {
  try {
    const k = `sptrain_${fingerprint}_${profile}_progress`;
    return JSON.parse(localStorage.getItem(k) || '{}');
  } catch(e) { return {}; }
}

function saveProfiles() {

function saveDatasetMeta() {
  if (!state.dataset) return;
  try { localStorage.setItem('sptrain_last_dataset', JSON.stringify({ fingerprint: state.dataset.fingerprint, name: state.dataset.name, rows: state.dataset.rows.length })); } catch(e) {}

}

function saveSession() {

}

function loadSession(fingerprint, profile) {
  try {
    const k = `sptrain_${fingerprint}_${profile}_session`;
    const s = JSON.parse(localStorage.getItem(k) || '{}');
    const today = new Date().toDateString();
    if (s.date !== today) return { date: today, todayAnswered: 0, streak: s.streak || 0, lastDate: s.date };
    return s;
  } catch(e) { return { date: new Date().toDateString(), todayAnswered: 0, streak: 0 }; }
}

}

// ═══════════════════════════════════════════════════════════════════
// CSV PARSING & SCHEMA DETECTION
// ═══════════════════════════════════════════════════════════════════

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) throw new Error('CSV must have at least 2 rows');

  function splitRow(line) {
    const out = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { out.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    out.push(cur.trim());
    return out.map(s => s.replace(/^"|"$/g, '').trim());
  }

  const headers = splitRow(lines[0]);

  // Detect whether Row 2 is a tags row or actual data
  // A tags row contains only known role/level tokens; a data row has real values
  const VALID_TAGS = new Set(['primary','display','category','id','notes','notes_alt','1','2','3','4','']);
  const row2 = splitRow(lines[1]);
  const isTagRow = row2.every(cell => VALID_TAGS.has(cell.toLowerCase().trim()));

  let tags, rows;
  if (isTagRow) {
    tags = row2;
    rows = lines.slice(2).map(splitRow);
  } else {
    // No tag row — auto-assign roles and levels from column names
    tags = headers.map(h => {
      const cn = h.toLowerCase().trim();
      // Check role aliases first
      for (const [role, aliases] of Object.entries(ROLE_ALIASES)) {
        if (aliases.includes(cn)) return role;
      }
      for (const [rank, aliases] of Object.entries(RANK_ALIASES)) {
        if (aliases.includes(cn)) return '1'; // family/genus/species = L1
      }
      // Check auto level map
      if (AUTO_LEVEL_MAP[cn] !== undefined) return String(AUTO_LEVEL_MAP[cn]);
      return ''; // skip
    });
    rows = lines.slice(1).map(splitRow);
  }

  return { headers, tags, rows, autoTagged: !isTagRow };
}

function detectRole(colName, tag) {
  const cn = colName.toLowerCase().trim();
  const tg = (tag || '').toLowerCase().trim();

  // Explicit tag takes priority
  if (['primary','display','category','id','notes','notes_alt'].includes(tg)) return tg;
  if (['1','2','3','4'].includes(tg)) return `level${tg}`;
  if (tg === '') return 'skip';

  // Alias detection from column name
  for (const [role, aliases] of Object.entries(ROLE_ALIASES)) {
    if (aliases.includes(cn)) return role;
  }
  for (const [rank, aliases] of Object.entries(RANK_ALIASES)) {
    if (aliases.includes(cn)) return 'rank_' + rank;
  }
  return 'skip';
}

function buildSchema(headers, tags) {
  const fields = headers.map((h, i) => {
    const role = detectRole(h, tags[i]);
    return { index: i, name: h, tag: tags[i] || '', role, key: h.toLowerCase().replace(/[^a-z0-9]/g,'_') };
  });

  const schema = {
    fields,
    primaryIdx: fields.findIndex(f => f.role === 'primary'),
    displayIdx:  fields.findIndex(f => f.role === 'display'),
    categoryIdx: fields.findIndex(f => f.role === 'category'),
    idIdx:       fields.findIndex(f => f.role === 'id'),
    notesIdx:    fields.findIndex(f => f.role === 'notes'),
    notesAltIdx: fields.findIndex(f => f.role === 'notes_alt'),
    levelFields: {
      1: fields.filter(f => f.role === 'level1'),
      2: fields.filter(f => f.role === 'level2'),
      3: fields.filter(f => f.role === 'level3'),
      4: fields.filter(f => f.role === 'level4'),
    },
  };

  // Validate minimum requirements
  if (schema.primaryIdx === -1 && schema.displayIdx === -1)
    throw new Error('CSV must have at least one column tagged as "primary" or "display" (or named "Scientific Name" / "Common Name")');

  return schema;
}

function buildDataset(csvText, filename) {
  const { headers, tags, rows, autoTagged } = parseCSV(csvText);
  const schema = buildSchema(headers, tags);

  // Build item objects
  const items = rows.filter(r => r.some(c => c)).map((row, i) => {
    const item = { _rowIndex: i };
    headers.forEach((h, j) => {
      item[schema.fields[j].key] = row[j] || '';
    });
    // Derive id
    const idField = schema.idIdx >= 0 ? schema.fields[schema.idIdx].key : null;
    item._id = idField ? (item[idField] || `row_${i}`) : `row_${i}`;
    return item;
  });

  // Fingerprint: hash of headers + tag row + row count
  const fpStr = headers.join('|') + '§' + tags.join('|') + '§' + rows.length;
  const fingerprint = simpleHash(fpStr);

  // Dataset name from filename
  const name = filename ? filename.replace(/\.(csv|tsv|txt)$/i, '').replace(/[_-]/g, ' ') : 'Unnamed Dataset';

  return { name, fingerprint, headers, tags, schema, rows: items, autoTagged: !!autoTagged };
}

function simpleHash(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = (h * 0x01000193) >>> 0;
  }
  return h.toString(16).padStart(8, '0');
}

// ═══════════════════════════════════════════════════════════════════
// SCHEMA + LEVEL RESOLUTION (with overrides)
// ═══════════════════════════════════════════════════════════════════

function getEffectiveLevel(field) {
  if (state.levelOverrides[field.name] !== undefined) return state.levelOverrides[field.name];
  const m = field.role.match(/^level(\d)$/);
  return m ? parseInt(m[1]) : null;
}

function getFieldsForLevel(level) {
  const { fields } = state.schema;
  return fields.filter(f => getEffectiveLevel(f) === level);
}

function getAskableFields() {
  const { fields } = state.schema;
  return fields.filter(f => {
    const lv = getEffectiveLevel(f);
    return lv !== null;
  });
}

// ═══════════════════════════════════════════════════════════════════
// PROGRESS & SCORING
// ═══════════════════════════════════════════════════════════════════

function getScore(itemId, fieldKey) {
  const key = `${itemId}::${fieldKey}`;
  return state.progress[key] || { seen: 0, correct: 0, skips: 0, interval: 1, lastSeen: 0, strangerScore: 1.0 };
}

function saveScore(itemId, fieldKey, s) {
  const key = `${itemId}::${fieldKey}`;
  state.progress[key] = s;
  saveProgress();
}

function updateScore(itemId, fieldKey, result, skipped) {
  const s = getScore(itemId, fieldKey);
  s.seen++;
  s.lastSeen = Date.now();
  if (skipped) {
    s.skips = (s.skips || 0) + 1;
    s.interval = 1;
    s.strangerScore = Math.max(0, (s.strangerScore || 1) - 0.3);
  } else if (result === 'correct') {
    s.correct++;
    s.strangerScore = Math.min(5, (s.strangerScore || 1) + 0.6);
    const boost = 1 + (s.strangerScore / 5);
    s.interval = Math.min((s.interval || 1) * boost * 1.5, MAX_INTERVAL_DAYS);
  } else if (result === 'partial') {
    s.strangerScore = Math.min(5, (s.strangerScore || 1) + 0.2);
    s.interval = Math.max(1, (s.interval || 1) * 0.75);
  } else {
    s.strangerScore = Math.max(0, (s.strangerScore || 1) - 0.5);
    s.interval = Math.max(1, (s.interval || 1) * 0.4);
  }
  saveScore(itemId, fieldKey, s);
}

function getItemAccuracy(itemId, fields) {
  if (!fields.length) return 0;
  let correct = 0, total = 0;
  for (const f of fields) {
    const s = getScore(itemId, f.key);
    const answered = s.seen - (s.skips || 0);
    if (answered > 0) { total++; correct += s.correct / answered >= LEVEL_UNLOCK_THRESHOLD ? 1 : 0; }
  }
  return total === 0 ? 0 : correct / total;
}

function getItemLevel(itemId) {
  // Returns the highest level this item is eligible for
  for (let lv = 4; lv >= 1; lv--) {
    const fields = getFieldsForLevel(lv);
    if (!fields.length) continue;
    if (lv === 1) return 1;
    const prevFields = getFieldsForLevel(lv - 1);
    if (!prevFields.length) return lv;
    if (getItemAccuracy(itemId, prevFields) >= LEVEL_UNLOCK_THRESHOLD) return lv;
  }
  return 1;
}

function recordAnswer(wasCorrect) {
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  state.session.todayAnswered = (state.session.todayAnswered || 0) + 1;

  // Daily streak — increments once when you return the next day
  if (state.session.lastDate === yesterday && state.session.todayAnswered === 1)
    state.session.streak = (state.session.streak || 0) + 1;
  else if (!state.session.lastDate || state.session.lastDate !== today)
    if (state.session.todayAnswered === 1) state.session.streak = 1;

  // Consecutive correct streak — only fully correct answers count; anything else resets
  if (wasCorrect === true) {
    state.session.consec = (state.session.consec || 0) + 1;
    state.session.bestConsec = Math.max(state.session.consec, state.session.bestConsec || 0);
  } else {
    state.session.consec = 0;
  }

  state.session.date = today;
  saveSession();
}

// ═══════════════════════════════════════════════════════════════════
// QUESTION ENGINE
// ═══════════════════════════════════════════════════════════════════

function getItemValue(item, fieldOrIdx) {
  if (typeof fieldOrIdx === 'number') return item[state.schema.fields[fieldOrIdx]?.key] || '';
  return item[fieldOrIdx.key] || '';
}

function getPrimaryVal(item)  { const s = state.schema; return s.primaryIdx  >= 0 ? getItemValue(item, s.primaryIdx)  : ''; }
function getDisplayVal(item)  { const s = state.schema; return s.displayIdx  >= 0 ? getItemValue(item, s.displayIdx)  : ''; }
function getCategoryVal(item) { const s = state.schema; return s.categoryIdx >= 0 ? getItemValue(item, s.categoryIdx) : ''; }
function getNotesVal(item)    { const s = state.schema; return s.notesIdx    >= 0 ? getItemValue(item, s.notesIdx)    : ''; }
function getNotesAltVal(item) { const s = state.schema; return s.notesAltIdx >= 0 ? getItemValue(item, s.notesAltIdx) : ''; }

function pickQuestion(item) {
  const itemLevel = getItemLevel(item._id);
  const schema = state.schema;

  // Build candidate fields at or below item's current level
  const candidates = [];
  for (let lv = 1; lv <= itemLevel; lv++) {
    candidates.push(...getFieldsForLevel(lv));
  }
  // Also include primary/display/category as askable
  const askHeaders = [];
  if (schema.primaryIdx >= 0)  askHeaders.push({ ...schema.fields[schema.primaryIdx],  role: 'primary',  _isHeader: true });
  if (schema.displayIdx >= 0)  askHeaders.push({ ...schema.fields[schema.displayIdx],  role: 'display',  _isHeader: true });
  if (schema.categoryIdx >= 0) askHeaders.push({ ...schema.fields[schema.categoryIdx], role: 'category', _isHeader: true });
  candidates.push(...askHeaders);

  if (!candidates.length) return null;

  // Weight by how much the field needs work (overdue + low accuracy)
  const now = Date.now();
  const weighted = candidates.map(f => {
    const s = getScore(item._id, f.key);
    const due = s.lastSeen + (s.interval || 1) * 60000;
    const answered = Math.max(1, (s.seen || 0) - (s.skips || 0));
    const ratio = (s.correct || 0) / answered;
    const overdue = Math.max(0, now - due);
    const priority = s.seen === 0 ? 1e9 : overdue + (1 - ratio) * 1e6;
    return { f, priority };
  });

  weighted.sort((a, b) => b.priority - a.priority);
  const top = weighted.slice(0, Math.max(1, Math.ceil(weighted.length * 0.4)));
  const pick = top[Math.floor(Math.random() * top.length)];
  const field = pick.f;

  const correctVal = getItemValue(item, field);

  // Field-specific question phrasing for clarity
  const displayName = getDisplayVal(item) || getPrimaryVal(item);
  const QUESTION_PHRASES = {
    bloom:                      `When does ${displayName} bloom? (months)`,
    flowering_months:           `When does ${displayName} bloom? (months)`,
    flower_color:               `What color are the flowers of ${displayName}?`,
    height:                     `What is the typical height of ${displayName}?`,
    height__feet_:              `What is the typical height of ${displayName}?`,
    sun:                        `What are the sun/light requirements for ${displayName}?`,
    sun_exposure:               `What are the sun/light requirements for ${displayName}?`,
    moisture:                   `What are the soil moisture requirements for ${displayName}?`,
    soil_moisture:              `What are the soil moisture requirements for ${displayName}?`,
    family:                     `What plant family does ${displayName} belong to?`,
    plant_family:               `What plant family does ${displayName} belong to?`,
    growth_rate:                `What is the growth rate of ${displayName}?`,
    drought_tolerance:          `How does ${displayName} tolerate drought?`,
    pollinator_value:           `What is the pollinator value of ${displayName}?`,
    lifespan:                   `What is the lifespan of ${displayName}?`,
    soil_texture:               `What soil texture does ${displayName} prefer?`,
    ph_range:                   `What is the preferred soil pH range for ${displayName}?`,
    ph__range_:                 `What is the preferred soil pH range for ${displayName}?`,
    growth_form:                `What is the growth form of ${displayName}?`,
    leaf_retention:             `Is ${displayName} deciduous or evergreen?`,
    propagation:                `How is ${displayName} typically propagated?`,
    monarchs:                   `Does ${displayName} support monarchs?`,
    hummingbirds:               `Does ${displayName} attract hummingbirds?`,
    workhorse:                  `What is the ecological role designation of ${displayName}?`,
    showy:                              `Are the flowers of ${displayName} considered showy?`,
    wind:                               `Is ${displayName} wind-pollinated?`,
    honey_bees:                         `Does ${displayName} support honey bees?`,
    'beetles,_wasps,_flies':            `Does ${displayName} support beetles, wasps, or flies?`,
    pollinators:                        `Which pollinators does ${displayName} support?`,
    benefits_to_pollinators:            `What pollinator benefits does ${displayName} provide?`,
    nesting_and_structure__bees_:       `Does ${displayName} provide nesting structure for bees?`,
    larval_host__monarch_:              `Is ${displayName} a larval host for monarchs?`,
    larval_host__butterfly_:            `Is ${displayName} a larval host for butterflies?`,
    larval_host__moth_:                 `Is ${displayName} a larval host for moths?`,
    larval_species__lepidoptera_:       `Which Lepidoptera species use ${displayName} as a larval host?`,
    native_status:                      `What is the native status of ${displayName}?`,
    distribution_in_usa:                `What is the US distribution of ${displayName}?`,
    fall_conspicuous:                   `Is ${displayName} fall conspicuous?`,
    moisture_use:                       `What is the moisture use classification for ${displayName}?`,
    commercially_available:             `Is ${displayName} commercially available?`,
    are_we_growing_this_right_now_:     `Are we currently growing ${displayName}?`,
    fire_tolerance:                     `What is the fire tolerance of ${displayName}?`,
    salt_tolerance:                     `What is the salt tolerance of ${displayName}?`,
    fertility_requirement:              `What are the fertility requirements for ${displayName}?`,
    resprout_ability:                   `Does ${displayName} have resprout ability?`,
    hedge_tolerance:                    `Does ${displayName} tolerate hedge/clipping?`,
    'palatability__browsing_grazing_':  `What is the browsing/grazing palatability of ${displayName}?`,
  };

  let questionText = '';
  if (field.role === 'primary')        questionText = `What is the scientific name of this organism?`;
  else if (field.role === 'display')   questionText = `What is the common name?`;
  else if (field.role === 'category')  questionText = `What is the ${field.name.toLowerCase()}?`;
  else questionText = QUESTION_PHRASES[field.key] || `What is the ${field.name.toLowerCase()} of ${displayName}?`;

  return { field, questionText, answer: correctVal };
}

function pickNextItem() {
  if (!state.dataset) return null;
  let items = state.dataset.rows;
  const schema = state.schema;

  if (state.filterCategory && state.filterCategory !== 'all') {
    const catKey = schema.categoryIdx >= 0 ? schema.fields[schema.categoryIdx].key : null;
    if (catKey) items = items.filter(it => (it[catKey] || '').toLowerCase().includes(state.filterCategory.toLowerCase()));
  }
  if (!items.length) items = state.dataset.rows; // fallback — no matches, ignore filters

  const now = Date.now();
  const scored = items.map(item => {
    const itemLevel = getItemLevel(item._id);
    const fields = [];
    for (let lv = 1; lv <= itemLevel; lv++) fields.push(...getFieldsForLevel(lv));
    let minDue = Infinity, minRatio = 1;
    for (const f of fields) {
      const s = getScore(item._id, f.key);
      const due = s.lastSeen + (s.interval || 1) * 60000;
      const answered = Math.max(1, (s.seen || 0) - (s.skips || 0));
      const ratio = (s.correct || 0) / answered;
      if (s.seen === 0) { minDue = 0; minRatio = 0; break; }
      minDue = Math.min(minDue, due);
      minRatio = Math.min(minRatio, ratio);
    }
    const overdue = Math.max(0, now - minDue);
    // Add a small random jitter so unseen items (all priority=1e6) don't sort alphabetically
    const jitter = Math.random() * 1000;
    const isUnseen = fields.every(f => getScore(item._id, f.key).seen === 0);
    const priority = isUnseen ? (1e6 + jitter) : (overdue + (1 - minRatio) * 1e6 + jitter * 0.01);
    return { item, priority };
  });
  scored.sort((a, b) => b.priority - a.priority);
  const top = scored.slice(0, Math.max(1, Math.ceil(scored.length * 0.3)));
  return top[Math.floor(Math.random() * top.length)].item;
}

function initCard() {
  if (!state.dataset) return;
  state.current = pickNextItem();
  state.question = state.current ? pickQuestion(state.current) : null;
  state.phase = 'ask';
  state.userAnswer = '';
  state.gradeResult = null;
  state.grading = false;
  state.skipped = false;
}

// ═══════════════════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════════════════

function getStats() {
  if (!state.dataset) return { total: 0, seen: 0, known: 0, unseen: 0, avgCoach: '—' };
  const items = state.dataset.rows;
  let seen = 0, known = 0, coachSum = 0, coachCount = 0;
  for (const item of items) {
    const l1 = getFieldsForLevel(1);
    const hasAny = l1.some(f => getScore(item._id, f.key).seen > 0);
    if (hasAny) seen++;
    const acc = getItemAccuracy(item._id, l1);
    if (acc >= LEVEL_UNLOCK_THRESHOLD) known++;
    // avg coach score across all fields
    const allF = getAskableFields();
    for (const f of allF) {
      const s = getScore(item._id, f.key);
      if (s.seen > 0) { coachSum += (s.strangerScore || 1); coachCount++; }
    }
  }
  const avgCoach = coachCount > 0 ? (coachSum / coachCount).toFixed(1) : '1.0';
  return { total: items.length, seen, known, unseen: items.length - seen, avgCoach };
}

function getDotClass(itemId) {
  const l1 = getFieldsForLevel(1);
  const acc = getItemAccuracy(itemId, l1);
  const hasSeen = l1.some(f => getScore(itemId, f.key).seen > 0);
  if (!hasSeen) return '';
  if (acc >= LEVEL_UNLOCK_THRESHOLD) return 'known';
  if (acc >= 0.4) return 'learning';
  return 'struggling';
}

function getScoreChipHTML(itemId) {
  const l1 = getFieldsForLevel(1);
  const acc = getItemAccuracy(itemId, l1);
  const hasSeen = l1.some(f => getScore(itemId, f.key).seen > 0);
  const lv = getItemLevel(itemId);
  const lvLabel = `<span class="level-badge l${lv}">L${lv}</span>`;
  if (!hasSeen) return `<span class="score-chip unseen">Unseen</span>${lvLabel}`;
  if (acc >= LEVEL_UNLOCK_THRESHOLD) return `<span class="score-chip high">Known</span>${lvLabel}`;
  if (acc >= 0.4) return `<span class="score-chip mid">Learning</span>${lvLabel}`;
  return `<span class="score-chip low">Struggling</span>${lvLabel}`;
}

async function gradeAnswer(questionText, correctAnswer, userAnswer) {
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 200,
        messages: [{ role: 'user', content: `Grade this quiz answer. Question: "${questionText}" Correct answer: "${correctAnswer}" User answered: "${userAnswer}"\n\nRespond with JSON only: {"grade":"CORRECT"|"PARTIAL"|"WRONG","feedback":"one sentence, max 15 words"}` }]
      })
    });
    const data = await resp.json();
    const text = data.content?.map(c => c.text || '').join('') || '';
    const clean = text.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  } catch(e) { return { grade: null, feedback: 'AI grading unavailable — self-grade below.' }; }
}

async function generateFunFact(item) {
  const primary = getPrimaryVal(item);
  const display = getDisplayVal(item);
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 120,
        messages: [{ role: 'user', content: `Give one interesting, memorable ecological or horticultural fun fact about ${primary}${display ? ' ('+display+')' : ''}. One sentence, 20 words max. No preamble, no "Did you know".` }]
      })
    });
    const data = await resp.json();
    return data.content?.map(c => c.text || '').join('').trim() || '';
  } catch(e) { return ''; }
}

// ═══════════════════════════════════════════════════════════════════
// SPECIES PHOTO
// NOTE: Photos work when the HTML file is opened directly in a browser
// (file:// or local server). They will not load inside claude.ai's
// preview iframe due to CSP restrictions on connect-src and img-src.
// All three sources (iNaturalist, Wikipedia, USDA) are blocked by:
//   connect-src: only allows cdnjs/jsdelivr/tailwind/jquery/claudeusercontent
//   img-src: only allows openstreetmap tiles, blob:, data:, self
// ═══════════════════════════════════════════════════════════════════

const SYMBOL_OVERRIDES = {
  'Campanula americana':                'CAAM3',
  'Eutrochium fistulosum':              'EUFI',
  'Liatris scariosa var. nieuwlandii':  'LISCN',
  'Lupinus perennis subsp. perennis':   'LUPEP3',
  'Polymnia canadensis':                'POCA9',
  'Sambucus canadensis':                'SACA',
  'Stylophorum diphyllum':              'STDI2',
  'Viburnum trilobum':                  'VITR',
};

const photoCache = {};

function getUsdaSymbol(item) {
  const schema = state.schema;
  const idKey = schema.idIdx >= 0 ? schema.fields[schema.idIdx].key : null;
  const fromData = idKey ? item[idKey] : '';
  if (fromData) return fromData;
  return SYMBOL_OVERRIDES[getPrimaryVal(item)] || null;
}

function timedFetch(url, opts, ms = 7000) {
  return Promise.race([
    fetch(url, opts),
    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))
  ]);
}

async function fetchSpeciesPhoto(item) {
  const scientific = getPrimaryVal(item);
  if (!scientific) return null;
  if (photoCache[scientific] !== undefined) return photoCache[scientific];
  photoCache[scientific] = null; // mark in-flight

  // 1. iNaturalist API — fetch() works, returns S3 CDN URLs for img src
  try {
    const resp = await timedFetch(
      `https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(scientific)}&per_page=3&rank=species,subspecies`
    );
    if (resp.ok) {
      const data = await resp.json();
      const genus = scientific.split(' ')[0].toLowerCase();
      const taxon = (data.results || []).find(t =>
        t.name.toLowerCase().startsWith(genus) && t.default_photo?.medium_url
      );
      if (taxon?.default_photo?.medium_url) {
        const result = {
          url: taxon.default_photo.medium_url,
          credit: `© ${taxon.default_photo.attribution || 'iNaturalist contributors'}`
        };
        photoCache[scientific] = result;
        return result;
      }
    }
  } catch(e) { console.log('[photo] iNat:', e.message); }

  // 2. Wikipedia REST API — explicit CORS support, returns upload.wikimedia.org URLs
  try {
    const title = scientific.replace(/ /g, '_');
    const resp = await timedFetch(
      `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages&format=json&pithumbsize=600&origin=*`
    );
    if (resp.ok) {
      const data = await resp.json();
      const src = Object.values(data?.query?.pages || {})[0]?.thumbnail?.source;
      if (src) {
        photoCache[scientific] = { url: src, credit: 'Wikimedia Commons' };
        return photoCache[scientific];
      }
    }
  } catch(e) { console.log('[photo] Wikipedia:', e.message); }

  // 3. USDA PLANTS — try img src directly (no HEAD needed, onerror handles 404)
  const symbol = getUsdaSymbol(item);
  if (symbol) {
    const url = `https://plants.usda.gov/ImageLibrary/standard/${symbol.toLowerCase()}_001_shp.jpg`;
    photoCache[scientific] = { url, credit: 'USDA PLANTS Database', usda: true };
    return photoCache[scientific];
  }

  return null;
}

// Detect if we're in a CSP-restricted context (claude.ai iframe)
// by checking if the page origin matches known restricted hosts
const PHOTO_DISABLED = (() => {
  try {
    const host = window.location.hostname;
    return host === 'claude.ai' || host.endsWith('.claude.ai') ||
           document.location.protocol === 'about:' ||
           window.self !== window.top; // inside an iframe
  } catch(e) { return true; } // cross-origin iframe — restricted
})();

function photoPlaceholderHTML(itemId) {
  if (PHOTO_DISABLED) return ''; // no placeholder in restricted contexts
  return `<div class="species-photo-wrap" id="photoWrap_${itemId}"><span class="species-photo-loading">↻ loading photo…</span></div>`;
}

async function loadAndInjectPhoto(item) {
  if (PHOTO_DISABLED) return;
  const photo = await fetchSpeciesPhoto(item);
  injectPhoto(item, photo);
}

function injectPhoto(item, photo) {
  const wrap = document.getElementById(`photoWrap_${item._id}`);
  if (!wrap) return;
  if (!photo) { wrap.style.display = 'none'; return; }
  const img = document.createElement('img');
  img.alt = getPrimaryVal(item);
  img.style.cssText = 'width:100%;max-height:240px;object-fit:cover;display:block;opacity:0;transition:opacity 0.4s;border-radius:5px;';
  img.onload = () => {
    if (img.naturalWidth < 10) { wrap.style.display = 'none'; return; }
    wrap.innerHTML = '';
    wrap.style.minHeight = '';
    wrap.appendChild(img);
    img.style.opacity = '1';
    const credit = document.createElement('div');
    credit.className = 'species-photo-credit';
    credit.textContent = photo.credit;
    wrap.insertAdjacentElement('afterend', credit);
  };
  img.onerror = () => { wrap.style.display = 'none'; };
  img.src = photo.url;
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++) for (let j = 1; j <= n; j++)
    dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function fuzzyMatch(answer, target) {
  const a = answer.toLowerCase().trim();
  const t = target.toLowerCase().trim();
  if (a === t) return true;
  if (t.includes(a) && a.length >= 4) return true;
  if (a.includes(t)) return true;
  return levenshtein(a, t) <= Math.max(2, Math.floor(t.length * 0.15));
}

// ═══════════════════════════════════════════════════════════════════

function coachMeterHTML(itemId) {
  const fields = getAskableFields();
  let scoreSum = 0, scoreCount = 0;
  for (const f of fields) {
    const s = getScore(itemId, f.key);
    if (s.seen > 0) { scoreSum += (s.strangerScore || 1); scoreCount++; }
  }
  const score = scoreCount > 0 ? scoreSum / scoreCount : 1.0;
  const pct = (score / 5) * 100;
  const cls = score >= 3.5 ? 'high' : score >= 2 ? 'mid' : 'low';
  const barColor = score >= 3.5 ? 'var(--green2)' : score >= 2 ? 'var(--amber)' : 'var(--red2)';
  const quotes = score >= 3.5 ? COACH_HIGH : score >= 2 ? COACH_MID : COACH_LOW;
  const seen = fields.reduce((acc, f) => acc + getScore(itemId, f.key).seen, 0);
  const quote = quotes[seen % quotes.length];
  return `<div class="coach-wrap">
    <div class="coach-row">
      <span class="coach-lbl">Coach's read</span>
      <span class="coach-score ${cls}">${score.toFixed(1)} / 5</span>
    </div>
    <div class="coach-bar-wrap"><div class="coach-bar" style="width:${pct}%;background:${barColor};"></div></div>
    <div class="coach-quote">${quote}</div>
  </div>`;
}
