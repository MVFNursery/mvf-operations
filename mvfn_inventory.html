<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inventory">
<meta name="theme-color" content="#2d3319">
<link rel="manifest" href="inventory-manifest.json">
<title>MVFN Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Mono', monospace;
    background: #f5f5f0;
    color: #2d3319;
    min-height: 100vh;
  }
  h1, h2 { font-family: 'Fraunces', serif; }

  .container { max-width: 640px; margin: 0 auto; padding: 20px; }

  header { text-align: center; padding: 20px 0 12px; }
  header h1 { font-size: 2rem; font-weight: 700; }
  header .subtitle { font-size: 0.85rem; color: #5a6b2d; margin-top: 4px; }
  header .readonly { font-size: 0.7rem; color: #8a8a7a; margin-top: 8px; letter-spacing: 0.03em; }

  /* Mode toggle */
  .modebar { display: flex; justify-content: center; margin: 10px 0 2px; }
  .modebar button {
    padding: 9px 18px; border: 2px solid #2d3319; background: white; color: #2d3319;
    border-radius: 999px; font-family: 'Fraunces', serif; font-size: 0.92rem;
    font-weight: 600; cursor: pointer;
  }
  .modebar button.active { background: #2d3319; color: white; }
  body.count-mode header .readonly { color: #b45309; }

  /* Count progress */
  .progress { display: none; margin: 10px 0 2px; }
  body.count-mode .progress { display: block; }
  .progress .bar { height: 8px; background: #e3e3d8; border-radius: 999px; overflow: hidden; }
  .progress .bar > span { display: block; height: 100%; background: #5a6b2d; width: 0; transition: width .2s; }
  .progress .label { font-size: 0.75rem; color: #5a6b2d; margin-top: 5px; text-align: center; }

  /* Controls */
  .controls { display: flex; gap: 10px; margin: 8px 0 16px; flex-wrap: wrap; }
  .controls input[type="search"] {
    flex: 1 1 180px; padding: 12px; border: 2px solid #d1d5db; border-radius: 6px;
    font-family: 'DM Mono', monospace; font-size: 1rem; background: white;
  }
  .controls input[type="search"]:focus { outline: none; border-color: #5a6b2d; }
  .controls select {
    flex: 0 0 auto; padding: 12px; border: 2px solid #d1d5db; border-radius: 6px;
    font-family: 'DM Mono', monospace; font-size: 0.95rem; background: white;
  }

  .summary { font-size: 0.8rem; color: #5a6b2d; margin-bottom: 14px; }

  /* Add-stock */
  .addbtn {
    display: none; width: 100%; margin: 0 0 14px; padding: 12px; border: 2px dashed #5a6b2d;
    background: #fbfbf6; color: #5a6b2d; border-radius: 8px; font-family: 'Fraunces', serif;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
  }
  body.count-mode .addbtn { display: block; }
  .addform {
    display: none; background: #fbfbf6; border: 2px solid #5a6b2d; border-radius: 8px;
    padding: 14px 16px; margin: 0 0 14px;
  }
  .addform.open { display: block; }
  .addform h2 { font-size: 1rem; margin-bottom: 10px; }
  .addform .row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
  .addform input, .addform select {
    flex: 1 1 120px; padding: 10px; border: 2px solid #d1d5db; border-radius: 6px;
    font-family: 'DM Mono', monospace; font-size: 0.9rem; background: white;
  }
  .addform .flabel { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: #8a8a7a; margin: 4px 0 4px; }
  .addform .speciesnote { font-size: 0.72rem; min-height: 1em; margin: 0 0 8px; }
  .addform .speciesnote.match { color: #047857; }
  .addform .speciesnote.new { color: #b45309; }
  .addform .newspecies { display: none; }
  .addform .newspecies.show { display: block; }
  .addform .nativechk { display: flex; align-items: center; gap: 6px; font-size: 0.8rem;
    color: #5a6b2d; margin: 0 0 8px; }
  .addform .nativechk input { flex: 0 0 auto; }
  .addform .actions { display: flex; gap: 8px; margin-top: 4px; }
  .addform .actions button { flex: 1; padding: 11px; border-radius: 6px; font-weight: 600;
    font-family: 'Fraunces', serif; font-size: 0.92rem; cursor: pointer; }
  .addform .save { border: 2px solid #2d3319; background: #2d3319; color: white; }
  .addform .cancel { border: 2px solid #d1d5db; background: white; color: #2d3319; }

  /* Stock cards */
  .stock-list { display: grid; gap: 10px; }
  .stock-card {
    background: white; border: 2px solid #2d3319; border-radius: 8px; padding: 14px 16px;
  }
  .stock-card.counted { border-color: #047857; background: #f3fbf6; }
  .stock-card .name { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 600; }
  .stock-card .sci { font-style: italic; font-size: 0.8rem; color: #5a6b2d; margin-top: 2px; }
  .stock-card .meta {
    display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center;
    margin-top: 10px; font-size: 0.8rem; color: #2d3319;
  }
  .stock-card .meta .qty { font-weight: 500; }
  .stock-card .meta .price { margin-left: auto; font-weight: 500; }
  .stock-card .loc { font-size: 0.72rem; color: #8a8a7a; margin-top: 6px; }

  .badge {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.04em;
    padding: 2px 8px; border-radius: 999px; border: 1px solid currentColor; font-weight: 500;
  }
  .badge.for-sale { color: #047857; }
  .badge.growing { color: #b45309; }
  .badge.other   { color: #6b7280; }
  .native-dot { color: #047857; font-size: 0.72rem; }
  .counted-tick { color: #047857; font-size: 0.75rem; margin-left: auto; }

  /* Count editor (inside card, count mode) */
  .editor { display: none; margin-top: 12px; border-top: 1px dashed #d1d5db; padding-top: 12px; }
  body.count-mode .editor { display: block; }
  .editor .line { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .editor label { font-size: 0.72rem; color: #5a6b2d; min-width: 64px; }
  .editor input.count {
    width: 84px; padding: 10px; border: 2px solid #2d3319; border-radius: 6px;
    font-family: 'DM Mono', monospace; font-size: 1.05rem; text-align: center; background: white;
  }
  .editor input.locinput {
    flex: 1 1 120px; padding: 9px; border: 2px solid #d1d5db; border-radius: 6px;
    font-family: 'DM Mono', monospace; font-size: 0.85rem; background: white;
  }
  .editor select.statussel {
    padding: 9px; border: 2px solid #d1d5db; border-radius: 6px;
    font-family: 'DM Mono', monospace; font-size: 0.85rem; background: white;
  }
  .editor button.save {
    padding: 10px 16px; border: 2px solid #2d3319; background: #2d3319; color: white;
    border-radius: 6px; font-family: 'Fraunces', serif; font-size: 0.88rem; font-weight: 600;
    cursor: pointer;
  }
  .editor button.save:disabled { opacity: 0.5; }
  .editor .msg { font-size: 0.72rem; min-height: 1em; }
  .editor .msg.ok { color: #047857; }
  .editor .msg.err { color: #7f1d1d; }
  .editor .msg.saving { color: #8a8a7a; }

  /* States */
  .state { text-align: center; padding: 48px 20px; color: #5a6b2d; }
  .state.error { color: #7f1d1d; }
  .state button {
    margin-top: 16px; padding: 12px 24px; border: 2px solid #2d3319; background: #2d3319;
    color: white; border-radius: 8px; font-family: 'Fraunces', serif; font-size: 1rem;
    font-weight: 600; cursor: pointer;
  }
  .updated { text-align: center; font-size: 0.7rem; color: #aaa; padding: 24px 0 12px; }

  /* Save confirmation toast (centered splash, auto-dismisses in 3s) */
  .toast {
    display: none; position: fixed; inset: 0; z-index: 1000;
    align-items: center; justify-content: center;
    background: rgba(45, 51, 25, 0.28);
  }
  .toast.show { display: flex; }
  .toast-card {
    background: white; border: 2px solid #047857; border-radius: 14px;
    padding: 26px 30px; text-align: center; min-width: 200px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    animation: toastpop .18s ease-out;
  }
  @keyframes toastpop { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .toast-check {
    width: 56px; height: 56px; margin: 0 auto 12px; border-radius: 50%;
    background: #047857; color: white; font-size: 2rem; line-height: 56px;
  }
  .toast-msg { font-family: 'Fraunces', serif; font-size: 1.15rem; font-weight: 600; color: #2d3319; }
  .toast-ok {
    margin-top: 16px; padding: 9px 28px; border: 2px solid #2d3319; background: white;
    color: #2d3319; border-radius: 999px; font-family: 'Fraunces', serif; font-size: 0.95rem;
    font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>MVFN Inventory</h1>
      <div class="subtitle">Mountain View Farm Nursery</div>
      <div class="readonly" id="modeLabel">Live stock view · read-only</div>
    </header>

    <div class="modebar">
      <button id="modeToggle" type="button">Start count</button>
    </div>

    <div class="progress" id="progress">
      <div class="bar"><span id="progBar"></span></div>
      <div class="label" id="progLabel"></div>
    </div>

    <div class="controls" id="controls" style="display:none;">
      <input type="search" id="search" placeholder="Search species…" autocomplete="off">
      <select id="statusFilter">
        <option value="all">All statuses</option>
        <option value="for-sale">For sale</option>
        <option value="growing">Growing</option>
        <option value="uncounted">Uncounted (this session)</option>
      </select>
    </div>
    <div class="summary" id="summary"></div>

    <button class="addbtn" id="addBtn" type="button">+ Add stock found</button>
    <div class="addform" id="addForm">
      <h2>Add stock found</h2>
      <div class="row">
        <input list="speciesList" id="addSpecies" placeholder="Species (type to search)" autocomplete="off">
        <datalist id="speciesList"></datalist>
      </div>
      <div class="speciesnote" id="speciesNote"></div>
      <div class="newspecies" id="newSpecies">
        <div class="row">
          <input id="addSci" placeholder="Scientific name (optional)">
        </div>
        <label class="nativechk"><input type="checkbox" id="addNative"> True PA native</label>
      </div>
      <div class="flabel">Container size &amp; quantity</div>
      <div class="row">
        <input id="addContainer" placeholder="Container size (e.g. 3.5&quot;, 2-quart)">
        <input id="addQty" type="number" inputmode="numeric" min="0" placeholder="Qty">
      </div>
      <div class="flabel">Location · status · price</div>
      <div class="row">
        <input id="addLocation" placeholder="Location">
        <select id="addStatus">
          <option value="growing">growing</option>
          <option value="for-sale">for-sale</option>
        </select>
        <input id="addPrice" type="number" inputmode="decimal" step="0.01" min="0" placeholder="Price">
      </div>
      <div class="msg err" id="addMsg" style="font-size:0.72rem;min-height:1em;"></div>
      <div class="actions">
        <button class="cancel" id="addCancel" type="button">Cancel</button>
        <button class="save" id="addSave" type="button">Add stock</button>
      </div>
    </div>

    <div id="list" class="stock-list"></div>

    <div id="state" class="state">Loading stock…</div>
    <div class="updated" id="updated"></div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <div class="toast-card">
      <div class="toast-check">✓</div>
      <div class="toast-msg" id="toastMsg">Saved</div>
      <button class="toast-ok" id="toastOk" type="button">OK</button>
    </div>
  </div>

<script>
  // n8n webhook base — same tailnet host the other field PWAs use.
  const N8N_BASE = 'https://megamachine.taile865b6.ts.net:5678/webhook';

  let stock = [];
  let speciesById = {};
  let speciesList = [];
  let countMode = false;
  const counted = new Set();        // stock_ids saved this session

  const $ = id => document.getElementById(id);

  function speciesKey(v) { return v == null ? '' : String(v); }

  async function load() {
    setState('Loading stock…', false);
    try {
      const res = await fetch(`${N8N_BASE}/mvfn-get-stock`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      stock = Array.isArray(data.stock) ? data.stock : [];
      speciesById = {};
      speciesList = (data.species || []).slice();
      speciesList.forEach(sp => { speciesById[speciesKey(sp.species_id)] = sp; });
      buildSpeciesDatalist();
      $('controls').style.display = 'flex';
      $('updated').textContent = 'Updated ' + new Date().toLocaleString();
      render();
    } catch (err) {
      $('controls').style.display = 'none';
      $('summary').textContent = '';
      $('list').innerHTML = '';
      setState(`Couldn't reach inventory (${err.message}). Check your Tailscale connection.`, true);
    }
  }

  // POST a write action to the inventory workflow. Tolerant of empty/non-JSON
  // bodies so a server-side error surfaces as a clear message, not a raw
  // "Unexpected end of JSON input" from res.json().
  async function postAction(payload) {
    const res = await fetch(`${N8N_BASE}/mvfn-inventory`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const text = await res.text();
    let data = null;
    try { data = text ? JSON.parse(text) : null; } catch (e) { data = null; }
    if (!res.ok) throw new Error((data && data.message) ? data.message : `server error ${res.status}`);
    if (data === null) throw new Error('empty response — the save may have failed; check and retry');
    return data;
  }

  function buildSpeciesDatalist() {
    $('speciesList').innerHTML = speciesList
      .slice()
      .sort((a, b) => (a.common_name || '').localeCompare(b.common_name || ''))
      .map(sp => {
        const label = `${sp.common_name || sp.species_id}${sp.scientific_name ? ' — ' + sp.scientific_name : ''}`;
        return `<option value="${esc(label)}" data-id="${esc(sp.species_id)}"></option>`;
      }).join('');
  }

  function setState(msg, isError) {
    const el = $('state');
    el.className = 'state' + (isError ? ' error' : '');
    el.innerHTML = '';
    el.appendChild(document.createTextNode(msg));
    if (isError) {
      const b = document.createElement('button');
      b.textContent = 'Retry';
      b.onclick = load;
      el.appendChild(document.createElement('br'));
      el.appendChild(b);
    }
    el.style.display = msg ? 'block' : 'none';
  }

  function fmtPrice(p) {
    if (p == null || p === '') return '';
    const n = Number(p);
    return isNaN(n) ? '' : '$' + n.toFixed(2).replace(/\.00$/, '');
  }

  function statusClass(s) {
    if (s === 'for-sale') return 'for-sale';
    if (s === 'growing') return 'growing';
    return 'other';
  }

  function updateProgress() {
    const total = stock.length;
    const done = counted.size;
    $('progBar').style.width = total ? (100 * done / total) + '%' : '0%';
    $('progLabel').textContent = `${done} / ${total} counted this session`;
  }

  function render() {
    const q = $('search').value.trim().toLowerCase();
    const statusF = $('statusFilter').value;

    const rows = stock
      .map(s => ({ s, sp: speciesById[speciesKey(s.species_id)] || {} }))
      .filter(({ s, sp }) => {
        if (statusF === 'uncounted') { if (counted.has(s.stock_id)) return false; }
        else if (statusF !== 'all' && s.status !== statusF) return false;
        if (!q) return true;
        const hay = `${sp.common_name || ''} ${sp.scientific_name || ''} ${s.species_id || ''}`.toLowerCase();
        return hay.includes(q);
      })
      .sort((a, b) =>
        (a.sp.common_name || a.s.species_id || '').localeCompare(b.sp.common_name || b.s.species_id || ''));

    const forSale = stock.filter(s => s.status === 'for-sale' && Number(s.quantity) > 0).length;
    const species = new Set(stock.map(s => speciesKey(s.species_id))).size;
    $('summary').textContent =
      `${stock.length} stock items · ${forSale} for sale · ${species} species`;

    if (!rows.length) { setState('No matching stock.', false); $('list').innerHTML = ''; return; }
    setState('', false);

    $('list').innerHTML = rows.map(({ s, sp }) => cardHTML(s, sp)).join('');
    if (countMode) rows.forEach(({ s }) => wireCard(s.stock_id));
    updateProgress();
  }

  function cardHTML(s, sp) {
    const name = sp.common_name || s.species_id || 'Unknown';
    const sci = sp.scientific_name ? `<div class="sci">${esc(sp.scientific_name)}</div>` : '';
    const native = sp.is_true_native ? '<span class="native-dot" title="True native">● native</span>' : '';
    const price = fmtPrice(s.price_per_unit);
    const loc = s.location ? `<div class="loc">${esc(s.location)}</div>` : '';
    const isCounted = counted.has(s.stock_id);
    const tick = isCounted ? '<span class="counted-tick">✓ counted</span>' : '';
    return `<div class="stock-card${isCounted ? ' counted' : ''}" data-card="${s.stock_id}">
      <div class="name">${esc(name)} ${native}</div>
      ${sci}
      <div class="meta">
        <span>${esc(s.container_size || '—')}</span>
        <span class="qty">${s.quantity ?? 0} avail</span>
        <span class="badge ${statusClass(s.status)}">${esc(s.status || '—')}</span>
        ${price ? `<span class="price">${price}</span>` : ''}
        ${tick}
      </div>
      ${loc}
      ${countMode ? editorHTML(s) : ''}
    </div>`;
  }

  function editorHTML(s) {
    return `<div class="editor">
      <div class="line">
        <label>Count</label>
        <input class="count" type="number" inputmode="numeric" min="0" value="${s.quantity ?? 0}">
        <button class="save" type="button" data-act="count">Save count</button>
        <span class="msg" data-msg></span>
      </div>
      <div class="line">
        <label>Cont.</label>
        <input class="continput" type="text" value="${esc(s.container_size || '')}" placeholder="container size">
      </div>
      <div class="line">
        <label>Status</label>
        <select class="statussel">
          ${['growing', 'for-sale'].concat(
            (s.status && s.status !== 'growing' && s.status !== 'for-sale') ? [s.status] : []
          ).map(o => `<option value="${esc(o)}"${o === s.status ? ' selected' : ''}>${esc(o)}</option>`).join('')}
        </select>
        <label>Loc</label>
        <input class="locinput" type="text" value="${esc(s.location || '')}" placeholder="location">
        <button class="save" type="button" data-act="meta">Save</button>
      </div>
    </div>`;
  }

  function wireCard(stockId) {
    const card = document.querySelector(`[data-card="${stockId}"]`);
    if (!card) return;
    const s = stock.find(x => x.stock_id === stockId);
    const msg = card.querySelector('[data-msg]');

    function setMsg(text, cls) { msg.textContent = text; msg.className = 'msg ' + (cls || ''); }

    // Save count -> set_qty
    card.querySelector('[data-act="count"]').addEventListener('click', async () => {
      const val = card.querySelector('input.count').value.trim();
      const n = parseInt(val, 10);
      if (val === '' || isNaN(n) || n < 0) { setMsg('Enter a number ≥ 0', 'err'); return; }
      const btn = card.querySelector('[data-act="count"]');
      btn.disabled = true; setMsg('Saving…', 'saving');
      try {
        await postAction({ action: 'set_qty', stock_id: stockId, quantity: n });
        s.quantity = n;
        counted.add(stockId);
        setMsg('✓ saved', 'ok');
        showToast(`Count saved · ${n}`);
        card.classList.add('counted');
        if (!card.querySelector('.counted-tick')) {
          const t = document.createElement('span');
          t.className = 'counted-tick'; t.textContent = '✓ counted';
          card.querySelector('.meta').appendChild(t);
        }
        card.querySelector('.meta .qty').textContent = `${n} avail`;
        updateProgress();
      } catch (err) {
        setMsg(`✗ ${err.message} — tap to retry`, 'err');
      } finally { btn.disabled = false; }
    });

    // Auto-fill location 'retail' when status flips to for-sale and loc is empty.
    const statusSel = card.querySelector('select.statussel');
    const locInput = card.querySelector('input.locinput');
    statusSel.addEventListener('change', () => {
      if (statusSel.value === 'for-sale' && !locInput.value.trim()) locInput.value = 'retail';
    });

    // Save status / location / container -> set_* (only what changed)
    card.querySelector('[data-act="meta"]').addEventListener('click', async () => {
      const newStatus = statusSel.value;
      const newLoc = locInput.value.trim();
      const newCont = card.querySelector('input.continput').value.trim();
      const btn = card.querySelector('[data-act="meta"]');
      btn.disabled = true; setMsg('Saving…', 'saving');
      try {
        let changed = false;
        if (newStatus !== s.status) {
          await postAction({ action: 'set_status', stock_id: stockId, status: newStatus });
          s.status = newStatus;
          const badge = card.querySelector('.badge');
          badge.textContent = newStatus; badge.className = 'badge ' + statusClass(newStatus);
          changed = true;
        }
        if (newLoc !== (s.location || '')) {
          await postAction({ action: 'set_location', stock_id: stockId, location: newLoc });
          s.location = newLoc;
          changed = true;
        }
        if (newCont !== (s.container_size || '')) {
          await postAction({ action: 'set_container', stock_id: stockId, container_size: newCont });
          s.container_size = newCont;
          card.querySelector('.meta span').textContent = newCont || '—';
          changed = true;
        }
        setMsg(changed ? '✓ saved' : 'no changes', 'ok');
        if (changed) showToast('Saved');
      } catch (err) {
        setMsg(`✗ ${err.message} — tap to retry`, 'err');
      } finally { btn.disabled = false; }
    });
  }

  // ---- Add stock found ----
  function resolveSpeciesId(typed) {
    const val = typed.trim();
    if (!val) return '';
    // datalist option value is "Common — Scientific"; match it, else match common/sci/id directly.
    const opt = Array.from($('speciesList').options).find(o => o.value === val);
    if (opt) return opt.getAttribute('data-id');
    const low = val.toLowerCase();
    const hit = speciesList.find(sp =>
      (sp.common_name || '').toLowerCase() === low ||
      (sp.scientific_name || '').toLowerCase() === low ||
      speciesKey(sp.species_id).toLowerCase() === low);
    return hit ? hit.species_id : '';
  }

  // "Chester Thornless Blackberry" -> "chester-thornless-blackberry"
  function slugify(s) {
    return String(s).toLowerCase().trim()
      .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  }

  // Live feedback as the species field changes: matched existing vs. new-to-create.
  function onSpeciesInput() {
    const typed = $('addSpecies').value.trim();
    const note = $('speciesNote');
    const block = $('newSpecies');
    if (!typed) { note.textContent = ''; note.className = 'speciesnote'; block.classList.remove('show'); return; }
    if (resolveSpeciesId(typed)) {
      note.textContent = '✓ existing species';
      note.className = 'speciesnote match';
      block.classList.remove('show');
    } else {
      note.textContent = `✚ new species — will be created as “${typed}” (${slugify(typed)})`;
      note.className = 'speciesnote new';
      block.classList.add('show');
    }
  }

  function resetAddForm() {
    ['addSpecies','addContainer','addQty','addLocation','addPrice','addSci'].forEach(id => $(id).value = '');
    $('addNative').checked = false;
    $('addMsg').textContent = '';
    $('speciesNote').textContent = ''; $('speciesNote').className = 'speciesnote';
    $('newSpecies').classList.remove('show');
  }

  async function submitAddStock() {
    const typed = $('addSpecies').value.trim();
    const addMsg = $('addMsg');
    if (!typed) { addMsg.textContent = 'Enter a species name.'; return; }
    const qtyRaw = $('addQty').value.trim();
    const qty = qtyRaw === '' ? 0 : parseInt(qtyRaw, 10);
    if (isNaN(qty) || qty < 0) { addMsg.textContent = 'Qty must be ≥ 0.'; return; }

    let speciesId = resolveSpeciesId(typed);
    const isNew = !speciesId;
    if (isNew) speciesId = slugify(typed);
    if (!speciesId) { addMsg.textContent = 'Species name needs at least one letter or number.'; return; }

    const btn = $('addSave'); btn.disabled = true;
    try {
      if (isNew) {
        addMsg.textContent = 'Creating species…';
        await postAction({
          action: 'add_species',
          species_id: speciesId,
          common_name: typed,
          scientific_name: $('addSci').value.trim(),
          is_true_native: $('addNative').checked ? 'true' : '',
        });
      }
      addMsg.textContent = 'Adding stock…';
      const out = await postAction({
        action: 'add_stock',
        species_id: speciesId,
        container_size: $('addContainer').value.trim(),
        quantity: String(qty),
        location: $('addLocation').value.trim(),
        status: $('addStatus').value,
        price_per_unit: $('addPrice').value.trim(),
      });
      const newId = out && out.result && out.result.stock_id;
      resetAddForm();
      $('addForm').classList.remove('open');
      showToast(isNew ? 'Species + stock added' : 'Stock added');
      await load();
      if (newId != null) { counted.add(newId); render(); }
    } catch (err) {
      addMsg.textContent = `✗ ${err.message} — tap to retry`;
    } finally { btn.disabled = false; }
  }

  function setCountMode(on) {
    countMode = on;
    document.body.classList.toggle('count-mode', on);
    $('modeToggle').classList.toggle('active', on);
    $('modeToggle').textContent = on ? 'Done counting' : 'Start count';
    $('modeLabel').textContent = on ? 'Count mode · save as you go' : 'Live stock view · read-only';
    if (!on) { $('addForm').classList.remove('open'); }
    render();
  }

  function esc(str) {
    return String(str).replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  // Centered checkmark confirmation; auto-dismisses after 3s, OK/backdrop dismiss early.
  let toastTimer = null;
  function showToast(msg) {
    $('toastMsg').textContent = msg || 'Saved';
    $('toast').classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(hideToast, 3000);
  }
  function hideToast() { clearTimeout(toastTimer); $('toast').classList.remove('show'); }

  $('search').addEventListener('input', render);
  $('statusFilter').addEventListener('change', render);
  $('modeToggle').addEventListener('click', () => setCountMode(!countMode));
  $('addBtn').addEventListener('click', () => $('addForm').classList.toggle('open'));
  $('addCancel').addEventListener('click', () => { $('addForm').classList.remove('open'); resetAddForm(); });
  $('addSpecies').addEventListener('input', onSpeciesInput);
  $('addStatus').addEventListener('change', () => {
    if ($('addStatus').value === 'for-sale' && !$('addLocation').value.trim()) $('addLocation').value = 'retail';
  });
  $('addSave').addEventListener('click', submitAddStock);
  $('toastOk').addEventListener('click', hideToast);
  $('toast').addEventListener('click', e => { if (e.target.id === 'toast') hideToast(); });
  load();
</script>
</body>
</html>
